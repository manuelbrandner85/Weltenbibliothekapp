name: 🗄️ Supabase Migrationen anwenden

# Läuft bei JEDEM Push auf main (kein paths-Filter).
# Alle SQLs sind idempotent (IF NOT EXISTS / ON CONFLICT DO NOTHING).
# Nutzt SUPABASE_DB_URL für direkte psql-Verbindung (keine API-Größenlimits).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    name: 📦 SQL-Migrationen anwenden
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐘 PostgreSQL Client installieren
        run: sudo apt-get install -y postgresql-client

      - name: 🗄️ Migrationen via psql anwenden
        run: |
          set -euo pipefail

          # Verbindungs-Check
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            DB_CONN="${SUPABASE_DB_URL}"
            echo "✅ Verwende SUPABASE_DB_URL"
          elif [ -n "${SUPABASE_PROJECT_ID:-}" ] && [ -n "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            # Fallback: Supabase CLI
            echo "⚠️  SUPABASE_DB_URL fehlt — versuche Supabase CLI"
            USE_CLI=1
          else
            echo "❌ Weder SUPABASE_DB_URL noch SUPABASE_PROJECT_ID+ACCESS_TOKEN gesetzt"
            exit 1
          fi

          MIGRATION_FAILED=0

          if [ "${USE_CLI:-0}" = "1" ]; then
            # Supabase CLI Fallback
            curl -s https://raw.githubusercontent.com/supabase/cli/main/scripts/install.sh | bash
            for f in $(ls supabase/migrations/*.sql | sort); do
              name=$(basename "$f")
              echo "→ $name ..."
              if SUPABASE_ACCESS_TOKEN="${SUPABASE_ACCESS_TOKEN}" \
                 supabase db execute --project-ref "$SUPABASE_PROJECT_ID" < "$f" 2>&1; then
                echo "✅ $name OK"
              else
                echo "⚠️  $name fehlgeschlagen — weiter"
                MIGRATION_FAILED=1
              fi
            done
          else
            # Direkte psql-Verbindung (bevorzugt)
            for f in $(ls supabase/migrations/*.sql | sort); do
              name=$(basename "$f")
              echo "→ $name ..."
              if psql "${DB_CONN}" -v ON_ERROR_STOP=0 -q -f "$f" 2>&1 | tail -5; then
                echo "✅ $name OK"
              else
                echo "⚠️  $name fehlgeschlagen (meist bereits angewendet) — weiter"
                MIGRATION_FAILED=1
              fi
            done
          fi

          echo ""
          if [ "$MIGRATION_FAILED" = "1" ]; then
            echo "⚠️  Einige Migrationen schlugen fehl (oft bereits angewendet — bei idempotenten SQLs normal)"
          fi
          echo "🎉 Alle Migrationen durchgelaufen"

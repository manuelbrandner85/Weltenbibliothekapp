name: 🗄️ Supabase Migrationen anwenden

# Läuft bei JEDEM Push auf main (kein paths-Filter).
# Alle SQLs sind idempotent (IF NOT EXISTS / ON CONFLICT DO NOTHING) → mehrfach ausführen ist sicher.
# Nutzt Supabase CLI (supabase db execute) – unterstützt große SQL-Dateien (>1MB).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    name: 📦 SQL-Migrationen anwenden
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # PROJECT_REF wird aus SUPABASE_URL abgeleitet – kein Hardcode nötig
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Supabase CLI Setup
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🗄️ Migrationen anwenden
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "⚠️  SUPABASE_ACCESS_TOKEN Secret fehlt — Migration übersprungen"
            echo "   Bitte unter Settings → Secrets → Actions als 'SUPABASE_ACCESS_TOKEN' hinterlegen."
            exit 0
          fi
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "⚠️  SUPABASE_URL Secret fehlt — Migration übersprungen"
            exit 0
          fi

          # PROJECT_REF aus SUPABASE_URL ableiten (https://<ref>.supabase.co → <ref>)
          PROJECT_REF=$(echo "${SUPABASE_URL}" | sed 's|https://||' | cut -d'.' -f1)
          echo "📌 Supabase Projekt: $PROJECT_REF"

          MIGRATION_FAILED=0

          run_migration() {
            local file="$1"
            local name
            name=$(basename "$file")
            echo "→ $name ..."
            # supabase db execute liest SQL via stdin — unterstützt beliebige Dateigrößen
            if supabase db execute --project-ref "$PROJECT_REF" < "$file" 2>&1; then
              echo "✅ $name OK"
            else
              echo "⚠️  $name fehlgeschlagen (meist bereits angewendet) — weiter"
              MIGRATION_FAILED=1
            fi
          }

          # Alle Migrationen in alphabetischer Reihenfolge ausführen
          for f in $(ls supabase/migrations/*.sql | sort); do
            run_migration "$f"
          done

          echo ""
          if [ "$MIGRATION_FAILED" = "1" ]; then
            echo "⚠️  Einige Migrationen schlugen fehl (oft bereits angewendet — kein Problem bei idempotenten SQLs)"
          fi
          echo "🎉 Alle Migrationen durchgelaufen"

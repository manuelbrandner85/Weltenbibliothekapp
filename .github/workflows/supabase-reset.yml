name: 🗄️ Supabase Reset & Rebuild (v16)

# SICHERHEIT: Führt DROP SCHEMA public CASCADE aus — alle Daten der Ziel-DB werden gelöscht.
#
# Setup (einmalig):
#   GitHub → Settings → Secrets and variables → Actions → New repository secret
#   Name : SUPABASE_DB_PASSWORD
#   Value: <das DB-Passwort aus Supabase Dashboard → Project Settings → Database>
#   (nur das Passwort, KEINE URL!)
#
# Der Pooler-Host wird automatisch konstruiert (IPv4-fähig):
#   postgresql://postgres.<PROJECT_REF>:<PW>@aws-0-<REGION>.pooler.supabase.com:6543/postgres
#
# Auslösen:
#   - Automatisch: Commit auf supabase/migrations/**.sql mit "[apply-migration]"
#   - Manuell: Actions → "Supabase Reset & Rebuild (v16)" → Run workflow → confirm=RESET

on:
  push:
    paths:
      - 'supabase/migrations/**.sql'
      - '.github/workflows/supabase-reset.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tippe RESET um alle Daten zu löschen und neu anzulegen'
        required: true
        default: ''
      migration_file:
        description: 'Migrations-Datei (Pfad im Repo)'
        required: true
        default: 'supabase/migrations/20260418_v16_full_reset_rebuild.sql'
      region:
        description: 'Supabase-Region (eu-central-1 | eu-west-1 | us-east-1 | us-west-1 | ap-southeast-1)'
        required: false
        default: 'eu-central-1'

env:
  DEFAULT_MIGRATION: supabase/migrations/20260418_v16_full_reset_rebuild.sql
  PROJECT_REF: adtviduaftdquvfjpojb
  DEFAULT_REGION: eu-central-1

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  reset:
    name: 🔥 DROP + CREATE public schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate: workflow_dispatch braucht confirm=RESET, push braucht [apply-migration] im Message
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.confirm == 'RESET')
      || (github.event_name == 'push' && contains(github.event.head_commit.message, '[apply-migration]'))

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: "🧭 Auflösen: welche Migrations-Datei?"
        id: mig
        run: |
          FILE="${{ inputs.migration_file }}"
          if [ -z "$FILE" ]; then FILE="${{ env.DEFAULT_MIGRATION }}"; fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "Migration: $FILE"

      - name: 🔎 Migration existiert?
        run: |
          FILE="${{ steps.mig.outputs.file }}"
          if [ ! -f "$FILE" ]; then
            echo "::error::Migrations-Datei nicht gefunden: $FILE"
            exit 1
          fi
          wc -l "$FILE"

      - name: 🐘 PostgreSQL Client installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          psql --version

      - name: 🔌 Pooler-URL bauen + Verbindung mit Region-Fallback testen
        id: conn
        env:
          PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          INPUT_REGION: ${{ inputs.region }}
        run: |
          set +e
          if [ -z "$PG_PASSWORD" ]; then
            echo "::error::Secret SUPABASE_DB_PASSWORD ist nicht gesetzt."
            echo "Füge es unter Settings → Secrets and variables → Actions hinzu."
            exit 1
          fi
          PRIMARY_REGION="${INPUT_REGION:-${DEFAULT_REGION}}"
          # URL-encode des Passworts (Sonderzeichen wie @, :, /, +, =, % abfangen)
          ENC_PW=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['PG_PASSWORD'], safe=''))")

          # Regionen in Probier-Reihenfolge (primäre zuerst, dann fallback)
          REGIONS=("$PRIMARY_REGION" eu-central-1 eu-west-1 eu-west-2 us-east-1 us-east-2 us-west-1 ap-southeast-1 ap-southeast-2 ap-northeast-1)
          # Duplikate entfernen, Reihenfolge beibehalten
          SEEN=""
          WINNER=""
          for R in "${REGIONS[@]}"; do
            case " $SEEN " in *" $R "*) continue;; esac
            SEEN="$SEEN $R"
            HOST="aws-0-${R}.pooler.supabase.com"
            echo "--- Teste Region: $R ($HOST) ---"
            # DNS (IPv4) ?
            if ! getent ahostsv4 "$HOST" >/dev/null 2>&1; then
              echo "  ↪ keine IPv4-DNS-Antwort — nächste Region"
              continue
            fi
            # TCP 6543 ?
            if ! timeout 5 bash -c "</dev/tcp/$HOST/6543" 2>/dev/null; then
              echo "  ↪ TCP 6543 nicht erreichbar — nächste Region"
              continue
            fi
            # psql-Login ?
            URL="postgresql://postgres.${PROJECT_REF}:${ENC_PW}@${HOST}:6543/postgres"
            if psql "$URL" -t -A -c "SELECT 1" >/dev/null 2>&1; then
              echo "  ✅ Verbindung ok in Region $R"
              WINNER="$R"
              break
            else
              echo "  ↪ psql-Login fehlgeschlagen in $R"
            fi
          done

          if [ -z "$WINNER" ]; then
            echo "::error::Keine Region erlaubt Verbindung. Passwort falsch, oder Projekt pausiert?"
            exit 1
          fi

          WINNING_HOST="aws-0-${WINNER}.pooler.supabase.com"
          WINNING_URL="postgresql://postgres.${PROJECT_REF}:${ENC_PW}@${WINNING_HOST}:6543/postgres"
          echo "region=$WINNER" >> "$GITHUB_OUTPUT"
          # URL als step-output zu speichern ist OK, GitHub maskiert Secrets im Log automatisch
          # Stattdessen speichern wir nur die Komponenten — die URL wird in nächsten Steps neu gebaut
          echo "host=$WINNING_HOST" >> "$GITHUB_OUTPUT"
          echo "### ✅ Supabase-Verbindung ok" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: \`$WINNER\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Host: \`$WINNING_HOST\`" >> "$GITHUB_STEP_SUMMARY"

      - name: 📊 Zustand VORHER (zur Dokumentation)
        env:
          PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PG_HOST: ${{ steps.conn.outputs.host }}
        run: |
          ENC_PW=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['PG_PASSWORD'], safe=''))")
          PGCONN="postgresql://postgres.${PROJECT_REF}:${ENC_PW}@${PG_HOST}:6543/postgres"
          echo "--- Tabellen in public VOR dem Reset ---"
          psql "$PGCONN" -c "SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename;" || true

      - name: 🚀 Migration ausführen
        id: migrate
        env:
          PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PG_HOST: ${{ steps.conn.outputs.host }}
        run: |
          set +e
          ENC_PW=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['PG_PASSWORD'], safe=''))")
          PGCONN="postgresql://postgres.${PROJECT_REF}:${ENC_PW}@${PG_HOST}:6543/postgres"
          FILE="${{ steps.mig.outputs.file }}"
          LOG=/tmp/psql.log
          echo "::group::Running $FILE"
          psql "$PGCONN" \
            --set ON_ERROR_STOP=1 \
            --single-transaction \
            -f "$FILE" 2>&1 | tee "$LOG"
          RC=${PIPESTATUS[0]}
          echo "::endgroup::"
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          cp "$LOG" psql.log
          exit $RC

      - name: 📤 Upload psql log als Artifact (immer)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psql-log
          path: psql.log
          retention-days: 7

      - name: 💬 Fehler als PR-Kommentar posten
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('psql.log', 'utf8'); } catch(e) { log = '(Log nicht lesbar: ' + e.message + ')'; }
            const errLines = log.split('\n').filter(l =>
              /^(psql:|ERROR:|DETAIL:|HINT:|CONTEXT:|LINE )/.test(l)
            ).slice(0, 80).join('\n');
            const tail = log.split('\n').slice(-60).join('\n');
            const body = [
              '### ❌ Supabase-Migration fehlgeschlagen',
              '',
              '**Run:** ' + context.runId,
              '**Commit:** ' + context.sha.slice(0,7),
              '',
              '#### psql Fehler-Zeilen',
              '```',
              errLines || '(keine ERROR-Zeilen gefunden)',
              '```',
              '',
              '#### Letzte 60 Zeilen',
              '```',
              tail,
              '```',
            ].join('\n');
            // PR-Nummer aus Branch-Suche ermitteln
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', head: context.repo.owner + ':' + context.ref.replace('refs/heads/', '')
            });
            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prs.data[0].number, body
              });
            } else {
              core.warning('Keine PR gefunden — Kommentar nicht gepostet.');
              core.setOutput('body', body);
            }

      - name: ✅ Zustand NACHHER (Verifikation)
        env:
          PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PG_HOST: ${{ steps.conn.outputs.host }}
        run: |
          ENC_PW=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['PG_PASSWORD'], safe=''))")
          PGCONN="postgresql://postgres.${PROJECT_REF}:${ENC_PW}@${PG_HOST}:6543/postgres"
          echo "--- Tabellen in public NACH dem Reset ---"
          psql "$PGCONN" -c "SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename;"
          echo ""
          echo "--- Anzahl Tabellen (erwartet: 31) ---"
          psql "$PGCONN" -c "SELECT count(*) AS tabellen FROM pg_tables WHERE schemaname = 'public';"
          echo ""
          echo "--- System-Profile (erwartet: 2 – Materie + Energie) ---"
          psql "$PGCONN" -c "SELECT username, world, role FROM public.profiles ORDER BY world;"
          echo ""
          echo "--- Chat-Räume (erwartet: 12 – 6 pro Welt) ---"
          psql "$PGCONN" -c "SELECT world, count(*) AS raeume FROM public.chat_rooms GROUP BY world ORDER BY world;"
          echo ""
          echo "--- Storage-Buckets (erwartet: avatars, media) ---"
          psql "$PGCONN" -c "SELECT id, public FROM storage.buckets ORDER BY id;"
          echo ""
          echo "--- Realtime-Publikation ---"
          psql "$PGCONN" -c "SELECT tablename FROM pg_publication_tables WHERE pubname = 'supabase_realtime' ORDER BY tablename;"

      - name: 🎉 Summary
        run: |
          echo "### ✅ Supabase Reset erfolgreich" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 31 Tabellen in public" >> $GITHUB_STEP_SUMMARY
          echo "- 2 System-Profile (Materie + Energie)" >> $GITHUB_STEP_SUMMARY
          echo "- 12 Chat-Räume (6 pro Welt)" >> $GITHUB_STEP_SUMMARY
          echo "- 2 Storage-Buckets (avatars, media)" >> $GITHUB_STEP_SUMMARY
          echo "- Realtime-Publikation aktiv" >> $GITHUB_STEP_SUMMARY

name: 🎥 LiveKit Edge Function deployen

# Deployt die Supabase Edge Function `livekit-token` und setzt die nötigen Secrets.
# Läuft bei Änderungen an der Funktion oder manuell.
#
# Benötigte GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase Management API Token (bereits gesetzt)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/livekit-token/**'
      - '.github/workflows/deploy_livekit_edge_function.yml'
  workflow_dispatch:

concurrency:
  group: deploy-livekit-edge
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: 🚀 Edge Function deployen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_PROJECT_REF: adtviduaftdquvfjpojb
      # LiveKit: WB-eigene Instanz auf Hostinger VPS (livekit-weltenbibliothek Container).
      # URL = livekit-wb.srv1438024.hstgr.cloud (via Mensaena's Caddy → Port 7980).
      LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY || 'wb-a9b26485d407e7dc2043' }}
      LIVEKIT_URL: ${{ secrets.LIVEKIT_URL || 'wss://livekit-wb.srv1438024.hstgr.cloud' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Secret-Status prüfen (soft-check)
        id: secret_check
        env:
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          if [ -z "${LIVEKIT_API_SECRET:-}" ]; then
            echo "⚠️  LIVEKIT_API_SECRET nicht gesetzt — Supabase-Secret-Refresh"
            echo "   wird übersprungen. Edge Function wird trotzdem deployed."
            echo "   Setze unter Settings → Secrets → Actions."
            echo "skip_livekit=true" >> "$GITHUB_OUTPUT"
          else
            echo "::add-mask::${LIVEKIT_API_SECRET}"
            echo "::add-mask::${{ env.LIVEKIT_API_KEY }}"
            echo "✅ LIVEKIT_API_SECRET gesetzt (${#LIVEKIT_API_SECRET} Zeichen)"
            echo "skip_livekit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🟩 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔐 LiveKit-Secrets in Supabase setzen
        if: steps.secret_check.outputs.skip_livekit == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          # Secret muss in dieser Step explizit angefordert werden seit
          # der Default-Value vom Job-Level entfernt wurde (Bundle Sec).
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "❌ SUPABASE_ACCESS_TOKEN fehlt"
            exit 1
          fi
          echo "→ Setze LiveKit-Secrets in Supabase Edge Runtime…"
          HTTP_STATUS=$(curl -s -o /tmp/secrets_resp.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/secrets" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[
              {\"name\":\"LIVEKIT_API_KEY\",\"value\":\"${LIVEKIT_API_KEY}\"},
              {\"name\":\"LIVEKIT_API_SECRET\",\"value\":\"${LIVEKIT_API_SECRET}\"},
              {\"name\":\"LIVEKIT_URL\",\"value\":\"${LIVEKIT_URL}\"}
            ]")
          echo "HTTP Status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "201" ]]; then
            echo "❌ Secrets setzen fehlgeschlagen:"
            cat /tmp/secrets_resp.json
            exit 1
          fi
          echo "✅ LiveKit-Secrets gesetzt"

      - name: 🚀 Edge Function deployen
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          echo "→ Deploye livekit-token Edge Function…"
          npx -y supabase@latest functions deploy livekit-token \
            --project-ref "${SUPABASE_PROJECT_REF}" \
            --no-verify-jwt
          echo "✅ livekit-token deployed"

      - name: 📝 Zusammenfassung
        run: |
          echo "## ✅ LiveKit Edge Function deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Funktion: \`livekit-token\`" >> $GITHUB_STEP_SUMMARY
          echo "- Projekt: \`${SUPABASE_PROJECT_REF}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: \`https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/livekit-token\`" >> $GITHUB_STEP_SUMMARY
          echo "- LiveKit-URL: \`${LIVEKIT_URL}\`" >> $GITHUB_STEP_SUMMARY

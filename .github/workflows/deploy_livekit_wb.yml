name: 🎥 LiveKit WB — VPS konfigurieren

# Fügt den Weltenbibliothek-API-Key zur Mensaena-LiveKit-Instanz hinzu
# (idempotent — ändert nichts wenn der Key bereits vorhanden ist).
#
# Required Secrets:
#   VPS_PASSWORD          — SSH root-Passwort für VPS 72.62.154.95
#   HOSTINGER_API_TOKEN   — Hostinger API Token (für VPS-Statusprüfung, optional)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy_livekit_wb.yml'

permissions:
  contents: read

concurrency:
  group: livekit-wb-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 🔑 WB-Key in Mensaena LiveKit eintragen
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VPS_HOST: 72.62.154.95
      VPS_USER: root
      WB_KEY: wb-a9b26485d407e7dc2043
      WB_SECRET: f9c57648d1756868aa7c124b545c029bcb2569b5bf82c1fa5058eefc4efc21d1
      LIVEKIT_YAML: /docker/livekit/livekit.yaml
      LIVEKIT_DIR: /docker/livekit

    steps:
      - name: 📦 sshpass + jq installieren
        run: sudo apt-get install -y -qq sshpass jq

      - name: 🌐 VPS-Status via Hostinger API prüfen
        continue-on-error: true
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          if [ -z "${HOSTINGER_API_TOKEN:-}" ]; then
            echo "ℹ️  HOSTINGER_API_TOKEN nicht gesetzt — Statusprüfung übersprungen"
            exit 0
          fi
          echo "→ VPS-Liste abrufen..."
          HTTP=$(curl -sS -o /tmp/vps_list.json -w "%{http_code}" \
            -H "Authorization: Bearer $HOSTINGER_API_TOKEN" \
            -H "Accept: application/json" \
            "https://api.hostinger.com/v1/vps/virtual-machines")
          echo "HTTP Status: $HTTP"
          if [ "$HTTP" = "200" ]; then
            echo "✅ Hostinger API erreichbar"
            jq -r '.data[]? | "VM: \(.hostname // "?") (\(.main_ip // "?")), Status: \(.state // "?")"' \
              /tmp/vps_list.json 2>/dev/null || cat /tmp/vps_list.json
          else
            echo "⚠️  Hostinger API: HTTP $HTTP"
            cat /tmp/vps_list.json || true
          fi

      - name: 🔑 WB-Key zu livekit.yaml hinzufügen (SSH)
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_PASSWORD:-}" ]; then
            echo "❌ VPS_PASSWORD Secret fehlt"
            echo "   Unter Settings → Secrets → Actions als 'VPS_PASSWORD' hinterlegen"
            exit 1
          fi

          # Script via echo-Zeilen erstellen (kein Heredoc = kein YAML-Syntaxfehler)
          {
            echo 'set -euo pipefail'
            printf 'YAML_PATH=%s\n' "'${LIVEKIT_YAML}'"
            printf 'WB_KEY=%s\n'    "'${WB_KEY}'"
            printf 'WB_SECRET=%s\n' "'${WB_SECRET}'"
            printf 'LIVEKIT_DIR=%s\n' "'${LIVEKIT_DIR}'"
            echo 'if [ ! -f "$YAML_PATH" ]; then echo "❌ $YAML_PATH nicht gefunden"; exit 1; fi'
            echo 'if grep -qF "$WB_KEY" "$YAML_PATH"; then echo "ℹ️  WB-Key bereits vorhanden"; exit 0; fi'
            echo 'cp "$YAML_PATH" "$YAML_PATH.bak"'
            printf "awk -v k=\"\$WB_KEY\" -v s=\"\$WB_SECRET\" '/^keys:/{print; print \"  \"k\": \"s; next}1' \"\$YAML_PATH.bak\" > \"\$YAML_PATH\"\n"
            echo 'echo "✅ WB-Key hinzugefügt: $WB_KEY"'
            echo 'cd "$LIVEKIT_DIR" && docker compose restart livekit && sleep 5 && docker compose ps'
            echo 'echo "✅ Mensaena LiveKit neu gestartet"'
          } > /tmp/wb_livekit_fix.sh
          chmod +x /tmp/wb_livekit_fix.sh

          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o PasswordAuthentication=yes \
            /tmp/wb_livekit_fix.sh ${VPS_USER}@${VPS_HOST}:/tmp/wb_livekit_fix.sh

          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o PasswordAuthentication=yes \
            ${VPS_USER}@${VPS_HOST} "bash /tmp/wb_livekit_fix.sh"

          echo "✅ LiveKit WB-Konfiguration abgeschlossen"

      - name: 🩺 LiveKit-Verbindungstest
        continue-on-error: true
        run: |
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 \
            "http://${VPS_HOST}:7880" 2>/dev/null || echo "000")
          if [ "$HTTP" != "000" ]; then
            echo "✅ LiveKit HTTP-Endpoint antwortet (HTTP $HTTP)"
          else
            echo "ℹ️  LiveKit-Port 7880 nicht direkt erreichbar (hinter Firewall)"
          fi

      - name: 📝 Zusammenfassung
        run: |
          echo "## 🎥 LiveKit WB — Konfiguration" >> $GITHUB_STEP_SUMMARY
          echo "| Einstellung | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Server | \`wss://livekit.srv1438024.hstgr.cloud\` |" >> $GITHUB_STEP_SUMMARY
          echo "| WB API Key | \`${WB_KEY}\` |" >> $GITHUB_STEP_SUMMARY

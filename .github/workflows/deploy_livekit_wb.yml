name: 🎥 LiveKit WB — Container deployen

# Deployt die WB-eigene LiveKit-Instanz auf den Hostinger VPS.
#
# SSH-Whitelist-Flow (automatisch):
#   1. Runner-IP via Hostinger API in VPS-Firewall freischalten
#   2. SCP + SSH mit VPS_PASSWORD
#   3. Firewall-Regel nach Deploy wieder entfernen (cleanup)
#
# Required Secrets:
#   VPS_PASSWORD          — SSH root-Passwort für VPS 72.62.154.95
#   LIVEKIT_API_SECRET    — WB LiveKit API-Secret
#   HOSTINGER_API_TOKEN   — Hostinger API Token (für Firewall-Whitelist)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/livekit-wb/**'
      - '.github/workflows/deploy_livekit_wb.yml'

permissions:
  contents: read

concurrency:
  group: livekit-wb-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 livekit-weltenbibliothek deployen
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VPS_HOST: 72.62.154.95
      VPS_USER: root
      WB_KEY: wb-a9b26485d407e7dc2043

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Tools installieren
        run: sudo apt-get install -y -qq sshpass gettext-base jq

      # ─────────────────────────────────────────────────────────────────────
      # STEP 1: Runner-IP via Hostinger API in VPS-Firewall freischalten
      # Damit SSH (Port 22) von GitHub Actions zu VPS funktioniert.
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔓 Runner-IP in Hostinger-Firewall freischalten
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOSTINGER_API_TOKEN:-}" ]; then
            echo "⚠️  HOSTINGER_API_TOKEN nicht gesetzt — Whitelist übersprungen (SSH könnte scheitern)"
            echo "FIREWALL_ID=" >> $GITHUB_ENV
            echo "FIREWALL_RULE_ID=" >> $GITHUB_ENV
            exit 0
          fi

          BASE="https://api.hostinger.com/v1"
          AUTH="Authorization: Bearer $HOSTINGER_API_TOKEN"

          # Runner-IP ermitteln
          RUNNER_IP=$(curl -sf --max-time 10 https://api.ipify.org || \
                      curl -sf --max-time 10 https://ifconfig.me || echo "")
          if [ -z "$RUNNER_IP" ]; then
            echo "⚠️  Runner-IP nicht ermittelbar — Whitelist übersprungen"
            echo "FIREWALL_ID=" >> $GITHUB_ENV
            echo "FIREWALL_RULE_ID=" >> $GITHUB_ENV
            exit 0
          fi
          echo "→ Runner-IP: $RUNNER_IP"

          # VPS-Info holen
          VPS_JSON=$(curl -sf --max-time 15 \
            -H "$AUTH" -H "Accept: application/json" \
            "$BASE/vps/virtual-machines" 2>/dev/null || echo '{"data":[]}')

          VM_ID=$(echo "$VPS_JSON" | python3 -c "import sys,json;d=json.load(sys.stdin).get('data',[]); [print(v['id']) for v in d if v.get('main_ip')=='$VPS_HOST']" 2>/dev/null | head -1 || echo "")
          echo "→ VM-ID: $VM_ID"

          # Firewall-ID aus VM-Info
          FW_ID=$(echo "$VPS_JSON" | python3 -c "import sys,json;d=json.load(sys.stdin).get('data',[]); [print((v.get('firewall') or {}).get('id','')) for v in d if v.get('main_ip')=='$VPS_HOST']" 2>/dev/null | head -1 || echo "")

          if [ -z "$FW_ID" ]; then
            FW_LIST=$(curl -sf --max-time 10 \
              -H "$AUTH" -H "Accept: application/json" \
              "$BASE/vps/firewall" 2>/dev/null || echo '{"data":[]}')
            FW_ID=$(echo "$FW_LIST" | python3 -c "import sys,json;d=json.load(sys.stdin).get('data',[]); print(d[0]['id'] if d else '')" 2>/dev/null | head -1 || echo "")
          fi
          echo "→ Firewall-ID: $FW_ID"

          if [ -z "$FW_ID" ]; then
            echo "⚠️  Kein Firewall-Objekt gefunden — versuche SSH ohne Whitelist"
            echo "FIREWALL_ID=" >> $GITHUB_ENV
            echo "FIREWALL_RULE_ID=" >> $GITHUB_ENV
            exit 0
          fi

          # Firewall-Regel hinzufügen: Port 22 TCP von Runner-IP
          RULE_RESP=$(curl -sf --max-time 15 -X POST \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "$BASE/vps/firewall/$FW_ID/rules" \
            -d "{\"protocol\":\"TCP\",\"port\":\"22\",\"action\":\"accept\",\"source\":\"custom\",\"sourceDetail\":\"$RUNNER_IP\"}" \
            2>/dev/null || echo "{}")
          echo "→ Regel-Response: $RULE_RESP"

          RULE_ID=$(echo "$RULE_RESP" | python3 -c "import sys,json;d=json.load(sys.stdin);r=d.get('data',d);print(r.get('id','') if isinstance(r,dict) else '')" 2>/dev/null | head -1 || echo "")
          echo "→ Regel-ID: $RULE_ID"

          # Firewall auf VPS synchronisieren/aktivieren
          if [ -n "$VM_ID" ]; then
            curl -sf --max-time 15 -X POST \
              -H "$AUTH" -H "Accept: application/json" \
              "$BASE/vps/firewall/$FW_ID/activate/$VM_ID" 2>/dev/null \
              && echo "✅ Firewall auf VPS synchronisiert" \
              || echo "⚠️  Firewall-Sync fehlgeschlagen (ggf. nicht nötig)"
          fi

          echo "FIREWALL_ID=$FW_ID" >> $GITHUB_ENV
          echo "FIREWALL_RULE_ID=${RULE_ID:-}" >> $GITHUB_ENV
          echo "VPS_VM_ID=${VM_ID:-}" >> $GITHUB_ENV
          echo "✅ Firewall-Regel hinzugefügt — warte 20s auf Propagierung"
          sleep 20

      # ─────────────────────────────────────────────────────────────────────
      # STEP 1b: PERSISTENTE Media-Ports öffnen (idempotent)
      #
      # WICHTIG: Ohne diese Regeln blockiert die Hostinger-Firewall die
      # WebRTC-Media-Pakete und Clients bleiben "verbinde …" hängen, sobald
      # ihr NAT keine direkte Punch-Through-Verbindung hat (sehr häufig auf
      # Mobilfunk/CGNAT, Firmen-WLAN, Hotel-WLAN).
      #
      # Geöffnet werden:
      #   - TCP 7981 (LiveKit RTC TCP-Fallback) für strikte Firewalls
      #   - UDP 60001-61000 (LiveKit Media-Range) für direktes WebRTC
      #
      # Diese Regeln werden NICHT im Cleanup wieder entfernt — sie sind
      # permanent nötig damit die App im Feld funktioniert.
      # Idempotent: wenn die Regel bereits existiert, wird sie nicht doppelt
      # hinzugefügt (Hostinger API liefert dann 422, wir akzeptieren das).
      # ─────────────────────────────────────────────────────────────────────
      - name: 🌐 Persistente LiveKit-Media-Firewall-Regeln
        if: env.FIREWALL_ID != ''
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          set -euo pipefail
          BASE="https://api.hostinger.com/v1"
          AUTH="Authorization: Bearer $HOSTINGER_API_TOKEN"
          FW_ID="${FIREWALL_ID}"
          echo "→ Firewall-ID: $FW_ID"

          # ── 1) Bestehende Regeln auflisten + komplett dumpen für Debug ───
          EXISTING_RAW=$(curl -s --max-time 15 -w "\n__HTTP__%{http_code}" \
            -H "$AUTH" -H "Accept: application/json" \
            "$BASE/vps/firewall/$FW_ID/rules" || echo $'\n__HTTP__000')
          EXISTING_HTTP=$(echo "$EXISTING_RAW" | tail -1 | sed 's/__HTTP__//')
          EXISTING=$(echo "$EXISTING_RAW" | sed '$d')
          echo "→ GET /rules HTTP $EXISTING_HTTP"
          echo "→ Bestehende Regeln (komplett):"
          echo "$EXISTING" | python3 -m json.tool 2>/dev/null | head -100 || echo "$EXISTING" | head -c 2000

          if [ "$EXISTING_HTTP" != "200" ]; then
            echo "❌ Regel-Liste konnte nicht abgefragt werden — Hostinger API-Token prüfen!"
            exit 1
          fi

          # ── 2) Regel-Adder: schickt POST, prüft HTTP-Status, fail-loud ──
          ADDED_OR_OK=0
          ATTEMPTED=0
          add_rule() {
            local proto="$1"
            local port="$2"
            local desc="$3"
            ATTEMPTED=$((ATTEMPTED+1))
            echo ""
            echo "── $desc ($proto $port) ──"

            # Existenz-Check (mehrere mögliche Hostinger-Schemas akzeptieren).
            # Single-line python wegen YAML-Block-Scalar (Heredoc bricht YAML).
            local exists
            exists=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); rules=d if isinstance(d,list) else d.get('data',d.get('rules',[])); rules=rules if isinstance(rules,list) else []; hit=any(str(r.get('protocol','')).upper()=='$proto' and str(r.get('port',r.get('ports','')))=='$port' and str(r.get('source','')).lower() in ('any','all','') for r in rules); print('1' if hit else '0')" 2>/dev/null || echo "0")
            if [ "$exists" = "1" ]; then
              echo "  ✓ Regel existiert bereits — keine Aktion"
              ADDED_OR_OK=$((ADDED_OR_OK+1))
              return 0
            fi

            local body="{\"protocol\":\"$proto\",\"port\":\"$port\",\"action\":\"accept\",\"source\":\"any\",\"sourceDetail\":\"any\"}"
            echo "  → POST body: $body"
            local resp
            resp=$(curl -s --max-time 15 -X POST -w "\n__HTTP__%{http_code}" \
              -H "$AUTH" -H "Content-Type: application/json" -H "Accept: application/json" \
              "$BASE/vps/firewall/$FW_ID/rules" \
              -d "$body" || echo $'\n__HTTP__000')
            local http_code=$(echo "$resp" | tail -1 | sed 's/__HTTP__//')
            local body_resp=$(echo "$resp" | sed '$d')
            echo "  → POST HTTP $http_code — Response: $(echo "$body_resp" | head -c 400)"

            case "$http_code" in
              200|201|204)
                echo "  ✅ $desc erfolgreich hinzugefügt"
                ADDED_OR_OK=$((ADDED_OR_OK+1))
                ;;
              409|422)
                echo "  ✓ Regel war schon da (Server: duplicate) — OK"
                ADDED_OR_OK=$((ADDED_OR_OK+1))
                ;;
              *)
                echo "  ❌ FEHLER: konnte Regel nicht hinzufügen (HTTP $http_code)"
                ;;
            esac
          }

          add_rule "TCP" "7981"          "TCP 7981 (LiveKit RTC TCP-Fallback)"
          add_rule "UDP" "60001-61000"   "UDP 60001-61000 (LiveKit Media)"
          # coturn TURN-Server (eigener Container, Standard-Ports)
          add_rule "UDP" "3478"          "UDP 3478 (coturn STUN/TURN-Listener)"
          add_rule "TCP" "3478"          "TCP 3478 (coturn TURN-Listener)"
          add_rule "UDP" "61001-62000"   "UDP 61001-62000 (coturn Relay-Range)"

          echo ""
          echo "→ Ergebnis: $ADDED_OR_OK von $ATTEMPTED Regeln OK"
          if [ "$ADDED_OR_OK" -lt "$ATTEMPTED" ]; then
            echo "❌ Mindestens eine Firewall-Regel konnte nicht gesetzt werden — Build fail-loud"
            exit 1
          fi

          # ── 3) Firewall auf VPS aktivieren/synchronisieren ─────────────
          if [ -n "${VPS_VM_ID:-}" ]; then
            ACT_RESP=$(curl -s --max-time 15 -X POST -w "\n__HTTP__%{http_code}" \
              -H "$AUTH" -H "Accept: application/json" \
              "$BASE/vps/firewall/$FW_ID/activate/${VPS_VM_ID}" || echo $'\n__HTTP__000')
            ACT_HTTP=$(echo "$ACT_RESP" | tail -1 | sed 's/__HTTP__//')
            echo "→ Activate HTTP $ACT_HTTP"
            case "$ACT_HTTP" in
              200|201|204) echo "✅ Firewall auf VPS synchronisiert" ;;
              409)         echo "✓  Firewall war schon aktiv (409)" ;;
              *)           echo "⚠️  Sync HTTP $ACT_HTTP — manuell prüfen" ;;
            esac
          fi

          # ── 4) Verifikation: GET /rules nach Update + check ────────────
          echo ""
          echo "→ Verifiziere dass Regeln jetzt aktiv sind …"
          VERIFY=$(curl -s --max-time 15 -H "$AUTH" -H "Accept: application/json" \
            "$BASE/vps/firewall/$FW_ID/rules" || echo '{"data":[]}')
          # Single-line python (kein Heredoc wegen YAML-Block-Scalar)
          echo "$VERIFY" | python3 -c "import sys,json; d=json.load(sys.stdin); rules=d if isinstance(d,list) else d.get('data',d.get('rules',[])); rules=rules if isinstance(rules,list) else []; check=lambda p,prt: any(str(r.get('protocol','')).upper()==p and str(r.get('port',''))==prt for r in rules); checks={'TCP 7981':check('TCP','7981'),'UDP 60001-61000':check('UDP','60001-61000'),'UDP 3478 (coturn)':check('UDP','3478'),'TCP 3478 (coturn)':check('TCP','3478'),'UDP 61001-62000 (coturn relay)':check('UDP','61001-62000')}; [print('  '+k+': '+('✅ aktiv' if v else '❌ FEHLT')) for k,v in checks.items()]; sys.exit(0 if all(checks.values()) else 2)" \
            && echo "✅ Verifikation OK — alle Regeln aktiv" \
            || { echo "❌ Verifikation: nicht alle Regeln aktiv. Hostinger-UI prüfen!"; exit 1; }

      # ─────────────────────────────────────────────────────────────────────
      # STEP 2: Secrets prüfen
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔐 Secrets prüfen
        env:
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          if [ -z "${VPS_PASSWORD:-}" ]; then
            echo "❌ VPS_PASSWORD fehlt — Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "${LIVEKIT_API_SECRET:-}" ]; then
            echo "❌ LIVEKIT_API_SECRET fehlt — Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ Alle Secrets vorhanden"

      # ─────────────────────────────────────────────────────────────────────
      # STEP 3: livekit.yaml mit Secret befüllen
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔧 livekit.yaml befüllen
        env:
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          set -euo pipefail
          LIVEKIT_API_SECRET="${LIVEKIT_API_SECRET}" \
            envsubst '${LIVEKIT_API_SECRET}' \
            < infra/livekit-wb/livekit.yaml \
            > /tmp/livekit-wb-filled.yaml
          grep -q '\${LIVEKIT_API_SECRET}' /tmp/livekit-wb-filled.yaml \
            && { echo "❌ Platzhalter nicht ersetzt"; exit 1; } || true
          echo "✅ livekit.yaml befüllt"

      # ─────────────────────────────────────────────────────────────────────
      # STEP 4: Dateien auf VPS hochladen
      # ─────────────────────────────────────────────────────────────────────
      - name: 📤 Dateien hochladen
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail
          SCP="sshpass -p ${VPS_PASSWORD} scp \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o PasswordAuthentication=yes"
          T="${VPS_USER}@${VPS_HOST}"
          $SCP /tmp/livekit-wb-filled.yaml          ${T}:/tmp/livekit-wb-filled.yaml
          $SCP infra/livekit-wb/docker-compose.yml  ${T}:/tmp/livekit-wb-compose.yml
          $SCP infra/livekit-wb/caddy-snippet.caddy ${T}:/tmp/caddy-wb-snippet.caddy
          echo "✅ Dateien hochgeladen"

      # ─────────────────────────────────────────────────────────────────────
      # STEP 5: Container deployen + Caddy konfigurieren
      # ─────────────────────────────────────────────────────────────────────
      - name: 🚀 Container deployen + Caddy konfigurieren
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail
          {
            echo 'set -euo pipefail'
            echo 'DEPLOY_DIR=/docker/livekit-wb'
            echo 'mkdir -p "$DEPLOY_DIR"'
            echo 'cp /tmp/livekit-wb-filled.yaml "$DEPLOY_DIR/livekit.yaml"'
            echo 'chmod 600 "$DEPLOY_DIR/livekit.yaml"'
            echo 'cp /tmp/livekit-wb-compose.yml "$DEPLOY_DIR/docker-compose.yml"'
            echo 'echo "✅ Konfiguration nach $DEPLOY_DIR kopiert"'
            echo ''
            echo '# Caddyfile suchen — zuerst via docker inspect (zuverlässigster Weg)'
            echo 'CADDY_FILE=""'
            echo 'CADDY_CTR=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -iE "caddy" | head -1 || true)'
            echo 'if [ -n "$CADDY_CTR" ]; then'
            echo '  echo "→ Caddy-Container: $CADDY_CTR"'
            echo '  CADDY_FILE=$(docker inspect "$CADDY_CTR" 2>/dev/null | python3 -c "import sys,json; m=json.load(sys.stdin)[0]; [print(b[\"Source\"]) for b in m.get(\"Mounts\",[]) if b.get(\"Destination\")==\"/etc/caddy/Caddyfile\"]" 2>/dev/null | head -1 || true)'
            echo '  [ -n "$CADDY_FILE" ] && echo "→ Caddyfile via docker inspect: $CADDY_FILE"'
            echo 'fi'
            echo '# Fallback: bekannte Pfade durchsuchen'
            echo 'if [ -z "$CADDY_FILE" ]; then'
            echo '  for f in /opt/livekit/Caddyfile /docker/livekit/Caddyfile /docker/caddy/Caddyfile /docker/mensaena/caddy/Caddyfile /etc/caddy/Caddyfile /opt/caddy/Caddyfile; do'
            echo '    if [ -f "$f" ]; then CADDY_FILE="$f"; echo "→ Caddyfile (path-scan): $f"; break; fi'
            echo '  done'
            echo 'fi'
            echo 'if [ -z "$CADDY_FILE" ]; then'
            echo '  CADDY_FILE=$(find /docker /home /opt -name "Caddyfile" 2>/dev/null | grep -v livekit-wb | head -1 || true)'
            echo '  [ -n "$CADDY_FILE" ] && echo "→ Caddyfile (find): $CADDY_FILE"'
            echo 'fi'
            echo ''
            echo '# Caddy-Snippet eintragen (idempotent) + validate vor reload'
            echo 'if [ -n "$CADDY_FILE" ]; then'
            echo '  cp "$CADDY_FILE" "$CADDY_FILE.wb-bak"'
            echo '  sed -i "/# >>> WB-LIVEKIT-BEGIN/,/# <<< WB-LIVEKIT-END/d" "$CADDY_FILE"'
            echo '  cat /tmp/caddy-wb-snippet.caddy >> "$CADDY_FILE"'
            echo '  echo "✅ Caddy-Snippet eingefügt"'
            echo '  if [ -n "$CADDY_CTR" ]; then'
            echo '    # Validate vor reload — verhindert Reload mit kaputtem Config'
            echo '    if docker exec "$CADDY_CTR" caddy validate --config /etc/caddy/Caddyfile 2>&1; then'
            echo '      if docker exec "$CADDY_CTR" caddy reload --config /etc/caddy/Caddyfile 2>&1; then'
            echo '        echo "✅ Caddy validiert + reloaded"'
            echo '      else'
            echo '        cp "$CADDY_FILE.wb-bak" "$CADDY_FILE"'
            echo '        echo "⚠️  Caddy-Reload fehlgeschlagen, Backup wiederhergestellt"'
            echo '      fi'
            echo '    else'
            echo '      cp "$CADDY_FILE.wb-bak" "$CADDY_FILE"'
            echo '      echo "❌ Caddy validate fehlgeschlagen — Backup wiederhergestellt, kein Reload"'
            echo '    fi'
            echo '  fi'
            echo 'else'
            echo '  echo "⚠️  Kein Caddyfile gefunden — Snippet liegt unter /tmp/caddy-wb-snippet.caddy"'
            echo '  echo "   Manuell: cat /tmp/caddy-wb-snippet.caddy >> /pfad/zu/Caddyfile && caddy reload"'
            echo 'fi'
            echo ''
            echo '# Container starten — --force-recreate damit hängende Container'
            echo '# (Restart-Loop) garantiert ersetzt werden, nicht nur "left alone"'
            echo 'cd "$DEPLOY_DIR"'
            echo 'docker compose pull livekit'
            echo 'docker compose up -d livekit --remove-orphans --force-recreate'
            echo 'sleep 10'
            echo 'docker compose ps'
            echo 'STATE=$(docker inspect --format "{{.State.Status}}" livekit-weltenbibliothek 2>/dev/null || echo missing)'
            echo 'echo "→ Container-State: $STATE"'
            echo 'if [ "$STATE" != "running" ]; then'
            echo '  echo "❌ Container nicht running — Deploy gescheitert"'
            echo '  docker compose logs --tail=100 livekit || true'
            echo '  exit 1'
            echo 'fi'
            echo 'HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:7980 || echo "000")'
            echo 'if [ "$HTTP" = "000" ]; then'
            echo '  echo "❌ LiveKit-Signaling antwortet nicht — Container läuft, aber Server tot"'
            echo '  docker compose logs --tail=100 livekit || true'
            echo '  exit 1'
            echo 'fi'
            echo 'echo "✅ livekit-weltenbibliothek deployed (HTTP $HTTP)"'
          } > /tmp/wb_deploy_remote.sh

          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            /tmp/wb_deploy_remote.sh ${VPS_USER}@${VPS_HOST}:/tmp/wb_deploy_remote.sh

          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            ${VPS_USER}@${VPS_HOST} "bash /tmp/wb_deploy_remote.sh"

      # ─────────────────────────────────────────────────────────────────────
      # STEP 6: Health-Check
      # ─────────────────────────────────────────────────────────────────────
      - name: 🩺 LiveKit WB Health-Check
        continue-on-error: true
        run: |
          sleep 10
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://livekit-wb.srv1438024.hstgr.cloud" 2>/dev/null || echo "000")
          [ "$HTTP" != "000" ] \
            && echo "✅ LiveKit WB antwortet (HTTP $HTTP)" \
            || echo "ℹ️  livekit-wb noch nicht erreichbar — Caddy/DNS prüfen"

      # ─────────────────────────────────────────────────────────────────────
      # CLEANUP: Temporäre Firewall-Regel wieder entfernen
      # Läuft immer (auch bei Fehler), damit kein dauerhaftes Loch entsteht.
      # ─────────────────────────────────────────────────────────────────────
      - name: 🔒 Temporäre Firewall-Regel entfernen
        if: always()
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          if [ -z "${HOSTINGER_API_TOKEN:-}" ] || \
             [ -z "${FIREWALL_ID:-}" ] || \
             [ -z "${FIREWALL_RULE_ID:-}" ]; then
            echo "ℹ️  Kein Cleanup nötig (keine Regel gesetzt)"
            exit 0
          fi
          HTTP=$(curl -sf --max-time 15 -X DELETE \
            -H "Authorization: Bearer $HOSTINGER_API_TOKEN" \
            -H "Accept: application/json" \
            "https://api.hostinger.com/v1/vps/firewall/${FIREWALL_ID}/rules/${FIREWALL_RULE_ID}" \
            -w "%{http_code}" -o /dev/null 2>/dev/null || echo "000")
          echo "→ DELETE HTTP $HTTP"
          [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ] \
            && echo "✅ Temporäre Firewall-Regel entfernt" \
            || echo "⚠️  Cleanup HTTP $HTTP — Regel ggf. manuell entfernen"

      - name: 📝 Zusammenfassung
        if: always()
        run: |
          echo "## 🎥 LiveKit WB Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Container | \`livekit-weltenbibliothek\` |" >> $GITHUB_STEP_SUMMARY
          echo "| VPS | \`$VPS_HOST\` |" >> $GITHUB_STEP_SUMMARY
          echo "| WSS-URL | \`wss://livekit-wb.srv1438024.hstgr.cloud\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Key | \`$WB_KEY\` |" >> $GITHUB_STEP_SUMMARY

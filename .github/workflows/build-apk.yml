name: Build APK

on:
  push:
    branches: [ main, genspark_ai_developer, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manueller Trigger

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: рџ”ђ Release-Keystore aus Secrets
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/weltenbibliothek.jks
          cat > android/key.properties <<EOF
          storeFile=app/weltenbibliothek.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "вњ… Release-Keystore erstellt"

      - name: рџ”” google-services.json aus Secret (optional)
        if: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          RAW="$GOOGLE_SERVICES_JSON_BASE64"
          CLEANED=$(printf '%s' "$RAW" | tr -d '[:space:]')
          if printf '%s' "$CLEANED" | base64 -d > android/app/google-services.json 2>/dev/null \
               && jq -e .project_info.project_id android/app/google-services.json >/dev/null 2>&1; then
            echo "вњ… google-services.json injiziert"
          else
            echo "вљ пёЏ  Kein gГјltiges google-services.json вЂ” Firebase wird Гјbersprungen"
            rm -f android/app/google-services.json
          fi

      - name: Get Version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Building Weltenbibliothek v${VERSION}"

      - name: рџ”‘ Supabase-Credentials ableiten (nur aus GitHub Secrets)
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            _URL="https://${SUPABASE_PROJECT_ID}.supabase.co"
          else
            _PAYLOAD=$(echo "${SUPABASE_SERVICE_ROLE_KEY}" | cut -d'.' -f2)
            _PAD=$(( (4 - ${#_PAYLOAD} % 4) % 4 ))
            _PADDED="${_PAYLOAD}$(printf '=%.0s' $(seq 1 $_PAD) 2>/dev/null || true)"
            _URL=$(echo "${_PADDED}" | base64 -d 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('https://'+d['ref']+'.supabase.co')" 2>/dev/null || echo "")
          fi
          if [ -z "${_URL:-}" ]; then echo "вќЊ Supabase-URL nicht ermittelbar"; exit 1; fi
          echo "SUPABASE_URL=${_URL}" >> $GITHUB_ENV
          _ANON_KEY=""
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            _ANON_KEY=$(curl -sf \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/api-keys" \
              | python3 -c "import sys,json; keys=json.load(sys.stdin); print(next((k['api_key'] for k in keys if k['name']=='anon'), ''))" \
              2>/dev/null || echo "")
          fi
          echo "SUPABASE_ANON_KEY=${_ANON_KEY}" >> $GITHUB_ENV
          [ -n "${_ANON_KEY:-}" ] && echo "вњ… anon key abgerufen" || echo "вљ пёЏ  anon key nicht verfГјgbar"

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=APP_VERSION=${{ env.VERSION }} \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev \
            --dart-define=LIVEKIT_URL=wss://livekit-wb.srv1438024.hstgr.cloud

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "weltenbibliothek-v${VERSION}-release.apk"
          echo "--- APK Size ---"
          ls -lh weltenbibliothek-v${VERSION}-release.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: weltenbibliothek-v${{ env.VERSION }}-release
          path: weltenbibliothek-v${{ env.VERSION }}-release.apk
          retention-days: 7

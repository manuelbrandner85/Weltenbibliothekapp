name: Build APK

on:
  push:
    branches: [ main, genspark_ai_developer ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manueller Trigger

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Get Version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Building Weltenbibliothek v${VERSION}"

      - name: Build Release APK (arm64)
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "weltenbibliothek-v${VERSION}-arm64.apk"
          echo "--- APK Size ---"
          ls -lh weltenbibliothek-v${VERSION}-arm64.apk

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: weltenbibliothek-v${{ env.VERSION }}-arm64
          path: weltenbibliothek-v${{ env.VERSION }}-arm64.apk
          retention-days: 90

name: 🔧 LiveKit — Weltenbibliothek einrichten

# Einmalig ausführen um WB-API-Key in bestehendem LiveKit (Mensaena-Instanz)
# hinzuzufügen, Cloudflare-Worker-Secrets zu setzen und Worker zu deployen.
#
# Voraussetzungen:
#   GitHub Secret VPS_PASSWORD  — Root-Passwort Hostinger VPS (72.62.154.95)
#   GitHub Secret CLOUDFLARE_API_TOKEN — Wrangler Deploy-Token

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.trigger-livekit-setup']

permissions:
  contents: read

jobs:
  setup:
    name: 🔑 WB LiveKit-Key + Worker-Setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VPS_HOST: 72.62.154.95
      VPS_USER: root
      LIVEKIT_URL: wss://livekit.srv1438024.hstgr.cloud
      WB_KEY: wb-a9b26485d407e7dc2043
      WB_SECRET: f9c57648d1756868aa7c124b545c029bcb2569b5bf82c1fa5058eefc4efc21d1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠 sshpass installieren
        run: sudo apt-get install -y -qq sshpass

      - name: 🔑 Credentials maskieren
        run: echo "::add-mask::f9c57648d1756868aa7c124b545c029bcb2569b5bf82c1fa5058eefc4efc21d1"

      - name: 🖥 livekit.yaml auf VPS aktualisieren
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail

          YAML_B64=$(printf '%s\n' "port: 7880
redis:
  address: 127.0.0.1:6379
keys:
  mensaena-6dd99c8f63b0: d92c860810313cd704b8959854d4225611fcb1291456603b86a0adcff2cb2a6e
  ${WB_KEY}: ${WB_SECRET}
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true
room:
  auto_create: true
  empty_timeout: 300
logging:
  level: info" | base64 | tr -d '\n')

          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o PasswordAuthentication=yes \
            ${VPS_USER}@${VPS_HOST} \
            "set -euo pipefail
             mkdir -p /docker/livekit
             printf '%s' '${YAML_B64}' | base64 -d > /docker/livekit/livekit.yaml
             echo '✅ livekit.yaml geschrieben'
             if docker ps --format '{{.Names}}' | grep -q livekit; then
               cd /docker/livekit && docker compose restart livekit
               sleep 5
               docker compose ps
             else
               echo 'ℹ️  LiveKit-Container nicht aktiv, kein Restart nötig'
             fi"

      - name: ☁️ Cloudflare Worker-Secrets setzen + deployen
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          npm install -g wrangler@latest --silent 2>&1 | tail -2

          echo "${WB_KEY}"      | wrangler secret put LIVEKIT_API_KEY
          echo "${WB_SECRET}"   | wrangler secret put LIVEKIT_API_SECRET
          echo "${LIVEKIT_URL}" | wrangler secret put LIVEKIT_URL

          wrangler deploy
          echo "✅ Worker deployed mit LiveKit-Secrets"

      - name: ✅ Zusammenfassung
        run: |
          echo "## ✅ LiveKit WB-Setup abgeschlossen" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **LiveKit URL:** \`${LIVEKIT_URL}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **WB API Key:** \`${WB_KEY}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Mensaena-Key:** unverändert ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker:** neu deployed mit LiveKit-Secrets ✅" >> $GITHUB_STEP_SUMMARY

name: 🔧 LiveKit — Worker-Secrets sicherstellen

# Setzt LIVEKIT_API_KEY/SECRET/URL als Cloudflare-Worker-Secrets auf
# jedem main-Push — idempotent, stellt sicher dass der Token-Endpoint
# immer die richtigen Keys kennt, auch nach Worker-Redeploys.
#
# HINWEIS: VPS-Konfiguration (livekit.yaml) wird NICHT mehr per SSH
# geschrieben — die Konfiguration ist im docker-compose.yml der
# LiveKit-Container eingebettet (via Hostinger API gepflegt).

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: livekit-setup
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: 🔑 Worker LiveKit-Secrets setzen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 🔐 Secrets kommen ausschließlich aus GitHub-Secrets — keine Klartext-
    # Werte mehr im Repo. WB_KEY ist nur eine ID (kein Secret), daher als
    # Default ok; WB_SECRET MUSS gesetzt sein.
    env:
      LIVEKIT_URL: ${{ secrets.LIVEKIT_URL || 'wss://livekit-wb.srv1438024.hstgr.cloud' }}
      WB_KEY: ${{ secrets.LIVEKIT_API_KEY || 'wb-a9b26485d407e7dc2043' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟩 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔐 Secret-Validierung
        env:
          WB_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          if [ -z "${WB_SECRET:-}" ]; then
            echo "❌ GitHub-Secret LIVEKIT_API_SECRET fehlt"
            echo "   Setze unter Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ LIVEKIT_API_SECRET ist gesetzt (${#WB_SECRET} Zeichen)"
          # Maskieren damit wrangler-Output das Secret nicht in Logs leakt
          echo "::add-mask::${WB_SECRET}"

      - name: 🚀 Worker deployen (latest Version sicherstellen)
        # Cloudflare lehnt `secret put` ab wenn die letzte Worker-Version
        # nicht deployed ist (Versions-Drift). Daher zuerst deploy.
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN fehlt — Worker-Setup übersprungen"
            exit 1
          fi
          echo "→ wrangler deploy (idempotent, sichert latest version) …"
          npx -y wrangler@3 deploy

      - name: ☁️ Worker-Secrets setzen
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WB_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          set -euo pipefail
          echo "→ LIVEKIT_API_KEY setzen (${WB_KEY})…"
          printf '%s' "${WB_KEY}"      | npx -y wrangler@3 secret put LIVEKIT_API_KEY
          echo "→ LIVEKIT_API_SECRET setzen…"
          printf '%s' "${WB_SECRET}"   | npx -y wrangler@3 secret put LIVEKIT_API_SECRET
          echo "→ LIVEKIT_URL setzen (${LIVEKIT_URL})…"
          printf '%s' "${LIVEKIT_URL}" | npx -y wrangler@3 secret put LIVEKIT_URL
          echo "✅ Alle LiveKit-Secrets gesetzt"

      - name: 📝 Zusammenfassung
        run: |
          echo "## ✅ LiveKit Worker-Secrets gesetzt" >> $GITHUB_STEP_SUMMARY
          echo "- LiveKit URL: \`${LIVEKIT_URL}\`" >> $GITHUB_STEP_SUMMARY
          echo "- WB API Key: \`${WB_KEY}\`" >> $GITHUB_STEP_SUMMARY

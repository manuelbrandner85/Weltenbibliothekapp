name: 🔧 LiveKit — Worker-Secrets sicherstellen

# Setzt LIVEKIT_API_KEY/SECRET/URL als Cloudflare-Worker-Secrets auf
# jedem main-Push — idempotent, stellt sicher dass der Token-Endpoint
# immer die richtigen Keys kennt, auch nach Worker-Redeploys.
#
# HINWEIS: VPS-Konfiguration (livekit.yaml) wird NICHT mehr per SSH
# geschrieben — die Konfiguration ist im docker-compose.yml der
# LiveKit-Container eingebettet (via Hostinger API gepflegt).

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: livekit-setup
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: 🔑 Worker LiveKit-Secrets setzen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LIVEKIT_URL: wss://livekit.srv1438024.hstgr.cloud
      WB_KEY: wb-a9b26485d407e7dc2043
      WB_SECRET: f9c57648d1756868aa7c124b545c029bcb2569b5bf82c1fa5058eefc4efc21d1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟩 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔑 Secret maskieren
        run: echo "::add-mask::f9c57648d1756868aa7c124b545c029bcb2569b5bf82c1fa5058eefc4efc21d1"

      - name: ☁️ Worker-Secrets setzen
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN fehlt — Worker-Setup übersprungen"
            exit 1
          fi
          echo "→ LIVEKIT_API_KEY setzen (${WB_KEY})…"
          printf '%s' "${WB_KEY}"      | npx -y wrangler@3 secret put LIVEKIT_API_KEY
          echo "→ LIVEKIT_API_SECRET setzen…"
          printf '%s' "${WB_SECRET}"   | npx -y wrangler@3 secret put LIVEKIT_API_SECRET
          echo "→ LIVEKIT_URL setzen (${LIVEKIT_URL})…"
          printf '%s' "${LIVEKIT_URL}" | npx -y wrangler@3 secret put LIVEKIT_URL
          echo "✅ Alle LiveKit-Secrets gesetzt"

      - name: 📝 Zusammenfassung
        run: |
          echo "## ✅ LiveKit Worker-Secrets gesetzt" >> $GITHUB_STEP_SUMMARY
          echo "- LiveKit URL: \`${LIVEKIT_URL}\`" >> $GITHUB_STEP_SUMMARY
          echo "- WB API Key: \`${WB_KEY}\`" >> $GITHUB_STEP_SUMMARY

name: 🏗️ Build & Release APK

on:
  push:
    branches:
      - genspark_ai_developer
      - 'claude/**'
    paths:
      - 'pubspec.yaml'
      - 'lib/**'
      - 'android/**'
      - '.github/workflows/build_apk.yml'
  workflow_dispatch:
    inputs:
      version_note:
        description: 'Versions-Notiz'
        required: false
        default: 'Manueller Build'

permissions:
  contents: write

jobs:
  build-apk:
    name: 🔨 Flutter APK Build (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: 📦 pub get
        run: flutter pub get

      - name: 🔍 analyze
        run: flutter analyze --no-fatal-infos || true

      - name: 📋 Version lesen
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "apk_name=weltenbibliothek-v${VERSION}-arm64.apk" >> $GITHUB_OUTPUT

      - name: 🏗️ APK bauen
        run: flutter build apk --release --target-platform android-arm64

      - name: 📝 APK umbenennen
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      - name: 📤 Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      - name: 🚀 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }} – Weltenbibliothek
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


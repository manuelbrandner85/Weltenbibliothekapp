name: 🏗️ Build & Release APK

on:
  push:
    branches:
      - genspark_ai_developer
      - 'claude/**'
    paths:
      - 'pubspec.yaml'
      - 'lib/**'
      - 'android/**'
      - 'shorebird.yaml'
      - '.github/workflows/build_apk.yml'
  workflow_dispatch:
    inputs:
      version_note:
        description: 'Versions-Notiz'
        required: false
        default: 'Manueller Build'

permissions:
  contents: write

jobs:
  build-apk:
    name: 🔨 Shorebird Release Build (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: 🔍 Diagnose
        run: |
          echo "=== shorebird version ==="
          shorebird --version
          echo "=== flutter version ==="
          flutter --version
          echo "=== shorebird.yaml ==="
          cat shorebird.yaml
          echo "=== pubspec version ==="
          grep '^version:' pubspec.yaml
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📦 pub get
        run: flutter pub get

      - name: 📋 Version lesen
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "apk_name=weltenbibliothek-v${VERSION}-arm64.apk" >> $GITHUB_OUTPUT

      - name: 🏗️ Shorebird Release
        run: |
          shorebird release android \
            --artifact=apk \
            --target-platform=android-arm64 \
            --dart-define=SUPABASE_URL=https://adtviduaftdquvfjpojb.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdHZpZHVhZnRkcXV2Zmpwb2piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzY3OTcsImV4cCI6MjA5MDcxMjc5N30.LPtmnjukb6o2CA16RDjoStqYb_1bipNULD4tgOfuD98 \
            --dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev \
            2>&1 | tee /tmp/shorebird_release.log ; exit ${PIPESTATUS[0]}
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📝 APK umbenennen
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      - name: 📤 Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      - name: 🚀 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }} – Weltenbibliothek
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Shorebird Log hochladen (bei Fehler)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shorebird-debug-log
          path: /tmp/shorebird_release.log
          retention-days: 7

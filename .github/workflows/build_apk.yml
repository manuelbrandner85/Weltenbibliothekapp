name: 🏗️ Build & Release APK

on:
  # Release-Build triggert auf drei Wegen (ab v5.36.0 vollautomatisch):
  #   1. Push auf main mit geänderter pubspec.yaml (neue Version) — VOLLAUTOMATISCH,
  #      Tag wird vom Workflow selbst via softprops/action-gh-release erstellt.
  #      min_version + changelog werden AUTOMATISCH aus Git generiert (kein current.json!).
  #   2. Explizit gepushter Version-Tag (v5.32.0, ...) — Legacy/manueller Weg,
  #      funktioniert weiterhin falls jemand manuell taggen will.
  #   3. workflow_dispatch — manuelles Triggern aus der UI (auch für Feature-Branches).
  # Für reine Dart-Änderungen bitte "🚀 Shorebird OTA Patch" verwenden, nicht diesen Workflow.
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version_note:
        description: 'Versions-Notiz'
        required: false
        default: 'Manueller Build'

permissions:
  contents: write

jobs:
  # Pre-Check: Release nur bauen wenn noch keiner mit dieser Version existiert.
  # Verhindert Doppel-Builds bei pubspec.yaml-Edits die die Version NICHT ändern
  # (z.B. Dependency-Updates, Kommentare).
  #
  # Außerdem ermittelt der Job AUTOMATISCH:
  #   - prev_version: aus letztem GitHub-Release (= min_version für app_config)
  #   - changelog:    aus Git-Commits seit letztem Tag
  # Kein current.json-Manifest mehr nötig.
  check:
    name: 🔎 Release-Bedarf prüfen
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.v.outputs.version }}
      should_build: ${{ steps.v.outputs.should_build }}
      prev_version: ${{ steps.v.outputs.prev_version }}
      changelog:    ${{ steps.v.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # volle Git-History für Changelog-Generierung
      - id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Bei Tag-Push IMMER bauen (expliziter Release-Wunsch).
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "✅ Tag-Push → bauen"
            SHOULD_BUILD=true
          else
            # Bei main-Push / workflow_dispatch: nur bauen wenn GitHub-Release noch fehlt.
            if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "⏭️  Release v$VERSION existiert bereits — skip"
              SHOULD_BUILD=false
            else
              echo "✅ Kein Release für v$VERSION → bauen"
              SHOULD_BUILD=true
            fi
          fi
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT

          # AUTO min_version: letzte veröffentlichte GitHub-Release-Version.
          # User unter dieser Version sehen den Force-Update-Screen.
          # Fallback (erster Release überhaupt): aktuelle VERSION (→ keine Force-Updates).
          PREV_VERSION=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 \
            --json tagName --jq '.[0].tagName // empty' 2>/dev/null | sed 's/^v//' || true)
          if [ -z "$PREV_VERSION" ]; then
            PREV_VERSION="$VERSION"
            echo "ℹ️  Kein vorheriger Release gefunden → prev_version=$PREV_VERSION"
          else
            echo "✅ prev_version=$PREV_VERSION (= min_version für app_config)"
          fi
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT

          # AUTO changelog: Git-Commits seit letztem Tag (oder letzte 10 bei erstem Release).
          # Filtert chore/ci/Merge-Commits raus. Fallback: generischer Text.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"• %s" --no-merges 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" | head -20 || true)
          else
            CHANGELOG=$(git log --pretty=format:"• %s" --no-merges -10 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" || true)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="• Bugfixes und Verbesserungen"
          fi

          {
            echo "changelog<<EOF_CHANGELOG"
            echo "$CHANGELOG"
            echo "EOF_CHANGELOG"
          } >> $GITHUB_OUTPUT
          echo "✅ Changelog generiert (seit ${LAST_TAG:-initial}):"
          echo "$CHANGELOG"

  build-apk:
    name: 🔨 Shorebird Release Build (arm64 + arm32)
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Shorebird
        # CLI-Version pinnen (identisch zu shorebird_patch.yml) damit Release-Engine
        # und Patch-Engine dieselben Snapshot-Bytes haben. Ohne Pin driftet
        # setup-shorebird@v1 auf die jeweils neueste CLI — Patches werden dann zwar
        # uploaded, aber vom Gerät still verworfen weil Engine-Hashes nicht matchen.
        # Siehe CLAUDE.md "Shorebird OTA-Patch Konfiguration".
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-version: 1.6.92
          cache: true

      - name: 🔐 Release-Keystore aus Secrets dekodieren
        # Secrets (einmalig in GitHub Repo → Settings → Secrets einrichten):
        #   ANDROID_KEYSTORE_BASE64   — base64 der weltenbibliothek.jks
        #   ANDROID_KEYSTORE_PASSWORD — store-password
        #   ANDROID_KEY_ALIAS         — Alias (z.B. "weltenbibliothek")
        #   ANDROID_KEY_PASSWORD      — key-password
        # Ohne Secrets → Step überspringt, Build nutzt Debug-Key (nicht update-kompatibel).
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/weltenbibliothek.jks
          cat > android/key.properties <<EOF
          storeFile=app/weltenbibliothek.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "✅ Release-Keystore + key.properties erstellt"

      - name: 📋 Version lesen
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "apk_name=weltenbibliothek-v${VERSION}-universal.apk" >> $GITHUB_OUTPUT

      - name: 🏗️ Shorebird Release (arm64 + arm32)
        run: |
          shorebird release android \
            --artifact=apk \
            --target-platform=android-arm64,android-arm \
            --dart-define=APP_VERSION=${{ steps.version.outputs.version }} \
            --dart-define=SUPABASE_URL=https://adtviduaftdquvfjpojb.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdHZpZHVhZnRkcXV2Zmpwb2piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzY3OTcsImV4cCI6MjA5MDcxMjc5N30.LPtmnjukb6o2CA16RDjoStqYb_1bipNULD4tgOfuD98 \
            --dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📝 APK umbenennen
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      - name: 📤 APK Artefakt
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      - name: 🚀 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }} – Weltenbibliothek
          body: |
            ## Weltenbibliothek v${{ steps.version.outputs.version }}

            ### Was ist neu
            ${{ needs.check.outputs.changelog }}

            ### Installation
            APK herunterladen und auf dem Gerät installieren (Sideloading).
            Installiert sich direkt über die vorherige Version — kein Deinstallieren nötig
            (identischer Signing-Key ab v5.34.0).

            OTA-Updates danach automatisch via Shorebird (nur Dart-Änderungen).
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Supabase app_config updaten (In-App-Update-Dialog)
        # Hebt public.app_config auf die neue Version. Erst NACH erfolgreichem
        # GitHub-Release — sonst würden User einen 404 beim APK-Download sehen.
        # Nutzt SUPABASE_SERVICE_ROLE_KEY (umgeht RLS).
        #
        # UPSERT (nicht PATCH): POST mit "Prefer: resolution=merge-duplicates".
        # Erstellt die Zeile automatisch falls sie fehlt (frische DB / erster Release).
        env:
          SUPABASE_URL: https://adtviduaftdquvfjpojb.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          MIN_VERSION: ${{ needs.check.outputs.prev_version }}
          CHANGELOG: ${{ needs.check.outputs.changelog }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "❌ SUPABASE_SERVICE_ROLE_KEY Secret fehlt — app_config wurde NICHT aktualisiert"
            exit 1
          fi

          APK_URL="https://github.com/manuelbrandner85/Weltenbibliothekapp/releases/download/v${VERSION}/weltenbibliothek-v${VERSION}-universal.apk"
          NOTES_URL="https://github.com/manuelbrandner85/Weltenbibliothekapp/releases/tag/v${VERSION}"

          BODY=$(jq -n \
            --arg lv "$VERSION" \
            --arg mv "$MIN_VERSION" \
            --arg url "$APK_URL" \
            --arg cl "$CHANGELOG" \
            --arg notes "$NOTES_URL" \
            '{platform:"android", latest_version:$lv, min_version:$mv, apk_download_url:$url, changelog:$cl, release_notes_url:$notes}')

          echo "→ UPSERT app_config: latest=$VERSION min=$MIN_VERSION"
          # ?on_conflict=platform: PostgREST-UPSERT auf UNIQUE-Spalte (nicht PK).
          HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/app_config?on_conflict=platform" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "$BODY")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "❌ Supabase-Update fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/resp.json
            exit 1
          fi
          echo "✅ app_config aktualisiert — User auf v${MIN_VERSION}+ sehen Update-Dialog"
          cat /tmp/resp.json | jq '.'

name: 🐦 Shorebird Android RELEASE (auto + manuell)

# Erstellt einen NEUEN Shorebird-Release. Nutzen wenn:
#   • pubspec.yaml hat native Änderungen (neue Plugins, Permissions, Kotlin/Gradle)
#   • Patch-Workflow scheitert mit "Release not found: X.Y.Z+BBBBB"
#   • Bewusster Release-Schnitt (z.B. Major-Feature-Bundle)
#
# Nach erfolgreichem Run patcht der reguläre shorebird_patch.yml-Workflow
# wieder gegen diese neue Release-Version.
#
# Trigger:
#   • workflow_dispatch (manueller Fallback). Wird normalerweise NICHT
#     gebraucht weil build_apk.yml's 'Shorebird Release Build' Job bereits
#     den Shorebird-Release publiziert (siehe Log: 'Creating release...
#     Uploading artifacts'). Dieser Workflow ist nur fuer:
#       a) Historischen Build neu publizieren wenn Shorebird-Console
#          zickt
#       b) Re-Upload nach geloeschtem Release in Shorebird-Console
#       c) Force-Release wenn build_apk.yml fehlschlug (z.B. APK-Tag-
#          Kollision) aber das AAB trotzdem hochgeladen werden soll.
#
# Frueher hatte dieser Workflow einen 'workflow_run'-Auto-Trigger nach
# build_apk -- der schlug aber immer fehl mit 'release exists' weil
# build_apk den Shorebird-Release schon selbst publiziert. Entfernt.
#
# WICHTIG: Build-Nummer in pubspec.yaml muss VOR dem Run gebumpt sein --
# pro CLAUDE.md-Regel 1.

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch der gereleased wird'
        required: false
        default: 'main'

permissions:
  contents: read

# Nur 1 Release pro Branch gleichzeitig. Cancel-in-Progress NICHT aktivieren —
# Releases sind wertvoll und sollten nicht mittendrin abgebrochen werden.
concurrency:
  group: shorebird-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: 🐦 Shorebird Release android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_branch || 'main' }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Selbe Shorebird-CLI-Pinnung wie im Patch-Workflow — damit Engine-Snapshot
      # konsistent bleibt und folgende Patches matchen.
      - name: 🐦 Shorebird (Setup)
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: false

      - name: 🔧 Shorebird CLI auf v1.6.92 downpinnen (gegen Engine-Drift)
        run: |
          set -euo pipefail
          SHOREBIRD_BIN=$(command -v shorebird)
          SHOREBIRD_ROOT=$(dirname "$(dirname "$SHOREBIRD_BIN")")
          cd "$SHOREBIRD_ROOT"
          git fetch --tags --force --depth=1 origin v1.6.92
          git checkout --force v1.6.92
          rm -f bin/cache/shorebird.snapshot bin/cache/shorebird.snapshot.tmp || true
          shorebird --version

      - name: 📋 Version lesen
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION = $VERSION"
          echo "FULL = $FULL_VERSION"

      - name: 🔑 Supabase-Credentials ableiten (nur aus GitHub Secrets)
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            _URL="https://${SUPABASE_PROJECT_ID}.supabase.co"
          else
            _PAYLOAD=$(echo "${SUPABASE_SERVICE_ROLE_KEY}" | cut -d'.' -f2)
            _PAD=$(( (4 - ${#_PAYLOAD} % 4) % 4 ))
            _PADDED="${_PAYLOAD}$(printf '=%.0s' $(seq 1 $_PAD) 2>/dev/null || true)"
            _URL=$(echo "${_PADDED}" | base64 -d 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('https://'+d['ref']+'.supabase.co')" 2>/dev/null || echo "")
          fi
          if [ -z "${_URL:-}" ]; then
            echo "❌ Supabase-URL konnte nicht ermittelt werden"
            exit 1
          fi
          echo "SUPABASE_URL=${_URL}" >> $GITHUB_ENV
          echo "📌 SUPABASE_URL=${_URL}"

          _ANON_KEY=""
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            _ANON_KEY=$(curl -sf \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/api-keys" \
              | python3 -c "import sys,json; keys=json.load(sys.stdin); print(next((k['api_key'] for k in keys if k['name']=='anon'), ''))" \
              2>/dev/null || echo "")
          fi
          if [ -n "${_ANON_KEY:-}" ]; then
            echo "SUPABASE_ANON_KEY=${_ANON_KEY}" >> $GITHUB_ENV
            echo "✅ anon key abgerufen"
          else
            echo "SUPABASE_ANON_KEY=" >> $GITHUB_ENV
          fi

      - name: 🔔 google-services.json aus Secret dekodieren (FCM)
        if: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          RAW="$GOOGLE_SERVICES_JSON_BASE64"
          CLEANED=$(printf '%s' "$RAW" | tr -d '[:space:]')
          if printf '%s' "$CLEANED" | base64 -d > android/app/google-services.json 2>/dev/null \
               && jq -e .project_info.project_id android/app/google-services.json >/dev/null; then
            echo "✅ google-services.json injiziert (base64)"
          elif printf '%s' "$RAW" | jq -e .project_info.project_id >/dev/null 2>&1; then
            printf '%s' "$RAW" > android/app/google-services.json
            echo "✅ google-services.json injiziert (rohes JSON)"
          else
            echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 ist weder gültiges base64 noch rohes JSON"
            rm -f android/app/google-services.json
          fi

      - name: 🩺 Shorebird-Status (vor Release)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          echo "=== shorebird --version ==="
          shorebird --version || true
          echo "=== shorebird releases list --platforms=android ==="
          shorebird releases list --platforms=android 2>&1 || true

      - name: 🐦 Release veröffentlichen
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          set -euo pipefail
          FULL_VERSION="${{ steps.version.outputs.full_version }}"
          echo "Erstelle Release: $FULL_VERSION"

          # --no-confirm — keine interaktive Bestätigung in CI
          # --target-platform NICHT mehr setzen: Shorebird's interner Build
          # haengt diesen Flag selbst dran (mit Default arm+arm64+x64).
          # Wenn wir es zusaetzlich uebergeben, sieht Flutter den Flag
          # 2x -> 'libapp.so is a duplicate' Gradle-Fehler. abiFilters in
          # android/app/build.gradle.kts strippt x64 schon zur Build-Zeit.
          shorebird release android \
            --no-confirm \
            -- \
            "--dart-define=APP_VERSION=${{ steps.version.outputs.version }}" \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            "--dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev" \
            "--dart-define=LIVEKIT_URL=${{ secrets.LIVEKIT_URL || 'wss://livekit-wb.srv1438024.hstgr.cloud' }}" \
            "--dart-define=ADMIN_AUTH_SECRET=${{ secrets.ADMIN_AUTH_SECRET }}"

          echo "✅ Release $FULL_VERSION publiziert"

      - name: 📦 APK als Artifact hochladen
        # Shorebird-Release baut auch ein normales APK. User kann es runterladen
        # und z.B. via Telegram/Drive an Tester verteilen.
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: weltenbibliothek-${{ steps.version.outputs.full_version }}.apk
          path: build/app/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: 📝 Update-History Eintrag (release)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt — kein History-Eintrag"
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CL=$(git log "$LAST_TAG"..HEAD --pretty=format:"• %s" --no-merges 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" | head -20 || true)
          else
            CL=$(git log --pretty=format:"• %s" --no-merges -10 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" || true)
          fi
          if [ -z "$CL" ]; then CL="• Major-Release mit nativen Änderungen"; fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY=$(jq -n \
            --arg v "$VERSION" \
            --arg cl "$CL" \
            --arg url "$RUN_URL" \
            '{"type":"release","version":$v,"changelog":$cl,"github_run_url":$url}')

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/update_history" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY")
          [ "$HTTP_CODE" = "201" ] && echo "✅ update_history Eintrag gesetzt" \
            || echo "⚠️  update_history INSERT fehlgeschlagen (HTTP $HTTP_CODE)"

# Vorschlag D: Claude-Code-Bruecke fuer LOGIK-Module (interaktive Tools).
#
# Reagiert auf GitHub-Issues mit dem Label 'module-tool-request' (erstellt aus
# der Modul-Werkstatt im Admin-Dashboard). Claude Code liest die Spezifikation
# aus dem Issue, implementiert das Tool und oeffnet einen Pull Request.
#
# WICHTIG -- einmalig einzurichten (sonst laeuft der Job nicht):
#   1. Repo-Secret ANTHROPIC_API_KEY setzen
#      (Settings -> Secrets and variables -> Actions -> New repository secret)
#   2. Optional: CLAUDE_CODE_OAUTH_TOKEN statt API-Key (Claude-Abo)
#
# Der entstehende PR wird NICHT automatisch gemergt -- Root-Admin reviewt + merged
# manuell, danach greift der bestehende Shorebird/APK-Build.

name: Claude Modul-Tool

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write  # noetig: claude-code-action holt einen OIDC-Token (sonst rot)

jobs:
  implement-tool:
    # Nur wenn das Label gesetzt ist.
    if: contains(github.event.issue.labels.*.name, 'module-tool-request')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Guard -- Secret vorhanden?
        id: guard
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Hinweis wenn kein Secret
        if: steps.guard.outputs.has_key == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Claude Code ist noch nicht eingerichtet: bitte das Repo-Secret `ANTHROPIC_API_KEY` (oder `CLAUDE_CODE_OAUTH_TOKEN`) setzen. Danach das Label erneut setzen, um den Lauf zu starten.'
            });

      - name: Claude Code -- Tool implementieren
        if: steps.guard.outputs.has_key == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Claude liest das Issue (Titel + Body) als Aufgabe und oeffnet einen PR.
          prompt: |
            Implementiere das in diesem GitHub-Issue beschriebene interaktive Tool
            (LOGIK-Modul) fuer die Flutter-App. Halte dich an die Projektregeln in
            CLAUDE.md: keine Named Dart 3 Records in lib/, flutter analyze = 0 Errors,
            deutsche UI-Texte, ASCII-only Commit-Messages.

            WICHTIG -- das Tool MUSS in der App sichtbar + aufrufbar sein, sonst ist
            die Aufgabe NICHT erledigt. Die App hat KEINE dynamische Tool-Ladung;
            jedes Tool ist in einer hartkodierten Liste registriert. Pflichtschritte:

            1. Widget-Screen anlegen:
               - Welt 'energie' -> Datei unter lib/screens/energie/calculators/
               - Welt 'materie' -> Datei unter lib/screens/materie/tools/
            2. Tool in die zentrale Liste eintragen, damit es im Raster erscheint:
               - energie: in lib/screens/energie/spirit_tab_modern.dart den neuen
                 Screen importieren UND einen Eintrag zur Liste _allTools hinzufuegen
                 (mit title, subtitle, category, icon, color, screen oder screenBuilder).
                 Waehle eine PASSENDE bestehende category (z.B. numerologie, meditation,
                 orakel, energie, astro, psyche, wissen).
               - materie: in lib/screens/materie/tools/osint_tools_hub.dart den neuen
                 Screen importieren UND einen _DbDef-Eintrag zur Liste _tools hinzufuegen
                 (mit icon, label, sub, color, description, customScreenBuilder).
            3. In den PR-Body einen Abschnitt schreiben:
               "## Fundort in der App" mit dem GENAUEN Pfad, wo der User das Tool findet
               (Welt -> Tab/Hub -> Kategorie -> Tool-Name).
            4. In den PR-Body die Zeile "Closes #${{ github.event.issue.number }}".

            Falls du die genaue Listenstelle nicht findest, suche nach "_allTools" bzw.
            "_tools" / "_DbDef" in den genannten Dateien -- dort werden alle bestehenden
            Tools registriert; haenge deinen Eintrag analog an.

            Erstelle einen Branch und oeffne einen Pull-Request. Merge NICHT selbst --
            das uebernimmt der nachgelagerte Auto-Merge-Schritt.
          # Branch-Praefix fuer den entstehenden PR.
          branch_prefix: "claude/tool-"
          # WICHTIG: Ohne diese Berechtigungen verweigert die Action jeden Schreib-,
          # git- und PR-Schritt (permission_denials_count > 0) und der Lauf endet
          # "erfolgreich" OHNE PR. In dieser vertrauenswuerdigen internen Automation
          # alle Tools freigeben, damit Claude Dateien schreiben, committen und einen
          # PR oeffnen kann. --max-turns hoch genug fuer einen kompletten Tool-Build.
          claude_args: |
            --max-turns 60
            --permission-mode bypassPermissions

      # Sobald das Tool gebaut + der PR geoeffnet ist: automatisch per Squash mergen.
      # Wir nutzen GH_PAT (nicht den Default-GITHUB_TOKEN), damit der Merge-Push auf
      # main die nachgelagerten Pipelines (build_web.yml Record-Guard, build_apk.yml /
      # Shorebird) AUSLOEST -- mit dem Default-Token wuerden sie nicht starten.
      # Sicherheitsnetz: scheitert der main-Build (z.B. dart2js-Record), wird KEIN
      # APK/Patch veroeffentlicht -- ein kaputtes Tool erreicht also nie die User.
      - name: Tool-PR automatisch mergen
        if: steps.guard.outputs.has_key == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const issue = context.issue.number;
            // Der claude-code-action-Schritt braucht einen Moment, bis der PR steht.
            await new Promise(r => setTimeout(r, 8000));
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', per_page: 50, sort: 'created', direction: 'desc',
            });
            const pr = prs.find(p =>
              p.head.ref.startsWith('claude/tool-') &&
              (p.body || '').includes('#' + issue));
            if (!pr) {
              core.warning('Kein Tool-PR fuer Issue #' + issue + ' gefunden -- Bau evtl. fehlgeschlagen, nichts gemergt.');
              return;
            }
            // Draft -> ready, sonst ist kein Merge moeglich.
            if (pr.draft) {
              await github.graphql(
                'mutation($id:ID!){markPullRequestReadyForReview(input:{pullRequestId:$id}){pullRequest{number}}}',
                { id: pr.node_id });
            }
            await github.rest.pulls.merge({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: pr.number, merge_method: 'squash',
            });
            core.info('Tool-PR #' + pr.number + ' automatisch gemergt.');

            // Fundort fuer den Admin: Welt aus dem Issue-Body lesen und den genauen
            // Ort in der App nennen, plus den von Claude geschriebenen "Fundort"-Block.
            const { data: iss } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issue });
            const body = iss.body || '';
            const world = (body.match(/\*\*Welt:\*\*\s*(\w+)/i) || [])[1] || '';
            let ort;
            if (world === 'energie') {
              ort = 'Energie-Welt -> unten Tab "Spirit" -> im Tool-Raster (Kategorie laut PR).';
            } else if (world === 'materie') {
              ort = 'Materie-Welt -> Home -> Kachel "Recherche-Werkzeuge" -> im Tool-Raster.';
            } else {
              ort = 'Im Tool-Raster der jeweiligen Welt (' + (world || 'siehe PR') + ').';
            }
            const claudeFundort = (pr.body || '').match(/##\s*Fundort in der App[\s\S]*?(?=\n##\s|$)/i);
            const detail = claudeFundort ? '\n\n' + claudeFundort[0].trim() : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issue,
              body: '[OK] Tool gebaut + automatisch gemergt (PR #' + pr.number + ').\n\n' +
                    '**Wo finde ich es in der App?**\n' + ort + '\n\n' +
                    'Sichtbar nach dem naechsten Update (OTA-Patch automatisch, sonst neues APK). ' +
                    'Daten/Inhalte aenderst du sofort ueber "Inhalte verwalten".' + detail,
            });

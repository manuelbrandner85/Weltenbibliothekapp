name: "God Mode -- Claude baut autonom"

# Triggert wenn der Worker ein Issue mit Label "godmode" anlegt.
# Claude implementiert den Auftrag, oeffnet PR, Verify-Gate prueft,
# bei gruen Auto-Merge per PAT -> build_web + shorebird_patch (OTA).
#
# Benoetigte Secrets (alle bereits im Repo vorhanden -- nichts Neues noetig):
#   CLAUDE_CODE_OAUTH_TOKEN  -- Claude Code OAuth-Token (Fallback ANTHROPIC_API_KEY)
#   GH_PAT                   -- GitHub PAT (repo + workflow) fuer Issue-Anlage
#                              (Worker) und Merge (Workflow)
#   SUPABASE_SERVICE_ROLE_KEY -- Status-Updates in godmode_requests

on:
  issues:
    # Nur auf "opened" -- NICHT "labeled". Der Worker legt jedes God-Mode-Issue
    # (auch beim Retry) MIT dem godmode-Label an, daher traegt schon das
    # opened-Event das Label. So laeuft GENAU EIN Build pro Auftrag.
    # Frueher (types:[labeled]) feuerten die nachgereichten Triage-Labels
    # (cat:/type:/priority:) je ein weiteres labeled-Event -> zusaetzliche Runs,
    # die mit cancel-in-progress den echten Build abbrachen (-> nie gruen).
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  # cancel-in-progress: false -- ein zweites Event darf den laufenden Build NIE
  # abbrechen (genau das machte zuvor alle Runs grau statt gruen).
  group: godmode-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  build:
    name: "Claude implementiert God-Mode-Auftrag"
    if: contains(github.event.issue.labels.*.name, 'godmode')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      BRANCH_NAME: godmode/issue-${{ github.event.issue.number }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL_FB: https://adtviduaftdquvfjpojb.supabase.co

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: "Flutter Setup"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: "Status -> building (Supabase)"
        continue-on-error: true
        run: |
          [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && exit 0
          curl -s -X PATCH \
            "${SUPABASE_URL_FB}/rest/v1/godmode_requests?issue_number=eq.${ISSUE_NUMBER}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status":"building"}' || true

      - name: "Claude Code Action"
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          claude_args: "--model claude-opus-4-8 --max-turns 80 --permission-mode bypassPermissions"
          prompt: |
            Du bist Claude Code und baust autonom einen God-Mode-Auftrag fuer die
            Flutter-App "Weltenbibliothek" (Stack: Flutter/Dart + Supabase +
            Cloudflare Worker + Shorebird OTA + LiveKit).

            Lies Issue #${{ github.event.issue.number }} vollstaendig, dann:

            1. Lies CLAUDE.md -- halte ALLE Kernregeln ein:
               - Commits nur ASCII, Format type(scope): beschreibung
               - KEINE Named Dart-3 Record Types (crashen dart2js)
               - Deutsche UI-Texte, englische Code-Kommentare
               - flutter analyze = 0 Errors, dart format . vor Commit
               - RLS-Pflicht auf neuen Tabellen, Secrets nie im Client
            2. Nutze die installierten Skills in .claude/skills/ aktiv:
               flutter-*, supabase, cloudflare, shorebird-ota,
               systematic-debugging, static-analysis, ...
            3. Branch: godmode/issue-${{ github.event.issue.number }}
            4. Implementiere die Aenderung sauber und vollstaendig -- FULL-STACK
               ueber die GANZE App, nicht nur Flutter:
               - Frontend: lib/ (Flutter/Dart)
               - Backend: workers/api-worker.js (Cloudflare Worker) -- bei neuen
                 Endpoints `node --check workers/api-worker.js`; Secrets NUR via
                 env, niemals hardcoden.
               - Datenbank: supabase/migrations/*.sql -- neue Tabellen IMMER mit
                 RLS (enable + Policies), service_role nur im Worker.
               Verschaffe dir zuerst per Suche (grep/Lesen) einen Ueberblick ueber
               den betroffenen Bereich, bevor du Code aenderst.
               Bugfixes: Ursache beheben, nicht Symptom. Neue Features/Module:
               in der App registrieren und verlinken.
               WICHTIG: Fehlen Details, triff sinnvolle, zum bestehenden Code
               passende Annahmen, dokumentiere sie im PR-Body unter "Annahmen"
               und setze TROTZDEM vollstaendig um. NIE wegen Unklarheit abbrechen.
            5. dart format . && flutter analyze (0 Errors pflicht)
            6. Committe (ASCII), pushe den Branch.
            7. Oeffne PR gegen main mit:
               - "Closes #${{ github.event.issue.number }}" im Body
               - Abschnitt "Was geaendert"
               - Abschnitt "Fundort in der App"
               - "[OK] Patch-kompatibel" oder "[!] Neuer Release noetig"
            8. IMMER einen PR oeffnen -- auch bei knappem Auftrag (mit
               dokumentierten Annahmen). Nur als allerletzte Option, wenn die
               Umsetzung technisch unmoeglich ist (z.B. fehlende externe
               Credentials/APIs), das Issue kommentieren statt einen PR zu oeffnen.

      - name: "PR ermitteln"
        id: findpr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const issue = Number(process.env.ISSUE_NUMBER);
            const branch = process.env.BRANCH_NAME;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', per_page: 100,
            });
            const re = new RegExp(`(closes|fixes|resolves)\\s+#${issue}\\b`, 'i');
            const match = prs.find(p =>
              p.head.ref === branch || re.test(p.body || '')
            );
            if (!match) {
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            core.setOutput('number', String(match.number));
            core.setOutput('head', match.head.ref);
            core.setOutput('url', match.html_url);

      # ── Selbst-Review (Doppel-Opus) ──────────────────────────────────────
      # Eine ZWEITE Opus-4.8-Instanz reviewt den Diff kritisch (Bugs/Security/
      # CLAUDE.md/Vollstaendigkeit) und fixt Probleme auf demselben Branch,
      # BEVOR das Verify-Gate + der Merge laufen. Hebt die Qualitaet deutlich.
      - name: "Selbst-Review (Doppel-Opus)"
        if: steps.findpr.outputs.found == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          claude_args: "--model claude-opus-4-8 --max-turns 40 --permission-mode bypassPermissions"
          prompt: |
            Du bist ein strenger Senior-Code-Reviewer (zweite, unabhaengige Instanz)
            fuer den God-Mode-PR zu Issue #${{ github.event.issue.number }}.
            Branch: ${{ steps.findpr.outputs.head }}.

            1. Checke den Branch aus:
               git fetch origin ${{ steps.findpr.outputs.head }} && \
               git checkout ${{ steps.findpr.outputs.head }}
            2. Reviewe den Diff gegen origin/main KRITISCH auf:
               - echte Bugs / Regressionen / fehlende Null-Safety
               - Security: keine Secrets im Client, RLS beachtet, service_role nur im Worker
               - CLAUDE.md: KEINE Named Dart-3 Records, deutsche UI-Texte, ASCII-Commits,
                 Build-Nummer nur bei nativen Aenderungen
               - Vollstaendigkeit: ist das Feature wirklich in der App registriert + verlinkt
                 (Route/Tab/Button), nicht nur Code?
            3. Findest du Probleme: behebe sie an der Ursache, `dart format .`, committe
               (ASCII, z.B. "fix(review): ...") und pushe auf denselben Branch.
               Ist alles sauber: aendere nichts.
            Merge NICHT selbst -- das uebernimmt ein spaeterer Schritt.

      - name: "Verify-Gate (analyze + web build)"
        id: verify
        if: steps.findpr.outputs.found == 'true'
        run: |
          set +e
          git fetch origin "${{ steps.findpr.outputs.head }}"
          git checkout "${{ steps.findpr.outputs.head }}"
          bash scripts/godmode_verify.sh
          echo "ok=$( [ -f .godmode_verify_ok ] && cat .godmode_verify_ok || echo false )" >> "$GITHUB_OUTPUT"

      # ── Auto-Fix-Loop ────────────────────────────────────────────────────
      # Verify rot? Claude bekommt die exakten Fehler und fixt sie autonom,
      # committet auf denselben Branch. Danach wird erneut verifiziert.
      - name: "Auto-Fix bei rotem Verify-Gate"
        id: autofix
        if: steps.findpr.outputs.found == 'true' && steps.verify.outputs.ok != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          claude_args: "--model claude-opus-4-8 --max-turns 60 --permission-mode bypassPermissions"
          prompt: |
            Das Verify-Gate fuer Issue #${{ github.event.issue.number }} ist ROT.
            Branch: ${{ steps.findpr.outputs.head }} (bereits ausgecheckt).

            In der Datei `.godmode_verify_errors.log` stehen die exakten Fehler
            (flutter analyze / dart2js-Record-Guard / flutter build web).

            Deine Aufgabe -- mach das Verify-Gate gruen:
            1. Lies `.godmode_verify_errors.log` vollstaendig.
            2. Behebe ALLE Fehler an der Ursache (nicht das Symptom unterdruecken).
               Beachte CLAUDE.md: KEINE Named Dart-3 Records (crashen dart2js),
               deutsche UI-Texte, ASCII-Commits.
            3. Pruefe lokal: `dart format .` dann
               `flutter analyze --no-fatal-infos --no-fatal-warnings`
               und `python3 scripts/check_dart_records.py` -- beide muessen sauber sein.
            4. Committe (ASCII, z.B. "fix(godmode): verify-gate gruen") und pushe
               auf denselben Branch ${{ steps.findpr.outputs.head }}.
            Merge NICHT selbst -- das uebernimmt der nachgelagerte Schritt.

      - name: "Re-Verify nach Auto-Fix"
        id: verify2
        if: steps.findpr.outputs.found == 'true' && steps.verify.outputs.ok != 'true'
        run: |
          set +e
          git fetch origin "${{ steps.findpr.outputs.head }}"
          git checkout "${{ steps.findpr.outputs.head }}"
          git reset --hard "origin/${{ steps.findpr.outputs.head }}"
          bash scripts/godmode_verify.sh
          echo "ok=$( [ -f .godmode_verify_ok ] && cat .godmode_verify_ok || echo false )" >> "$GITHUB_OUTPUT"

      - name: "Auto-Merge + Status merged"
        if: >-
          steps.findpr.outputs.found == 'true' &&
          (steps.verify.outputs.ok == 'true' || steps.verify2.outputs.ok == 'true')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const prNum = Number('${{ steps.findpr.outputs.number }}');
            const prUrl = '${{ steps.findpr.outputs.url }}';
            const issue  = Number(process.env.ISSUE_NUMBER);
            const key = process.env.SUPABASE_SERVICE_ROLE_KEY;
            const setStatus = async (patch) => {
              if (!key) return;
              await fetch(`${process.env.SUPABASE_URL_FB}/rest/v1/godmode_requests?issue_number=eq.${issue}`, {
                method: 'PATCH',
                headers: { apikey: key, Authorization: `Bearer ${key}`,
                  'Content-Type': 'application/json', Prefer: 'return=minimal' },
                body: JSON.stringify(patch),
              }).catch(() => {});
            };
            const comment = async (body) => {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue, body,
              }).catch(() => {});
            };
            // Vor dem Merge versuchen, den Branch mit main zu aktualisieren --
            // loest konfliktfreien Drift automatisch. Best-effort.
            try {
              await github.rest.pulls.updateBranch({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: prNum,
              });
              await new Promise((r) => setTimeout(r, 4000));
            } catch (_) {}
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: prNum, merge_method: 'squash',
              });
            } catch (e) {
              // Merge-Konflikt / nicht mergebar: NICHT rot werden lassen. PR bleibt
              // offen fuer manuellen Merge, Status "pr_open" (nicht "failed").
              // Haeufige Ursache: ein zweiter Auftrag hat dieselbe Datei geaendert.
              const msg = (e && e.message) || String(e);
              await comment(
                `God Mode: PR #${prNum} ist gruen, aber Auto-Merge nicht moeglich (${msg}). ` +
                `Branch bleibt offen -- bitte manuell mergen/rebasen. ` +
                `(Haeufig: ein zweiter Auftrag hat dieselbe Datei bereits geaendert.)`);
              await setStatus({ status: 'pr_open', pr_number: prNum, pr_url: prUrl });
              return;
            }
            const wasFixed = '${{ steps.verify.outputs.ok }}' !== 'true';
            await comment(wasFixed
              ? `God Mode: Verify-Gate war rot -- Claude hat automatisch gefixt, jetzt gruen. PR #${prNum} gemergt. OTA-Patch laeuft.`
              : `God Mode: PR #${prNum} gemergt (analyze + web build gruen). OTA-Patch laeuft.`);
            await setStatus({ status: 'merged', pr_number: prNum, pr_url: prUrl });

      - name: "Verify endgueltig rot -- Status failed"
        # Nur wenn KEIN PR ODER beide Verify-Durchlaeufe (vor + nach Auto-Fix) rot.
        if: >-
          steps.findpr.outputs.found == 'false' ||
          (steps.verify.outputs.ok != 'true' && steps.verify2.outputs.ok != 'true')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const issue = Number(process.env.ISSUE_NUMBER);
            const found = '${{ steps.findpr.outputs.found }}' === 'true';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: found
                ? 'God Mode: Verify-Gate auch nach Auto-Fix rot. PR bleibt offen -- bitte manuell pruefen.'
                : 'God Mode: Kein PR erstellt -- Auftrag praezisieren.',
            });
            const key = process.env.SUPABASE_SERVICE_ROLE_KEY;
            if (key) {
              await fetch(`${process.env.SUPABASE_URL_FB}/rest/v1/godmode_requests?issue_number=eq.${issue}`, {
                method: 'PATCH',
                headers: { apikey: key, Authorization: `Bearer ${key}`,
                  'Content-Type': 'application/json', Prefer: 'return=minimal' },
                body: JSON.stringify({
                  status: 'failed',
                  error: found ? 'verify_gate_red' : 'no_pr_created',
                }),
              }).catch(() => {});
            }

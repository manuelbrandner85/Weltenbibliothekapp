name: Build & Deploy Web (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build_web.yml'
  workflow_dispatch:

# Nur einen Web-Deploy gleichzeitig — ältere Jobs werden abgebrochen
concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Flutter Web Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Flutter Setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: 🌐 Flutter Web Build
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Supabase URL + Anon Key aus vorhandenen Secrets ableiten
          SUPABASE_URL="https://${SUPABASE_PROJECT_ID}.supabase.co"
          SUPABASE_ANON_KEY=$(curl -sf \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/api-keys" \
            2>/dev/null | python3 -c "import sys,json; keys=json.load(sys.stdin); print(next(k['api_key'] for k in keys if k['name']=='anon'))" 2>/dev/null || echo "")

          flutter build web --release \
            --dart-define=SUPABASE_URL="${SUPABASE_URL}" \
            --dart-define=SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY}" \
            --dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev \
            --dart-define=APP_VERSION="web-$(date +%Y%m%d%H%M)"

      - name: 🔍 Verify build output
        run: |
          ls -lh build/web/index.html build/web/flutter.js build/web/flutter_service_worker.js 2>/dev/null || true
          echo "Build size: $(du -sh build/web/ | cut -f1)"

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=weltenbibliothek-web --branch=main

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: build/web/
          retention-days: 7

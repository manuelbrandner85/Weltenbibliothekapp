name: Build & Deploy Web (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build_web.yml'
  workflow_dispatch:

# Nur einen Web-Deploy gleichzeitig — ältere Jobs werden abgebrochen
concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Flutter Web Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Flutter Setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: 🔑 Supabase-Credentials ableiten (nur aus GitHub Secrets)
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            _URL="https://${SUPABASE_PROJECT_ID}.supabase.co"
          else
            _PAYLOAD=$(echo "${SUPABASE_SERVICE_ROLE_KEY}" | cut -d'.' -f2)
            _PAD=$(( (4 - ${#_PAYLOAD} % 4) % 4 ))
            _PADDED="${_PAYLOAD}$(printf '=%.0s' $(seq 1 $_PAD) 2>/dev/null || true)"
            _URL=$(echo "${_PADDED}" | base64 -d 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('https://'+d['ref']+'.supabase.co')" 2>/dev/null || echo "")
          fi
          if [ -z "${_URL:-}" ]; then
            echo "❌ Supabase-URL konnte nicht ermittelt werden"
            exit 1
          fi
          echo "SUPABASE_URL=${_URL}" >> $GITHUB_ENV
          echo "📌 SUPABASE_URL=${_URL}"

          _ANON_KEY=""
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            _ANON_KEY=$(curl -sf \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/api-keys" \
              | python3 -c "import sys,json; keys=json.load(sys.stdin); print(next((k['api_key'] for k in keys if k['name']=='anon'), ''))" \
              2>/dev/null || echo "")
          fi
          if [ -n "${_ANON_KEY:-}" ]; then
            echo "SUPABASE_ANON_KEY=${_ANON_KEY}" >> $GITHUB_ENV
            echo "✅ anon key abgerufen"
          else
            echo "⚠️  anon key nicht verfügbar"
            echo "SUPABASE_ANON_KEY=" >> $GITHUB_ENV
          fi

      - name: 🚫 Dart2js Named-Record Guard
        run: |
          set -euo pipefail
          # Named Dart 3 record TYPE annotations ({Type field, ...}) crash dart2js.
          # Positional records (.$1 / .$2) and named parameters ({String? x}) are fine.
          # This check fails fast before the expensive flutter build web step.
          HITS=$(grep -rEn --include="*.dart" "\(\{[A-Z][A-Za-z_]*\?? [a-z]" lib/ \
            | grep -vE "(required this\.|this\.)" \
            | grep -vE "^\s*//" \
            || true)
          if [ -n "$HITS" ]; then
            echo "FATAL: Named Dart 3 record types found - these crash dart2js web compilation."
            echo "Replace each ({Type field, ...}) annotation with a plain Dart class."
            echo "---"
            echo "$HITS"
            exit 1
          fi
          echo "OK: No dart2js-incompatible named record types found."

      - name: 🌐 Flutter Web Build
        run: |
          # Fallbacks: URL und anon key sind für Web öffentlich (kein Geheimnis).
          _SUPA_URL="${SUPABASE_URL:-https://adtviduaftdquvfjpojb.supabase.co}"
          _SUPA_ANON="${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdHZpZHVhZnRkcXV2Zmpwb2piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzY3OTcsImV4cCI6MjA5MDcxMjc5N30.LPtmnjukb6o2CA16RDjoStqYb_1bipNULD4tgOfuD98}"
          flutter build web --release \
            "--dart-define=SUPABASE_URL=$_SUPA_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$_SUPA_ANON" \
            "--dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev" \
            "--dart-define=ADMIN_AUTH_SECRET=${{ secrets.ADMIN_AUTH_SECRET }}" \
            "--dart-define=APP_VERSION=web-$(date +%Y%m%d%H%M)"

      - name: 🔍 Verify build output
        run: |
          ls -lh build/web/index.html build/web/flutter.js build/web/flutter_service_worker.js 2>/dev/null || true
          echo "Build size: $(du -sh build/web/ | cut -f1)"

      - name: 🔑 Cloudflare Deploy-Token setzen
        run: |
          # CLOUDFLARE_PAGES_TOKEN hat Vorrang; Fallback auf CLOUDFLARE_API_TOKEN (Worker-Token)
          _CF_TOKEN="${{ secrets.CLOUDFLARE_PAGES_TOKEN }}"
          if [ -z "${_CF_TOKEN}" ]; then
            _CF_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          fi
          if [ -z "${_CF_TOKEN}" ]; then
            echo "❌ Weder CLOUDFLARE_PAGES_TOKEN noch CLOUDFLARE_API_TOKEN gesetzt"
            exit 1
          fi
          echo "::add-mask::${_CF_TOKEN}"
          echo "CF_DEPLOY_TOKEN=${_CF_TOKEN}" >> $GITHUB_ENV

      - name: ☁️ Cloudflare Pages-Projekt anlegen (falls nicht vorhanden)
        run: |
          HTTP=$(curl -s -o /tmp/cf_resp.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/accounts/3472f5994537c3a30c5caeaff4de21fb/pages/projects" \
            -H "Authorization: Bearer ${CF_DEPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"weltenbibliothek-web","production_branch":"main"}')
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "✅ Pages-Projekt 'weltenbibliothek-web' angelegt"
          elif [ "$HTTP" = "409" ]; then
            echo "ℹ️  Projekt existiert bereits — weiter mit Deploy"
          else
            echo "⚠️  Projekt-Anlage HTTP $HTTP (möglicherweise fehlende Berechtigung)"
            cat /tmp/cf_resp.json || true
          fi

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_DEPLOY_TOKEN }}
          # Account-ID ist öffentlich (aus CLAUDE.md / wrangler.toml)
          accountId: 3472f5994537c3a30c5caeaff4de21fb
          command: pages deploy build/web --project-name=weltenbibliothek-web --branch=main

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: build/web/
          retention-days: 7

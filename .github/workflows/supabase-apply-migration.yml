name: 🗄️ Supabase Apply Migration (additive)

# Additives Anwenden einzelner Migrations-Dateien OHNE destructive Reset.
# Für GRANT-/POLICY-Fixes, neue Tabellen, Indizes etc. geeignet.
#
# Setup (einmalig):
#   GitHub → Settings → Secrets and variables → Actions → New repository secret
#   Name : SUPABASE_DB_PASSWORD
#   Value: <das DB-Passwort aus Supabase Dashboard → Project Settings → Database>
#
# Auslösen:
#   - Manuell: Actions → "Supabase Apply Migration (additive)" → Run workflow
#     → migration_file angeben (default: neueste v18-GRANT-Migration)
#   - Automatisch: Commit auf supabase/migrations/**.sql mit "[apply-migration-additive]"
#     im Commit-Message (NICHT "[apply-migration]" — das triggert den destruktiven Reset!)

on:
  push:
    paths:
      - 'supabase/migrations/**.sql'
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Pfad zur Migrations-Datei (additiv, kein Schema-Reset)'
        required: true
        default: 'supabase/migrations/20260418_v18_grant_anon_writes.sql'
      region:
        description: 'Supabase-Region (eu-central-1 | eu-west-1 | us-east-1 | us-west-1 | ap-southeast-1)'
        required: false
        default: 'eu-central-1'

env:
  PROJECT_REF: adtviduaftdquvfjpojb
  DEFAULT_REGION: eu-west-1

permissions:
  contents: read
  pull-requests: write

jobs:
  apply:
    name: 🚀 Additive Migration anwenden
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate: workflow_dispatch immer; push nur wenn [apply-migration-additive] im Message
    # UND nicht [apply-migration] (das ist für den destruktiven Reset reserviert)
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push'
          && contains(github.event.head_commit.message, '[apply-migration-additive]')
          && !contains(github.event.head_commit.message, '[apply-migration]'))

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: "🧭 Migrations-Datei ermitteln"
        id: mig
        run: |
          FILE="${{ inputs.migration_file }}"
          if [ -z "$FILE" ]; then
            # Bei push-Trigger: neueste geänderte .sql-Datei im Commit
            FILE=$(git diff --name-only HEAD~1 HEAD -- 'supabase/migrations/*.sql' 2>/dev/null | tail -1 || true)
          fi
          if [ -z "$FILE" ]; then
            # Fallback: neueste Datei in supabase/migrations/ (sortiert)
            FILE=$(ls -1 supabase/migrations/*.sql 2>/dev/null | sort | tail -1)
          fi
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "::error::Keine gültige Migrations-Datei gefunden: '$FILE'"
            exit 1
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "Migration: $FILE"
          wc -l "$FILE"

      - name: 🐘 PostgreSQL Client installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          psql --version

      - name: 🔌 Pooler-Verbindung vorbereiten
        id: conn
        env:
          PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          INPUT_REGION: ${{ inputs.region }}
        run: |
          if [ -z "$PG_PASSWORD" ]; then
            echo "::error::Secret SUPABASE_DB_PASSWORD ist nicht gesetzt."
            exit 1
          fi
          REGION="${INPUT_REGION:-${DEFAULT_REGION}}"
          HOST="aws-0-${REGION}.pooler.supabase.com"
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "region=${REGION}" >> "$GITHUB_OUTPUT"
          echo "✅ Pooler-Host: ${HOST}:6543 (Region: ${REGION})"

      - name: 🚀 Migration additiv ausführen
        id: migrate
        env:
          PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PG_HOST: ${{ steps.conn.outputs.host }}
        run: |
          set +e
          FILE="${{ steps.mig.outputs.file }}"
          LOG=/tmp/psql.log
          # Diagnostik VOR jedem Schritt ins Log schreiben
          {
            echo "=== DIAGNOSTICS ==="
            echo "HOST: ${PG_HOST}"
            echo "USER: postgres.adtviduaftdquvfjpojb"
            echo "PORT: 6543"
            echo "PASSWORD_LENGTH: ${#PG_PASSWORD}"
            if [ -z "$PG_PASSWORD" ]; then
              echo "ERROR: PG_PASSWORD is EMPTY - Secret not set or empty value!"
            fi
            # Zeige nur ersten und letzten Char des Passworts (kein Secret-Leak)
            if [ ${#PG_PASSWORD} -gt 2 ]; then
              FIRST="${PG_PASSWORD:0:1}"
              LAST="${PG_PASSWORD: -1}"
              echo "PASSWORD_PATTERN: ${FIRST}...${LAST} (${#PG_PASSWORD} chars)"
            fi
            echo "===================="
          } | tee "$LOG"
          # URL-encode des Passworts (Sonderzeichen-safe)
          ENC_PW=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['PG_PASSWORD'], safe=''))")
          # SSL ist PFLICHT bei Supabase Pooler (FATAL: ESSLREQUIRED sonst)
          export PGSSLMODE=require
          PGURL="postgresql://postgres.adtviduaftdquvfjpojb:${ENC_PW}@${PG_HOST}:6543/postgres?sslmode=require"
          # Verbindungs-Test mit verbose Output
          echo "::group::Connection test" | tee -a "$LOG"
          psql "$PGURL" -t -A -c "SELECT current_user, inet_server_addr(), inet_server_port();" 2>&1 | tee -a "$LOG"
          TEST_RC=${PIPESTATUS[0]}
          echo "::endgroup::"
          if [ "$TEST_RC" -ne 0 ]; then
            echo "CONNECTION_TEST_FAILED rc=$TEST_RC" | tee -a "$LOG"
            cp "$LOG" psql.log
            exit $TEST_RC
          fi
          echo "CONNECTION_OK" | tee -a "$LOG"
          echo "::group::Applying $FILE" | tee -a "$LOG"
          psql "$PGURL" \
            --set ON_ERROR_STOP=1 \
            -f "$FILE" 2>&1 | tee -a "$LOG"
          RC=${PIPESTATUS[0]}
          echo "::endgroup::"
          cp "$LOG" psql.log
          exit $RC

      - name: 📤 psql Log als Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psql-apply-log
          path: psql.log
          retention-days: 7

      - name: 💬 Fehler als PR-Kommentar
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('psql.log', 'utf8'); } catch(e) { log = '(Log unlesbar: ' + e.message + ')'; }
            // Zeige alle Zeilen (nicht nur ERROR), damit wir die echte Fehlerursache sehen
            const tail = log.split('\n').filter(Boolean).slice(-60).join('\n');
            const body = [
              '### ❌ Additive Supabase-Migration fehlgeschlagen',
              '**Run:** ' + context.runId,
              '**Commit:** ' + context.sha.slice(0,7),
              '',
              '#### psql Output (letzte 60 Zeilen)',
              '```', tail || '(psql.log leer – Fehler war im Verbindungs-Step, siehe Actions-Log)', '```'
            ].join('\n');
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', head: context.repo.owner + ':' + context.ref.replace('refs/heads/', '')
            });
            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prs.data[0].number, body
              });
            }

      - name: ✅ Summary
        if: success()
        run: |
          echo "### ✅ Migration erfolgreich angewendet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Datei: \`${{ steps.mig.outputs.file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Region: \`${{ steps.conn.outputs.region }}\`" >> $GITHUB_STEP_SUMMARY

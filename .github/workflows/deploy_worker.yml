name: ☁️ Cloudflare Worker deployen

# Deployt den API-Worker automatisch bei jeder Änderung an `workers/**`.
# Setzt FCM/Supabase/LiveKit-Secrets und aktualisiert livekit.yaml auf dem VPS.
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN            — Wrangler-Deploy-Token
#   SUPABASE_SERVICE_ROLE_KEY       — Supabase Service-Role JWT
#   FCM_SERVICE_ACCOUNT_JSON        — Firebase Service-Account JSON (optional)
#   VPS_PASSWORD                    — SSH root-Passwort für VPS (optional)
# Optional (Fallback-Werte eingebettet):
#   LIVEKIT_API_KEY                 — Standard: wb-a9b26485d407e7dc2043
#   LIVEKIT_API_SECRET              — Standard: f9c57648d1756868aa7c124b545c029bcb2569b5bf82c1fa5058eefc4efc21d1
#   LIVEKIT_URL                     — Standard: wss://livekit.srv1438024.hstgr.cloud

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy_worker.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Worker deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VPS_HOST: 72.62.154.95
      VPS_USER: root
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟩 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔑 Worker-Secrets setzen
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
          WB_KEY: ${{ secrets.LIVEKIT_API_KEY || 'wb-a9b26485d407e7dc2043' }}
          WB_SECRET: ${{ secrets.LIVEKIT_API_SECRET || 'f9c57648d1756868aa7c124b545c029bcb2569b5bf82c1fa5058eefc4efc21d1' }}
          WB_URL: ${{ secrets.LIVEKIT_URL || 'wss://livekit.srv1438024.hstgr.cloud' }}
        working-directory: workers
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN Secret fehlt — Deploy übersprungen"
            exit 1
          fi

          if [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "→ SUPABASE_SERVICE_ROLE_KEY setzen …"
            printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | \
              npx -y wrangler@3 secret put SUPABASE_SERVICE_ROLE_KEY
          else
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt (Admin-Operationen gehen nicht)"
          fi

          if [ -n "${FCM_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "→ FCM_SERVICE_ACCOUNT setzen …"
            printf '%s' "$FCM_SERVICE_ACCOUNT_JSON" | \
              npx -y wrangler@3 secret put FCM_SERVICE_ACCOUNT
          else
            echo "ℹ️  FCM_SERVICE_ACCOUNT_JSON fehlt — Push-Dispatcher markiert Queue nur als 'sent'"
          fi

          # 🎥 LiveKit-WB-Secrets — Fallback-Werte eingebettet, werden immer gesetzt
          echo "→ LIVEKIT_API_KEY setzen (${WB_KEY}) …"
          printf '%s' "${WB_KEY}" | npx -y wrangler@3 secret put LIVEKIT_API_KEY
          echo "→ LIVEKIT_API_SECRET setzen …"
          printf '%s' "${WB_SECRET}" | npx -y wrangler@3 secret put LIVEKIT_API_SECRET
          echo "→ LIVEKIT_URL setzen (${WB_URL}) …"
          printf '%s' "${WB_URL}" | npx -y wrangler@3 secret put LIVEKIT_URL
          echo "✅ Alle LiveKit-WB-Secrets gesetzt"

      - name: 🚀 Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: workers
        run: |
          npx -y wrangler@3 deploy
          echo "✅ Worker deployed — Cron-Trigger aktiv"

      - name: 🖥 livekit.yaml auf VPS aktualisieren (WB-Key hinzufügen)
        # Schreibt Mensaena + WB-Key in livekit.yaml und restartet den Container.
        # continue-on-error: VPS-Fail blockiert nicht den Worker-Deploy.
        continue-on-error: true
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          WB_KEY: ${{ secrets.LIVEKIT_API_KEY || 'wb-a9b26485d407e7dc2043' }}
          WB_SECRET: ${{ secrets.LIVEKIT_API_SECRET || 'f9c57648d1756868aa7c124b545c029bcb2569b5bf82c1fa5058eefc4efc21d1' }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_PASSWORD:-}" ]; then
            echo "⚠️  VPS_PASSWORD Secret fehlt — VPS livekit.yaml Update übersprungen"
            exit 0
          fi

          sudo apt-get install -y -qq sshpass

          # Single-line printf um YAML-Einrückungsprobleme zu vermeiden
          YAML_B64=$(printf 'port: 7880\nredis:\n  address: 127.0.0.1:6379\nkeys:\n  mensaena-6dd99c8f63b0: d92c860810313cd704b8959854d4225611fcb1291456603b86a0adcff2cb2a6e\n  %s: %s\nrtc:\n  tcp_port: 7881\n  port_range_start: 50000\n  port_range_end: 60000\n  use_external_ip: true\nroom:\n  auto_create: true\n  empty_timeout: 300\nlogging:\n  level: info\n' "${WB_KEY}" "${WB_SECRET}" | base64 | tr -d '\n')

          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o PasswordAuthentication=yes \
            ${VPS_USER}@${VPS_HOST} \
            "set -euo pipefail
             mkdir -p /docker/livekit
             printf '%s' '${YAML_B64}' | base64 -d > /docker/livekit/livekit.yaml
             echo '✅ livekit.yaml geschrieben'
             if docker ps --format '{{.Names}}' | grep -q livekit; then
               cd /docker/livekit && docker compose restart livekit
               sleep 5 && docker compose ps
             else
               echo 'ℹ️  LiveKit-Container nicht aktiv'
             fi"
          echo "✅ VPS livekit.yaml aktualisiert"

name: ☁️ Cloudflare Worker deployen

# Deployt den API-Worker automatisch bei jeder Änderung an `workers/**`.
# Setzt FCM/Supabase/LiveKit-Secrets im Cloudflare-Worker.
# Mensaena-LiveKit wird NIEMALS angefasst — WB hat eigene Instanz (siehe deploy_livekit_wb.yml).
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN            — Wrangler-Deploy-Token
#   SUPABASE_SERVICE_ROLE_KEY       — Supabase Service-Role JWT
#   LIVEKIT_API_SECRET              — LiveKit API-Secret (PFLICHT, kein Default mehr)
#   FCM_SERVICE_ACCOUNT_JSON        — Firebase Service-Account JSON (optional)
# Optional mit Fallback (NICHT-Geheim — nur ID/URL):
#   LIVEKIT_API_KEY                 — Default: wb-a9b26485d407e7dc2043
#   LIVEKIT_URL                     — Default: wss://livekit-wb.srv1438024.hstgr.cloud

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy_worker.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Worker deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VPS_HOST: 72.62.154.95
      VPS_USER: root
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟩 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔐 Secret-Status prüfen (soft-check)
        id: secret_check
        env:
          WB_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          if [ -z "${WB_SECRET:-}" ]; then
            echo "⚠️  LIVEKIT_API_SECRET nicht gesetzt — LiveKit-Secret-Refresh"
            echo "   wird übersprungen. Worker-Deploy läuft trotzdem;"
            echo "   alte Cloudflare-Secrets bleiben aktiv."
            echo "   Setze unter Settings → Secrets → Actions wenn du das"
            echo "   LiveKit-Secret rotieren willst."
            echo "skip_livekit=true" >> "$GITHUB_OUTPUT"
          else
            echo "::add-mask::${WB_SECRET}"
            echo "✅ LIVEKIT_API_SECRET gesetzt (${#WB_SECRET} Zeichen)"
            echo "skip_livekit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚀 Worker deployen (latest Version)
        # Cloudflare verlangt dass die latest Worker-Version deployed ist,
        # bevor `secret put` läuft (sonst Versions-Drift-Error). Deshalb
        # ZUERST deploy, danach Secrets.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: workers
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN Secret fehlt — Deploy übersprungen"
            exit 1
          fi
          npx -y wrangler@3 deploy
          echo "✅ Worker deployed — Cron-Trigger aktiv"

      - name: 🔑 Worker-Secrets setzen
        # Alle Secrets in EINEM bulk-Aufruf setzen.
        # Mehrere einzelne `secret put` Calls erzeugen in Wrangler 3.x einen
        # Versions-Drift-Error (zweiter Call sieht unveröffentlichte Draft-Version).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
          WB_KEY: ${{ secrets.LIVEKIT_API_KEY || 'wb-a9b26485d407e7dc2043' }}
          WB_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          WB_URL: ${{ secrets.LIVEKIT_URL || 'wss://livekit-wb.srv1438024.hstgr.cloud' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_FACTCHECK_API_KEY: ${{ secrets.GOOGLE_FACTCHECK_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        working-directory: workers
        run: |
          set -euo pipefail
          SECRETS_FILE=$(mktemp /tmp/wrangler_secrets.XXXXXX.json)
          trap 'rm -f "$SECRETS_FILE"' EXIT

          # JSON mit jq aufbauen (sicheres Escaping, kein Heredoc nötig)
          PAYLOAD='{}'

          if [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "→ SUPABASE_SERVICE_ROLE_KEY"
            PAYLOAD=$(printf '%s' "$PAYLOAD" | jq --arg v "$SUPABASE_SERVICE_ROLE_KEY" '. + {SUPABASE_SERVICE_ROLE_KEY: $v}')
          else
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt"
          fi

          if [ -n "${FCM_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "→ FCM_SERVICE_ACCOUNT"
            PAYLOAD=$(printf '%s' "$PAYLOAD" | jq --arg v "$FCM_SERVICE_ACCOUNT_JSON" '. + {FCM_SERVICE_ACCOUNT: $v}')
          else
            echo "ℹ️  FCM_SERVICE_ACCOUNT_JSON fehlt — Push-Dispatcher markiert Queue nur als 'sent'"
          fi

          if [ -n "${GROQ_API_KEY:-}" ]; then
            echo "→ GROQ_API_KEY (Virgil Llama 3.3 70B)"
            PAYLOAD=$(printf '%s' "$PAYLOAD" | jq --arg v "$GROQ_API_KEY" '. + {GROQ_API_KEY: $v}')
          else
            echo "ℹ️  GROQ_API_KEY fehlt — Virgil nutzt Workers AI Llama 3.1 8B (Fallback)"
          fi

          if [ -n "${GOOGLE_FACTCHECK_API_KEY:-}" ]; then
            echo "→ GOOGLE_FACTCHECK_API_KEY"
            PAYLOAD=$(printf '%s' "$PAYLOAD" | jq --arg v "$GOOGLE_FACTCHECK_API_KEY" '. + {GOOGLE_FACTCHECK_API_KEY: $v}')
          else
            echo "ℹ️  GOOGLE_FACTCHECK_API_KEY fehlt — Fact-Check Card zeigt Snopes/Politifact-Search-Links"
          fi

          if [ -n "${YOUTUBE_API_KEY:-}" ]; then
            echo "→ YOUTUBE_API_KEY"
            PAYLOAD=$(printf '%s' "$PAYLOAD" | jq --arg v "$YOUTUBE_API_KEY" '. + {YOUTUBE_API_KEY: $v}')
          else
            echo "ℹ️  YOUTUBE_API_KEY fehlt — YouTube-Cards zeigen Suche-Fallback-Link"
          fi

          if [ -n "${WB_SECRET:-}" ]; then
            echo "→ LIVEKIT_API_KEY / LIVEKIT_API_SECRET / LIVEKIT_URL"
            PAYLOAD=$(printf '%s' "$PAYLOAD" | jq \
              --arg k "${WB_KEY}" --arg s "${WB_SECRET}" --arg u "${WB_URL}" \
              '. + {LIVEKIT_API_KEY: $k, LIVEKIT_API_SECRET: $s, LIVEKIT_URL: $u}')
          else
            echo "ℹ️  LIVEKIT_API_SECRET nicht gesetzt — LiveKit-Secrets bleiben unverändert"
          fi

          if [ "$PAYLOAD" = '{}' ]; then
            echo "⚠️  Keine Secrets zu setzen — übersprungen"
            exit 0
          fi

          COUNT=$(printf '%s' "$PAYLOAD" | jq 'keys | length')
          echo "→ $COUNT Secrets via wrangler secret bulk …"
          printf '%s' "$PAYLOAD" > "$SECRETS_FILE"
          npx -y wrangler@3 secret bulk "$SECRETS_FILE"
          echo "✅ Alle $COUNT Secrets gesetzt"

      # HINWEIS: Der frühere Step "livekit.yaml auf VPS aktualisieren" wurde entfernt.
      # Er hatte Mensaena's livekit.yaml überschrieben, um WB's Key dort einzutragen
      # (shared-instance-Modell). Seit dem Wechsel zu einer eigenen WB-Instanz
      # (siehe deploy_livekit_wb.yml) ist das nicht mehr nötig — und Mensaena's
      # Container darf NIEMALS mehr von einem WB-Workflow modifiziert werden.

name: ☁️ Cloudflare Worker deployen

# Deployt den API-Worker automatisch bei jeder Änderung an `workers/**`.
# Setzt FCM/Supabase/LiveKit-Secrets im Cloudflare-Worker.
# Mensaena-LiveKit wird NIEMALS angefasst — WB hat eigene Instanz (siehe deploy_livekit_wb.yml).
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN            — Wrangler-Deploy-Token
#   SUPABASE_SERVICE_ROLE_KEY       — Supabase Service-Role JWT
#   LIVEKIT_API_SECRET              — LiveKit API-Secret (PFLICHT, kein Default mehr)
#   FCM_SERVICE_ACCOUNT_JSON        — Firebase Service-Account JSON (optional)
# Optional mit Fallback (NICHT-Geheim — nur ID/URL):
#   LIVEKIT_API_KEY                 — Default: wb-a9b26485d407e7dc2043
#   LIVEKIT_URL                     — Default: wss://livekit-wb.srv1438024.hstgr.cloud

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy_worker.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Worker deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VPS_HOST: 72.62.154.95
      VPS_USER: root
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟩 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔐 Secret-Status prüfen (soft-check)
        id: secret_check
        env:
          WB_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          if [ -z "${WB_SECRET:-}" ]; then
            echo "⚠️  LIVEKIT_API_SECRET nicht gesetzt — LiveKit-Secret-Refresh"
            echo "   wird übersprungen. Worker-Deploy läuft trotzdem;"
            echo "   alte Cloudflare-Secrets bleiben aktiv."
            echo "   Setze unter Settings → Secrets → Actions wenn du das"
            echo "   LiveKit-Secret rotieren willst."
            echo "skip_livekit=true" >> "$GITHUB_OUTPUT"
          else
            echo "::add-mask::${WB_SECRET}"
            echo "✅ LIVEKIT_API_SECRET gesetzt (${#WB_SECRET} Zeichen)"
            echo "skip_livekit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚀 Worker deployen (latest Version)
        # Cloudflare verlangt dass die latest Worker-Version deployed ist,
        # bevor `secret put` läuft (sonst Versions-Drift-Error). Deshalb
        # ZUERST deploy, danach Secrets.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: workers
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN Secret fehlt — Deploy übersprungen"
            exit 1
          fi
          npx -y wrangler@3 deploy
          echo "✅ Worker deployed — Cron-Trigger aktiv"

      - name: 🔑 Worker-Secrets setzen
        # Setzt Secrets direkt via Cloudflare REST API (script-level secrets endpoint).
        # wrangler secret bulk schlägt mit Error 10214 fehl wenn gerade eine neue
        # Worker-Version deployed wurde (versioned-deployment conflict).
        # Die REST API umgeht dieses Problem vollständig.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
          WB_KEY: ${{ secrets.LIVEKIT_API_KEY || 'wb-a9b26485d407e7dc2043' }}
          WB_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          WB_URL: ${{ secrets.LIVEKIT_URL || 'wss://livekit-wb.srv1438024.hstgr.cloud' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_FACTCHECK_API_KEY: ${{ secrets.GOOGLE_FACTCHECK_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          set -euo pipefail
          ACCOUNT_ID="3472f5994537c3a30c5caeaff4de21fb"
          SCRIPT_NAME="weltenbibliothek-api"
          API="https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}/secrets"

          set_secret() {
            local name="$1"
            local value="$2"
            local result
            result=$(curl -s -X PUT "$API" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":$(echo -n "$name" | jq -Rs .),\"text\":$(echo -n "$value" | jq -Rs .),\"type\":\"secret_text\"}")
            if echo "$result" | jq -e '.success == true' > /dev/null 2>&1; then
              echo "✅ $name"
            else
              echo "❌ $name: $(echo "$result" | jq -r '.errors[0].message // "unbekannter Fehler"')"
              return 1
            fi
          }

          [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && set_secret "SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SERVICE_ROLE_KEY" || echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt"
          [ -n "${FCM_SERVICE_ACCOUNT_JSON:-}" ]  && set_secret "FCM_SERVICE_ACCOUNT" "$FCM_SERVICE_ACCOUNT_JSON"        || echo "ℹ️  FCM_SERVICE_ACCOUNT_JSON fehlt"
          [ -n "${GROQ_API_KEY:-}" ]              && set_secret "GROQ_API_KEY" "$GROQ_API_KEY"                          || echo "ℹ️  GROQ_API_KEY fehlt"
          [ -n "${GOOGLE_FACTCHECK_API_KEY:-}" ]  && set_secret "GOOGLE_FACTCHECK_API_KEY" "$GOOGLE_FACTCHECK_API_KEY"  || echo "ℹ️  GOOGLE_FACTCHECK_API_KEY fehlt"
          [ -n "${YOUTUBE_API_KEY:-}" ]           && set_secret "YOUTUBE_API_KEY" "$YOUTUBE_API_KEY"                    || echo "ℹ️  YOUTUBE_API_KEY fehlt"
          if [ -n "${WB_SECRET:-}" ]; then
            set_secret "LIVEKIT_API_KEY"    "${WB_KEY}"
            set_secret "LIVEKIT_API_SECRET" "${WB_SECRET}"
            set_secret "LIVEKIT_URL"        "${WB_URL}"
          else
            echo "ℹ️  LIVEKIT_API_SECRET fehlt — LiveKit-Secrets bleiben unverändert"
          fi
          echo "✅ Secret-Deploy abgeschlossen"

      # HINWEIS: Der frühere Step "livekit.yaml auf VPS aktualisieren" wurde entfernt.
      # Er hatte Mensaena's livekit.yaml überschrieben, um WB's Key dort einzutragen
      # (shared-instance-Modell). Seit dem Wechsel zu einer eigenen WB-Instanz
      # (siehe deploy_livekit_wb.yml) ist das nicht mehr nötig — und Mensaena's
      # Container darf NIEMALS mehr von einem WB-Workflow modifiziert werden.

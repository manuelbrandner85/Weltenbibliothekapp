name: 🎥 Deploy LiveKit-Server (Weltenbibliothek)

# Vollautomatisches Setup des LiveKit-Medienservers auf dem Hostinger VPS.
#
# Was dieser Workflow tut:
#   1. Generiert LIVEKIT_API_KEY + LIVEKIT_API_SECRET + TURN_SECRET (falls nicht gesetzt)
#   2. Speichert alle Credentials als GitHub-Secrets (für spätere Builds/Patches)
#   3. Installiert Docker auf dem VPS (falls nicht vorhanden)
#   4. Deployed LiveKit-Server + Traefik via Docker Compose
#   5. Öffnet Firewall-Ports (ufw, falls aktiv)
#   6. Wartet bis LiveKit healthy ist
#   7. Setzt LIVEKIT_API_KEY + LIVEKIT_API_SECRET als Cloudflare Worker-Secrets
#   8. Deployt den Worker (aktiviert /api/livekit/token Endpoint)
#   9. Setzt LIVEKIT_URL als GitHub Secret
#  10. Feuert shorebird_patch.yml → User bekommt LIVEKIT_URL per OTA-Patch
#
# Benötigte GitHub-Secrets (einmalig setzen):
#   VPS_SSH_KEY             — SSH-Private-Key für den Hostinger VPS
#   VPS_USER                — SSH-User (Standard: root)
#   LIVEKIT_DOMAIN          — Subdomain für den Server (z.B. livekit-wb.deine-domain.de)
#   CLOUDFLARE_DNS_API_TOKEN — Cloudflare API-Token mit Zone:DNS:Edit Berechtigung
#
# Auto-generiert (kein manuelles Setzen nötig):
#   LIVEKIT_API_KEY / LIVEKIT_API_SECRET / LIVEKIT_TURN_SECRET / LIVEKIT_URL

on:
  workflow_dispatch:
    inputs:
      force_recreate:
        description: 'Container neu starten (auch wenn schon läuft)'
        type: boolean
        default: false

env:
  VPS_HOST: '72.62.154.95'
  DEPLOY_PATH: '/opt/livekit-wb'

jobs:
  deploy:
    name: 🚀 LiveKit deployen
    runs-on: ubuntu-latest
    permissions:
      contents: write
      secrets: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Credentials generieren (idempotent) ───────────────────────────────
      - name: 🔑 API-Credentials generieren
        id: creds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          EXISTING_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          EXISTING_TURN_SECRET: ${{ secrets.LIVEKIT_TURN_SECRET }}
          LIVEKIT_DOMAIN: ${{ secrets.LIVEKIT_DOMAIN }}
        run: |
          set -euo pipefail

          # Validierung: LIVEKIT_DOMAIN muss gesetzt sein
          if [ -z "${LIVEKIT_DOMAIN:-}" ]; then
            echo "❌ FEHLER: GitHub-Secret 'LIVEKIT_DOMAIN' fehlt!"
            echo "   Bitte setzen unter: Settings → Secrets → Actions → New repository secret"
            echo "   Wert: deine Subdomain, z.B. livekit-wb.meine-domain.de"
            exit 1
          fi

          # API-Key generieren wenn nicht vorhanden
          if [ -z "${EXISTING_API_KEY:-}" ]; then
            API_KEY="wb-$(openssl rand -hex 10)"
            gh secret set LIVEKIT_API_KEY --body "$API_KEY"
            echo "✅ LIVEKIT_API_KEY generiert und als GitHub-Secret gespeichert"
          else
            API_KEY="$EXISTING_API_KEY"
            echo "✅ LIVEKIT_API_KEY bereits vorhanden"
          fi

          # API-Secret generieren wenn nicht vorhanden
          if [ -z "${EXISTING_API_SECRET:-}" ]; then
            API_SECRET="$(openssl rand -base64 40 | tr -d '\n/+=' | head -c 48)"
            gh secret set LIVEKIT_API_SECRET --body "$API_SECRET"
            echo "✅ LIVEKIT_API_SECRET generiert und als GitHub-Secret gespeichert"
          else
            API_SECRET="$EXISTING_API_SECRET"
            echo "✅ LIVEKIT_API_SECRET bereits vorhanden"
          fi

          # TURN-Secret generieren wenn nicht vorhanden
          if [ -z "${EXISTING_TURN_SECRET:-}" ]; then
            TURN_SECRET="$(openssl rand -base64 32 | tr -d '\n/+=' | head -c 40)"
            gh secret set LIVEKIT_TURN_SECRET --body "$TURN_SECRET"
            echo "✅ LIVEKIT_TURN_SECRET generiert und als GitHub-Secret gespeichert"
          else
            TURN_SECRET="$EXISTING_TURN_SECRET"
            echo "✅ LIVEKIT_TURN_SECRET bereits vorhanden"
          fi

          # LIVEKIT_URL ableiten und setzen
          LIVEKIT_URL="wss://${LIVEKIT_DOMAIN}:7892"
          gh secret set LIVEKIT_URL --body "$LIVEKIT_URL"
          echo "✅ LIVEKIT_URL = $LIVEKIT_URL gesetzt"

          # Werte für nachfolgende Steps maskieren
          echo "::add-mask::$API_KEY"
          echo "::add-mask::$API_SECRET"
          echo "::add-mask::$TURN_SECRET"

          # Outputs für spätere Steps
          echo "api_key=$API_KEY"         >> $GITHUB_OUTPUT
          echo "api_secret=$API_SECRET"   >> $GITHUB_OUTPUT
          echo "turn_secret=$TURN_SECRET" >> $GITHUB_OUTPUT
          echo "livekit_url=$LIVEKIT_URL" >> $GITHUB_OUTPUT

      # ── 3. VPS: Docker installieren + Server deployen ────────────────────────
      - name: 🐳 VPS einrichten + LiveKit starten
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH:             ${{ env.DEPLOY_PATH }}
          API_KEY:                 ${{ steps.creds.outputs.api_key }}
          API_SECRET:              ${{ steps.creds.outputs.api_secret }}
          TURN_SECRET:             ${{ steps.creds.outputs.turn_secret }}
          LIVEKIT_DOMAIN:          ${{ secrets.LIVEKIT_DOMAIN }}
          CF_DNS_API_TOKEN:        ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
          FORCE_RECREATE:          ${{ inputs.force_recreate }}
        with:
          host:     ${{ env.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs:     DEPLOY_PATH,API_KEY,API_SECRET,TURN_SECRET,LIVEKIT_DOMAIN,CF_DNS_API_TOKEN,FORCE_RECREATE
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🎥 Weltenbibliothek LiveKit-Server Setup"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # ── Docker installieren (falls nicht vorhanden) ──────────────────
            if ! command -v docker &>/dev/null; then
              echo "📦 Docker installieren..."
              apt-get update -qq
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
              echo "✅ Docker installiert"
            else
              echo "✅ Docker bereits installiert: $(docker --version)"
            fi

            # ── Docker Compose Plugin prüfen ──────────────────────────────────
            if ! docker compose version &>/dev/null; then
              echo "📦 Docker Compose Plugin installieren..."
              apt-get update -qq
              apt-get install -y -qq docker-compose-plugin
            fi
            echo "✅ Docker Compose: $(docker compose version --short)"

            # ── Deploy-Verzeichnis erstellen ──────────────────────────────────
            mkdir -p "$DEPLOY_PATH"
            chmod 700 "$DEPLOY_PATH"

            # ── Firewall öffnen (ufw, falls aktiv) ────────────────────────────
            if command -v ufw &>/dev/null && ufw status | grep -q "Status: active"; then
              echo "🔥 Firewall-Regeln für LiveKit..."
              ufw allow 7891/tcp  comment 'LiveKit-WB HTTP'   2>/dev/null || true
              ufw allow 7892/tcp  comment 'LiveKit-WB WSS'    2>/dev/null || true
              ufw allow 5350/udp  comment 'LiveKit-WB TURN'   2>/dev/null || true
              ufw allow 3479/udp  comment 'LiveKit-WB TURN2'  2>/dev/null || true
              ufw allow 4443/tcp  comment 'LiveKit-WB TURN-TLS' 2>/dev/null || true
              ufw allow 60001:65000/udp comment 'LiveKit-WB WebRTC' 2>/dev/null || true
              ufw reload 2>/dev/null || true
              echo "✅ Firewall-Ports geöffnet"
            fi

            # ── docker-compose.yml schreiben ──────────────────────────────────
            cat > "$DEPLOY_PATH/docker-compose.yml" << 'COMPOSEOF'
name: livekit-weltenbibliothek

services:
  livekit:
    image: livekit/livekit-server:v1.7
    container_name: livekit-weltenbibliothek
    restart: unless-stopped
    ports:
      - "5350:5350/udp"
      - "3479:3479/udp"
      - "4443:4443/tcp"
      - "60001-65000:60001-65000/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    networks:
      - livekit-wb-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  traefik:
    image: traefik:v3.1
    container_name: traefik-weltenbibliothek
    restart: unless-stopped
    ports:
      - "7891:7891/tcp"
      - "7892:7892/tcp"
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik-wb-acme:/acme
    networks:
      - livekit-wb-net

networks:
  livekit-wb-net:
    name: livekit-wb-net
    driver: bridge

volumes:
  traefik-wb-acme:
    name: traefik-wb-acme
COMPOSEOF

            # ── traefik.yml schreiben ─────────────────────────────────────────
            cat > "$DEPLOY_PATH/traefik.yml" << 'TRAEFIKEOF'
api:
  insecure: false

entryPoints:
  web:
    address: ":7891"
  websecure:
    address: ":7892"

certificatesResolvers:
  cf:
    acme:
      email: livekit-wb@weltenbibliothek.app
      storage: /acme/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
        delayBeforeCheck: 10

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO
TRAEFIKEOF

            # ── livekit.yaml mit Secrets ──────────────────────────────────────
            cat > "$DEPLOY_PATH/livekit.yaml" << LKEOF
port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 60001
  port_range_end: 65000
  use_external_ip: true

turn:
  enabled: true
  domain: ${LIVEKIT_DOMAIN}
  secret: ${TURN_SECRET}
  udp_port: 5350
  external_tls: false

keys:
  ${API_KEY}: ${API_SECRET}

logging:
  level: info
  pion_level: error
LKEOF

            # ── dynamic.yml für Traefik ───────────────────────────────────────
            cat > "$DEPLOY_PATH/dynamic.yml" << DYNEOF
http:
  routers:
    livekit-wb:
      rule: "Host(\`${LIVEKIT_DOMAIN}\`)"
      entryPoints:
        - websecure
      service: livekit-wb
      tls:
        certResolver: cf

  services:
    livekit-wb:
      loadBalancer:
        servers:
          - url: "http://livekit:7880"
        passHostHeader: true

tls:
  options:
    default:
      minVersion: VersionTLS12
DYNEOF

            # ── .env für docker-compose ───────────────────────────────────────
            cat > "$DEPLOY_PATH/.env" << ENVEOF
CLOUDFLARE_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
ENVEOF
            chmod 600 "$DEPLOY_PATH/.env"

            echo "✅ Alle Config-Dateien erstellt"

            # ── Docker Compose starten ────────────────────────────────────────
            cd "$DEPLOY_PATH"

            if [ "${FORCE_RECREATE}" = "true" ]; then
              echo "🔄 Container neu starten (force_recreate)..."
              docker compose down --remove-orphans 2>/dev/null || true
            fi

            echo "🚀 Docker Compose starten..."
            docker compose pull
            docker compose up -d --remove-orphans

            echo "⏳ Warte auf LiveKit-Healthcheck..."
            for i in $(seq 1 12); do
              if docker inspect livekit-weltenbibliothek \
                  --format='{{.State.Health.Status}}' 2>/dev/null | grep -q "healthy"; then
                echo "✅ LiveKit ist healthy!"
                break
              fi
              if [ "$i" = "12" ]; then
                echo "⚠️  LiveKit nicht healthy nach 60s — Logs:"
                docker logs livekit-weltenbibliothek --tail 20 || true
              fi
              echo "   Warte... ($((i*5))s)"
              sleep 5
            done

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ LiveKit-Server läuft"
            echo "   WSS-URL: wss://${LIVEKIT_DOMAIN}:7892"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 4. Cloudflare Worker-Secrets setzen ─────────────────────────────────
      - name: ☁️ Worker-Secrets + Deploy
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '3472f5994537c3a30c5caeaff4de21fb'
          API_KEY:               ${{ steps.creds.outputs.api_key }}
          API_SECRET:            ${{ steps.creds.outputs.api_secret }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "⚠️  CLOUDFLARE_API_TOKEN fehlt — Worker-Secrets werden nicht gesetzt"
            exit 0
          fi

          cd workers

          # npx wrangler secrets setzen
          echo "$API_KEY"    | npx wrangler secret put LIVEKIT_API_KEY    --name weltenbibliothek-api 2>/dev/null || true
          echo "$API_SECRET" | npx wrangler secret put LIVEKIT_API_SECRET --name weltenbibliothek-api 2>/dev/null || true
          echo "✅ Worker-Secrets gesetzt"

          # Worker deployen (aktiviert /api/livekit/token)
          npx wrangler deploy 2>&1 | tail -5 || true
          echo "✅ Worker mit LiveKit-Token-Endpoint deployed"

      # ── 5. Shorebird-Patch dispatchen (liefert LIVEKIT_URL an Geräte) ──────
      - name: 📡 OTA-Patch auslösen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run shorebird_patch.yml \
            --ref main \
            --field source_branch=main
          echo "✅ Shorebird-Patch gestartet — User bekommen LIVEKIT_URL per OTA-Update"

      # ── 6. Zusammenfassung ───────────────────────────────────────────────────
      - name: 📋 Setup-Zusammenfassung
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 Weltenbibliothek LiveKit-Server vollständig eingerichtet!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  📡 Server-URL:  ${{ steps.creds.outputs.livekit_url }}"
          echo "  🌍 VPS-IP:      ${{ env.VPS_HOST }}"
          echo "  📁 Deploy-Pfad: ${{ env.DEPLOY_PATH }}"
          echo ""
          echo "  Ports (offen auf VPS):"
          echo "    7891/tcp  — HTTP"
          echo "    7892/tcp  — HTTPS/WSS (LiveKit-Client verbindet hier)"
          echo "    5350/udp  — TURN UDP"
          echo "    3479/udp  — TURN UDP (alternativ)"
          echo "    4443/tcp  — TURN TLS"
          echo "    60001-65000/udp — WebRTC Media"
          echo ""
          echo "  GitHub-Secrets (automatisch gesetzt):"
          echo "    ✅ LIVEKIT_API_KEY"
          echo "    ✅ LIVEKIT_API_SECRET"
          echo "    ✅ LIVEKIT_TURN_SECRET"
          echo "    ✅ LIVEKIT_URL"
          echo ""
          echo "  OTA-Patch: User bekommen die LIVEKIT_URL automatisch per Shorebird"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

name: 🚀 Shorebird OTA Patch

# OTA-Updates (Dart-only Änderungen) ohne Store / ohne APK-Reinstall.
# Sendet den aktuellen Dart-Code als Patch an das laufende Shorebird-Release.
#
# Wann benutzen:
#   • Nach Dart-Code-Änderungen (lib/**) die KEINE neue native Lib brauchen
#   • Dependencies/Plugins dürfen NICHT geändert werden (= neuer Release nötig)

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch mit dem zu patchenden Code'
        required: false
        default: 'main'
  # Auto-Patch bei JEDEM Push auf main — kein paths-Filter.
  # Shorebird patcht immer den aktuellen Dart-Stand; doppelte Patches (gleicher Code)
  # sind harmlos und werden vom Client einfach ignoriert.
  push:
    branches:
      - main

permissions:
  contents: read

# Patches dürfen NICHT parallel laufen — Shorebird nimmt den zuletzt
# hochgeladenen Patch als aktiv, d.h. wenn ein älterer Lauf später fertig wird
# überschreibt er den neueren Stand. Daher: pro Branch nur ein Patch gleichzeitig,
# ältere laufende Jobs werden beim neuen Push gecancelt.
concurrency:
  group: shorebird-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    name: 📡 Shorebird Patch android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          # Bei workflow_dispatch: expliziter source_branch (oder 'main').
          # Bei push: der gepushte Commit (github.sha).
          ref: ${{ github.event.inputs.source_branch || github.sha }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Shorebird CLI 1.6.92 + Flutter 3.41.6 (revision 76ca3dff01) war die
      # Kombination beim letzten funktionierenden Patch (Run #15, commit fe09bad).
      # Ohne Pin driftet setup-shorebird@v1 auf die jeweils neueste CLI und damit
      # auf einen anderen Flutter-Engine-Snapshot — der Patch uploaded zwar, wird
      # aber vom Client auf dem Gerät still verworfen weil die Engine-Bytes nicht
      # zum registrierten Release passen. Deshalb fest pinnen.
      - name: 🐦 Shorebird (Setup)
        uses: shorebirdtech/setup-shorebird@v1
        # cache: false weil sonst der gepinnte detached-HEAD-Stand aus dem
        # vorigen Run wieder restored wird und `shorebird upgrade` mit
        # "HEAD does not point to a branch" abbricht.
        with:
          cache: false

      - name: 🔧 Shorebird CLI auf v1.6.92 downpinnen (gegen Engine-Drift)
        # setup-shorebird@v1 akzeptiert keine `shorebird-version` Input mehr —
        # die Warnung "Unexpected input(s) 'shorebird-version'" zeigt sich seit
        # einer ganzen Weile in jedem Patch-Run. Damit lief die CLI bislang
        # immer mit `latest` → Engine-Snapshot driftet weg vom registrierten
        # Release v5.41.0 → Shorebird-Server akzeptiert den Upload, aber das
        # Gerät verwirft den Patch silent beim Verifizieren.
        #
        # Manuell auf das letzte bekannte gute CLI-Tag (v1.6.92, kompatibel mit
        # Flutter 3.41.6 rev 76ca3dff01) downchecken. Die Snapshot-Cache wird
        # beim nächsten `shorebird`-Aufruf automatisch neu gebaut.
        run: |
          set -euo pipefail
          SHOREBIRD_BIN=$(command -v shorebird)
          SHOREBIRD_ROOT=$(dirname "$(dirname "$SHOREBIRD_BIN")")
          echo "Shorebird install dir: $SHOREBIRD_ROOT"
          cd "$SHOREBIRD_ROOT"
          if [ ! -d .git ]; then
            echo "❌ $SHOREBIRD_ROOT ist kein git-Klon — kann nicht pinnen"
            exit 1
          fi
          git fetch --tags --force --depth=1 origin v1.6.92
          git checkout --force v1.6.92
          # Snapshot cache invalidieren damit shorebird mit der neuen Version
          # neu bootstrapped
          rm -f bin/cache/shorebird.snapshot bin/cache/shorebird.snapshot.tmp || true
          echo "--- shorebird --version (nach Pin) ---"
          shorebird --version

      - name: 📋 Version lesen
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION = $VERSION"

      - name: 🔑 Supabase-Credentials ableiten (nur aus GitHub Secrets)
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          # SUPABASE_URL aus SUPABASE_PROJECT_ID ableiten (kein SUPABASE_URL-Secret nötig)
          if [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            _URL="https://${SUPABASE_PROJECT_ID}.supabase.co"
          else
            # Fallback: aus JWT des Service-Role-Keys dekodieren
            _PAYLOAD=$(echo "${SUPABASE_SERVICE_ROLE_KEY}" | cut -d'.' -f2)
            _PAD=$(( (4 - ${#_PAYLOAD} % 4) % 4 ))
            _PADDED="${_PAYLOAD}$(printf '=%.0s' $(seq 1 $_PAD) 2>/dev/null || true)"
            _URL=$(echo "${_PADDED}" | base64 -d 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('https://'+d['ref']+'.supabase.co')" 2>/dev/null || echo "")
          fi
          if [ -z "${_URL:-}" ]; then
            echo "❌ Supabase-URL konnte nicht ermittelt werden — SUPABASE_PROJECT_ID oder SUPABASE_SERVICE_ROLE_KEY prüfen"
            exit 1
          fi
          echo "SUPABASE_URL=${_URL}" >> $GITHUB_ENV
          echo "📌 SUPABASE_URL=${_URL}"

          # SUPABASE_ANON_KEY über Supabase Management-API holen (kein SUPABASE_ANON_KEY-Secret nötig)
          _ANON_KEY=""
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_ID:-}" ]; then
            _ANON_KEY=$(curl -sf \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/api-keys" \
              | python3 -c "import sys,json; keys=json.load(sys.stdin); print(next((k['api_key'] for k in keys if k['name']=='anon'), ''))" \
              2>/dev/null || echo "")
          fi
          if [ -n "${_ANON_KEY:-}" ]; then
            echo "SUPABASE_ANON_KEY=${_ANON_KEY}" >> $GITHUB_ENV
            echo "✅ anon key abgerufen"
          else
            echo "⚠️  anon key nicht verfügbar — App nutzt eingebettete Konfiguration"
            echo "SUPABASE_ANON_KEY=" >> $GITHUB_ENV
          fi

      - name: 🔔 google-services.json aus Secret dekodieren (FCM)
        # Patches bauen ebenfalls ein APK (zur Engine-Snapshot-Diff). Damit das
        # Gradle-Plugin nicht fehlschlägt, muss google-services.json existieren —
        # genau wie beim Release-Build.
        if: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          RAW="$GOOGLE_SERVICES_JSON_BASE64"
          CLEANED=$(printf '%s' "$RAW" | tr -d '[:space:]')
          if printf '%s' "$CLEANED" | base64 -d > android/app/google-services.json 2>/dev/null \
               && jq -e .project_info.project_id android/app/google-services.json >/dev/null; then
            echo "✅ google-services.json injiziert (base64)"
          elif printf '%s' "$RAW" | jq -e .project_info.project_id >/dev/null 2>&1; then
            printf '%s' "$RAW" > android/app/google-services.json
            echo "✅ google-services.json injiziert (rohes JSON)"
          else
            echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 ist weder gültiges base64 noch rohes JSON — Patch läuft ohne FCM weiter."
            rm -f android/app/google-services.json
          fi

      - name: 🩺 Shorebird-Status (vor Patch)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          echo "=== shorebird --version ==="
          shorebird --version || true
          echo "=== shorebird releases list --platforms=android ==="
          shorebird releases list --platforms=android 2>&1 || true

      - name: 📡 Patch veröffentlichen (nur neueste Release-Version)
        # STRATEGIE (ab v5.37+): Patches gehen NUR an die neueste Release-Version.
        # User auf älteren APKs (v5.35.0+) werden über den in-App `ReleaseUpdateScreen`
        # zum Download der neuen APK geleitet — gesteuert über `app_config.min_version`.
        # Damit entfällt das fragile Multi-Version-Patching (Engine-Drift, Release-IDs
        # mit Build-Nummer, CLI-Kompatibilität) komplett.
        #
        # `--release-version=latest` löst Shorebird-intern gegen die jüngste
        # registrierte Release-Version auf — eigener Resolver nicht nötig.
        #
        # --allow-asset-diffs bleibt weil MaterialIcons.otf bei jedem Build anders
        # tree-geshaked wird sobald neue Icons im Dart-Code stehen.
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          set -euo pipefail

          # Release-Version aus pubspec.yaml (inkl. Build-Nummer) für Shorebird
          FULL_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "Ziel-Release-Version: $FULL_VERSION (latest)"

          shorebird patch android \
            --allow-asset-diffs \
            --release-version="$FULL_VERSION" \
            -- \
            --target-platform=android-arm64,android-arm \
            --dart-define=APP_VERSION=${{ steps.version.outputs.version }} \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev \
            --dart-define=LIVEKIT_URL=${{ secrets.LIVEKIT_URL || 'wss://livekit-wb.srv1438024.hstgr.cloud' }}

          echo "✅ Patch an Release $FULL_VERSION gesendet"

      - name: 📝 Patch-Changelog in Supabase schreiben
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt — patch_changelog wird nicht gesetzt"
            exit 0
          fi

          # Changelog: Bei Squash-Merges enthält der HEAD-Commit alle Sub-Commits
          # im Body. Wir parsen daher BEIDES — git log (für mehrere echte Commits
          # zwischen zwei Tags) UND den HEAD-Commit-Body (für Squash-Merge-PRs).
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # 1) git log über alle Commits seit letztem Tag
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s" --no-merges 2>/dev/null || true)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges -10 2>/dev/null || true)
          fi

          # 2) Wenn nur 1 Commit (typisch bei Squash-Merge): zusätzlich Body parsen
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c . || echo "0")
          if [ "$COMMIT_COUNT" = "1" ]; then
            # Squash-Merge erkannt — Body enthält "* feat(...)", "* fix(...)" Lines
            BODY_LINES=$(git log -1 --pretty=format:"%b" 2>/dev/null \
              | grep -E "^\* (feat|fix|refactor|perf|style)" \
              | sed 's/^\* /• /' || true)
            if [ -n "$BODY_LINES" ]; then
              CL="$BODY_LINES"
            else
              CL=$(echo "$COMMITS" | sed 's/^/• /' | grep -v -E "^• (chore|ci|Merge)" || true)
            fi
          else
            CL=$(echo "$COMMITS" | sed 's/^/• /' | grep -v -E "^• (chore|ci|Merge)" | head -20 || true)
          fi

          if [ -z "$CL" ]; then
            CL="• Bugfixes und Verbesserungen"
          fi

          echo "Changelog (preview):"
          echo "$CL"
          echo "---"

          BODY=$(jq -n --arg cl "$CL" '{"patch_changelog": $cl}')
          HTTP_CODE=$(curl -sS -o /tmp/pc_resp.json -w "%{http_code}" \
            -X PATCH "${SUPABASE_URL}/rest/v1/app_config?platform=eq.android" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "$BODY")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "⚠️  patch_changelog-Update fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/pc_resp.json || true
          else
            echo "✅ patch_changelog gesetzt"
          fi

      - name: 📜 Update-History Eintrag schreiben
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt — kein History-Eintrag"
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CL=$(git log "$LAST_TAG"..HEAD --pretty=format:"• %s" --no-merges 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" | head -20 || true)
          else
            CL=$(git log --pretty=format:"• %s" --no-merges -10 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" || true)
          fi
          if [ -z "$CL" ]; then CL="• Bugfixes und Verbesserungen"; fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY=$(jq -n \
            --arg v "$VERSION" \
            --arg cl "$CL" \
            --arg url "$RUN_URL" \
            '{"type":"patch","version":$v,"changelog":$cl,"github_run_url":$url}')

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/update_history" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY")
          [ "$HTTP_CODE" = "201" ] && echo "✅ update_history Eintrag gesetzt" \
            || echo "⚠️  update_history INSERT fehlgeschlagen (HTTP $HTTP_CODE)"

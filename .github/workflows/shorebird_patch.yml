name: рҹҡҖ Shorebird OTA Patch

# OTA-Updates (Dart-only Г„nderungen) ohne Store / ohne APK-Reinstall.
# Sendet den aktuellen Dart-Code als Patch an das laufende Shorebird-Release.
#
# Wann benutzen:
#   вҖў Nach Dart-Code-Г„nderungen (lib/**) die KEINE neue native Lib brauchen
#   вҖў Dependencies/Plugins dГјrfen NICHT geГӨndert werden (= neuer Release nГ¶tig)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Ziel-Release (z.B. 5.36.0). "all" = alle registrierten Releases. Standard: all'
        required: false
        default: 'all'
      source_branch:
        description: 'Branch mit dem zu patchenden Code'
        required: false
        default: 'main'
  # Auto-Patch bei JEDEM Push auf main вҖ” kein paths-Filter.
  # Shorebird patcht immer den aktuellen Dart-Stand; doppelte Patches (gleicher Code)
  # sind harmlos und werden vom Client einfach ignoriert.
  push:
    branches:
      - main

permissions:
  contents: read

# Patches dГјrfen NICHT parallel laufen вҖ” Shorebird nimmt den zuletzt
# hochgeladenen Patch als aktiv, d.h. wenn ein ГӨlterer Lauf spГӨter fertig wird
# Гјberschreibt er den neueren Stand. Daher: pro Branch nur ein Patch gleichzeitig,
# ГӨltere laufende Jobs werden beim neuen Push gecancelt.
concurrency:
  group: shorebird-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    name: рҹ“Ў Shorebird Patch android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: рҹ“Ҙ Checkout
        uses: actions/checkout@v4
        with:
          # Bei workflow_dispatch: expliziter source_branch (oder 'main').
          # Bei push: der gepushte Commit (github.sha).
          ref: ${{ github.event.inputs.source_branch || github.sha }}

      - name: вҳ• Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Shorebird CLI 1.6.92 + Flutter 3.41.6 (revision 76ca3dff01) war die
      # Kombination beim letzten funktionierenden Patch (Run #15, commit fe09bad).
      # Ohne Pin driftet setup-shorebird@v1 auf die jeweils neueste CLI und damit
      # auf einen anderen Flutter-Engine-Snapshot вҖ” der Patch uploaded zwar, wird
      # aber vom Client auf dem GerГӨt still verworfen weil die Engine-Bytes nicht
      # zum registrierten Release passen. Deshalb fest pinnen.
      - name: рҹҗҰ Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-version: 1.6.92

      - name: рҹ“Ӣ Version lesen
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION = $VERSION"

      - name: рҹ©ә Shorebird-Status (vor Patch)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          echo "=== shorebird --version ==="
          shorebird --version || true
          echo "=== shorebird releases list --platforms=android ==="
          shorebird releases list --platforms=android 2>&1 || true

      - name: рҹ“Ў Patch verГ¶ffentlichen (ALLE aktiven Release-Versionen)
        # WICHTIG: Patcht standardmГӨГҹig JEDE registrierte Shorebird-Release-Version.
        # Grund: User haben unterschiedliche APKs installiert (v5.34, v5.35, v5.36, v5.37).
        # `--release-version=latest` wГјrde NUR v5.37 patchen вҶ’ alle anderen User
        # bekommen die neuen Dart-Г„nderungen nie. Deshalb: Schleife Гјber alle Versionen.
        #
        # Eine einzelne Version kann via workflow_dispatch `release_version` gezielt
        # gepatcht werden (z.B. "5.36.0"). "all" = alle Versionen patchen.
        #
        # Version-Liste kommt aus `shorebird releases list` (einzige zuverlГӨssige
        # Quelle fГјr die EXAKTEN Shorebird-Release-IDs inkl. Build-Nummer).
        # Shorebird registriert Releases als `<semver>+<buildNumber>` (z.B.
        # `5.37.0+20260421`). `--release-version=5.37.0` ohne Build-Nummer
        # schlГӨgt mit "Release not found" fehl вҖ” deshalb ist GitHub-Tag-Parsing
        # hier falsch (Tags sind nur `v5.37.0`).
        #
        # --allow-asset-diffs bleibt weil MaterialIcons.otf bei jedem Build anders
        # tree-geshaked wird sobald neue Icons im Dart-Code stehen.
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          set -uo pipefail

          REQUESTED="${{ github.event.inputs.release_version || 'all' }}"

          # Registrierte Shorebird-Releases extrahieren (Format: <semver>+<buildNumber>).
          # Die CLI gibt eine ASCII-Table aus; wir greppen Zeilen mit semver+build
          # und dedupen. Keine GitHub-Tag-Fallbacks вҖ” nur was Shorebird wirklich kennt.
          ALL_VERSIONS=$(shorebird releases list --platforms=android 2>/dev/null \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+' \
            | sort -V -u)

          if [ -z "$ALL_VERSIONS" ]; then
            echo "вқҢ Keine Shorebird-Releases gefunden вҖ” Patch abgebrochen"
            echo "вҶ’ Debug: Raw-Ausgabe von shorebird releases list:"
            shorebird releases list --platforms=android 2>&1 || true
            exit 1
          fi

          # Ziel-Liste bestimmen:
          # - "all" (Standard): alle registrierten Shorebird-Releases
          # - "latest": nur neueste Version
          # - konkrete Version: Substring-Match (z.B. "5.36.0" matcht "5.36.0+20260420")
          if [ "$REQUESTED" = "all" ]; then
            TARGETS="$ALL_VERSIONS"
          elif [ "$REQUESTED" = "latest" ]; then
            TARGETS=$(echo "$ALL_VERSIONS" | tail -n1)
          else
            TARGETS=$(echo "$ALL_VERSIONS" | grep -F "$REQUESTED" || echo "$REQUESTED")
          fi

          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"
          echo "Registrierte Releases:"
          echo "$ALL_VERSIONS" | sed 's/^/  вҖў /'
          echo ""
          echo "Ziel-Versionen fГјr diesen Patch-Lauf:"
          echo "$TARGETS" | sed 's/^/  вҶ’ /'
          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"

          FAILED_VERSIONS=""
          SUCCESS_COUNT=0
          FAIL_COUNT=0

          for V in $TARGETS; do
            echo ""
            echo "в”Ғв”Ғв”Ғв”Ғ рҹ“Ў Patch v$V в”Ғв”Ғв”Ғв”Ғ"
            # if-Statement statt EC=$? вҖ” verhindert dass GitHub Actions' implizites
            # set -e den Loop beim ersten nicht-0 Exit abbricht (z.B. exit 70 wenn
            # ein GitHub-Release kein Shorebird-Release hat).
            if shorebird patch android \
              --allow-asset-diffs \
              --release-version="$V" \
              -- \
              --target-platform=android-arm64,android-arm \
              --dart-define=APP_VERSION=${{ steps.version.outputs.version }} \
              --dart-define=SUPABASE_URL=https://adtviduaftdquvfjpojb.supabase.co \
              --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdHZpZHVhZnRkcXV2Zmpwb2piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzY3OTcsImV4cCI6MjA5MDcxMjc5N30.LPtmnjukb6o2CA16RDjoStqYb_1bipNULD4tgOfuD98 \
              --dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev; then
              echo "вң… v$V gepatcht"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            else
              echo "вҡ пёҸ  v$V Patch fehlgeschlagen вҖ” fahre mit nГӨchster Version fort"
              FAILED_VERSIONS="$FAILED_VERSIONS v$V"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done

          echo ""
          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"
          echo "Patch-Zusammenfassung: $SUCCESS_COUNT erfolgreich, $FAIL_COUNT fehlgeschlagen"
          if [ -n "$FAILED_VERSIONS" ]; then
            echo "Fehlgeschlagene Versionen:$FAILED_VERSIONS"
          fi

          # Job-Exit: nur fail wenn ALLE Versionen fehlgeschlagen sind.
          # Einzelne Fehler (z.B. Engine-Drift bei alter Version) sind OK.
          if [ $SUCCESS_COUNT -eq 0 ]; then
            echo "вқҢ Kein einziger Patch hat funktioniert"
            exit 1
          fi

      - name: рҹ“қ Patch-Changelog in Supabase schreiben
        env:
          SUPABASE_URL: https://adtviduaftdquvfjpojb.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "вҡ пёҸ  SUPABASE_SERVICE_ROLE_KEY fehlt вҖ” patch_changelog wird nicht gesetzt"
            exit 0
          fi

          # Changelog: Commits seit letztem Tag (oder letzte 10), chore/ci/Merge gefiltert.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CL=$(git log "$LAST_TAG"..HEAD --pretty=format:"вҖў %s" --no-merges 2>/dev/null \
              | grep -v -E "^вҖў (chore|ci|Merge)" | head -20 || true)
          else
            CL=$(git log --pretty=format:"вҖў %s" --no-merges -10 2>/dev/null \
              | grep -v -E "^вҖў (chore|ci|Merge)" || true)
          fi
          if [ -z "$CL" ]; then
            CL="вҖў Bugfixes und Verbesserungen"
          fi

          BODY=$(jq -n --arg cl "$CL" '{"patch_changelog": $cl}')
          HTTP_CODE=$(curl -sS -o /tmp/pc_resp.json -w "%{http_code}" \
            -X PATCH "${SUPABASE_URL}/rest/v1/app_config?platform=eq.android" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "$BODY")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "вҡ пёҸ  patch_changelog-Update fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/pc_resp.json || true
          else
            echo "вң… patch_changelog gesetzt"
          fi

      - name: рҹ“ң Update-History Eintrag schreiben
        env:
          SUPABASE_URL: https://adtviduaftdquvfjpojb.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "вҡ пёҸ  SUPABASE_SERVICE_ROLE_KEY fehlt вҖ” kein History-Eintrag"
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CL=$(git log "$LAST_TAG"..HEAD --pretty=format:"вҖў %s" --no-merges 2>/dev/null \
              | grep -v -E "^вҖў (chore|ci|Merge)" | head -20 || true)
          else
            CL=$(git log --pretty=format:"вҖў %s" --no-merges -10 2>/dev/null \
              | grep -v -E "^вҖў (chore|ci|Merge)" || true)
          fi
          if [ -z "$CL" ]; then CL="вҖў Bugfixes und Verbesserungen"; fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY=$(jq -n \
            --arg v "$VERSION" \
            --arg cl "$CL" \
            --arg url "$RUN_URL" \
            '{"type":"patch","version":$v,"changelog":$cl,"github_run_url":$url}')

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/update_history" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY")
          [ "$HTTP_CODE" = "201" ] && echo "вң… update_history Eintrag gesetzt" \
            || echo "вҡ пёҸ  update_history INSERT fehlgeschlagen (HTTP $HTTP_CODE)"

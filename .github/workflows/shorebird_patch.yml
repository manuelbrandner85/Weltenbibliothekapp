name: 🚀 Shorebird OTA Patch

# OTA-Updates (Dart-only Änderungen) ohne Store / ohne APK-Reinstall.
# Sendet den aktuellen Dart-Code als Patch an das laufende Shorebird-Release.
#
# Wann benutzen:
#   • Nach Dart-Code-Änderungen (lib/**) die KEINE neue native Lib brauchen
#   • Dependencies/Plugins dürfen NICHT geändert werden (= neuer Release nötig)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Ziel-Release (z.B. 5.36.0). "all" = alle registrierten Releases. Standard: all'
        required: false
        default: 'all'
      source_branch:
        description: 'Branch mit dem zu patchenden Code'
        required: false
        default: 'main'
  # Auto-Patch bei JEDEM Push auf main — kein paths-Filter.
  # Shorebird patcht immer den aktuellen Dart-Stand; doppelte Patches (gleicher Code)
  # sind harmlos und werden vom Client einfach ignoriert.
  push:
    branches:
      - main

permissions:
  contents: read

# Patches dürfen NICHT parallel laufen — Shorebird nimmt den zuletzt
# hochgeladenen Patch als aktiv, d.h. wenn ein älterer Lauf später fertig wird
# überschreibt er den neueren Stand. Daher: pro Branch nur ein Patch gleichzeitig,
# ältere laufende Jobs werden beim neuen Push gecancelt.
concurrency:
  group: shorebird-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    name: 📡 Shorebird Patch android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          # Bei workflow_dispatch: expliziter source_branch (oder 'main').
          # Bei push: der gepushte Commit (github.sha).
          ref: ${{ github.event.inputs.source_branch || github.sha }}
          fetch-depth: 0  # vollständige History + Tags nötig für pubspec-Extraktion pro Release

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Shorebird CLI 1.6.92 + Flutter 3.41.6 (revision 76ca3dff01) war die
      # Kombination beim letzten funktionierenden Patch (Run #15, commit fe09bad).
      # Ohne Pin driftet setup-shorebird@v1 auf die jeweils neueste CLI und damit
      # auf einen anderen Flutter-Engine-Snapshot — der Patch uploaded zwar, wird
      # aber vom Client auf dem Gerät still verworfen weil die Engine-Bytes nicht
      # zum registrierten Release passen. Deshalb fest pinnen.
      - name: 🐦 Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          shorebird-version: 1.6.92

      - name: 📋 Version lesen
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION = $VERSION"

      - name: 🩺 Shorebird-Status (vor Patch)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          echo "=== shorebird --version ==="
          shorebird --version || true
          echo "=== shorebird releases list --platforms=android ==="
          shorebird releases list --platforms=android 2>&1 || true

      - name: 📡 Patch veröffentlichen (ALLE aktiven Release-Versionen)
        # WICHTIG: Patcht standardmäßig JEDE registrierte Shorebird-Release-Version.
        # Grund: User haben unterschiedliche APKs installiert (v5.34, v5.35, v5.36, v5.37).
        # `--release-version=latest` würde NUR v5.37 patchen → alle anderen User
        # bekommen die neuen Dart-Änderungen nie. Deshalb: Schleife über alle Versionen.
        #
        # Eine einzelne Version kann via workflow_dispatch `release_version` gezielt
        # gepatcht werden (z.B. "5.36.0+20260421"). "all" = alle Versionen patchen.
        #
        # ⚠️ Shorebird CLI 1.6.92 hat KEIN `releases list` Kommando (nur `get-apks`).
        # Daher lesen wir die Release-Version (Format: <semver>+<buildNumber>) direkt
        # aus der `pubspec.yaml` am jeweiligen GitHub-Release-Tag. Das ist exakt
        # das, was `shorebird release android` zur Registrierungszeit als
        # Release-Identifier nutzt → 1:1 gültig für `--release-version=`.
        # Duplikate (mehrere Tags mit derselben pubspec-Version, z.B. v5.29.1–v5.34.0
        # teilen `5.29.1+20260404`) werden via sort -u zusammengefasst.
        #
        # --allow-asset-diffs bleibt weil MaterialIcons.otf bei jedem Build anders
        # tree-geshaked wird sobald neue Icons im Dart-Code stehen.
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail

          REQUESTED="${{ github.event.inputs.release_version || 'all' }}"

          # Alle Release-Tags holen (limit 20 reicht) und für jeden Tag die pubspec-Version
          # aus der Git-History extrahieren. sort -u dedupliziert identische Versionen.
          TAGS=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 \
            --json tagName --jq '.[].tagName' 2>/dev/null || true)

          ALL_VERSIONS=""
          for T in $TAGS; do
            V=$(git show "$T:pubspec.yaml" 2>/dev/null \
              | grep '^version:' | awk '{print $2}' || true)
            if [ -n "$V" ] && echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$'; then
              ALL_VERSIONS="${ALL_VERSIONS}${V}"$'\n'
            fi
          done
          ALL_VERSIONS=$(echo "$ALL_VERSIONS" | sort -V -u | sed '/^$/d')

          if [ -z "$ALL_VERSIONS" ]; then
            echo "❌ Keine gültigen Release-Versionen aus pubspec.yaml extrahierbar — Patch abgebrochen"
            echo "→ Debug: GitHub-Tags:"
            echo "$TAGS"
            exit 1
          fi

          # Ziel-Liste bestimmen:
          # - "all" (Standard): alle aus pubspec extrahierten Versionen
          # - "latest": nur neueste Version
          # - konkrete Version: Substring-Match (z.B. "5.36.0" matcht "5.36.0+20260421")
          if [ "$REQUESTED" = "all" ]; then
            TARGETS="$ALL_VERSIONS"
          elif [ "$REQUESTED" = "latest" ]; then
            TARGETS=$(echo "$ALL_VERSIONS" | tail -n1)
          else
            TARGETS=$(echo "$ALL_VERSIONS" | grep -F "$REQUESTED" || echo "$REQUESTED")
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Registrierte Releases:"
          echo "$ALL_VERSIONS" | sed 's/^/  • /'
          echo ""
          echo "Ziel-Versionen für diesen Patch-Lauf:"
          echo "$TARGETS" | sed 's/^/  → /'
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAILED_VERSIONS=""
          SUCCESS_COUNT=0
          FAIL_COUNT=0

          for V in $TARGETS; do
            echo ""
            echo "━━━━ 📡 Patch v$V ━━━━"
            # if-Statement statt EC=$? — verhindert dass GitHub Actions' implizites
            # set -e den Loop beim ersten nicht-0 Exit abbricht (z.B. exit 70 wenn
            # ein GitHub-Release kein Shorebird-Release hat).
            if shorebird patch android \
              --allow-asset-diffs \
              --release-version="$V" \
              -- \
              --target-platform=android-arm64,android-arm \
              --dart-define=APP_VERSION=${{ steps.version.outputs.version }} \
              --dart-define=SUPABASE_URL=https://adtviduaftdquvfjpojb.supabase.co \
              --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdHZpZHVhZnRkcXV2Zmpwb2piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzY3OTcsImV4cCI6MjA5MDcxMjc5N30.LPtmnjukb6o2CA16RDjoStqYb_1bipNULD4tgOfuD98 \
              --dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev; then
              echo "✅ v$V gepatcht"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            else
              echo "⚠️  v$V Patch fehlgeschlagen — fahre mit nächster Version fort"
              FAILED_VERSIONS="$FAILED_VERSIONS v$V"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Patch-Zusammenfassung: $SUCCESS_COUNT erfolgreich, $FAIL_COUNT fehlgeschlagen"
          if [ -n "$FAILED_VERSIONS" ]; then
            echo "Fehlgeschlagene Versionen:$FAILED_VERSIONS"
          fi

          # Job-Exit: nur fail wenn ALLE Versionen fehlgeschlagen sind.
          # Einzelne Fehler (z.B. Engine-Drift bei alter Version) sind OK.
          if [ $SUCCESS_COUNT -eq 0 ]; then
            echo "❌ Kein einziger Patch hat funktioniert"
            exit 1
          fi

      - name: 📝 Patch-Changelog in Supabase schreiben
        env:
          SUPABASE_URL: https://adtviduaftdquvfjpojb.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt — patch_changelog wird nicht gesetzt"
            exit 0
          fi

          # Changelog: Commits seit letztem Tag (oder letzte 10), chore/ci/Merge gefiltert.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CL=$(git log "$LAST_TAG"..HEAD --pretty=format:"• %s" --no-merges 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" | head -20 || true)
          else
            CL=$(git log --pretty=format:"• %s" --no-merges -10 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" || true)
          fi
          if [ -z "$CL" ]; then
            CL="• Bugfixes und Verbesserungen"
          fi

          BODY=$(jq -n --arg cl "$CL" '{"patch_changelog": $cl}')
          HTTP_CODE=$(curl -sS -o /tmp/pc_resp.json -w "%{http_code}" \
            -X PATCH "${SUPABASE_URL}/rest/v1/app_config?platform=eq.android" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "$BODY")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "⚠️  patch_changelog-Update fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/pc_resp.json || true
          else
            echo "✅ patch_changelog gesetzt"
          fi

      - name: 📜 Update-History Eintrag schreiben
        env:
          SUPABASE_URL: https://adtviduaftdquvfjpojb.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️  SUPABASE_SERVICE_ROLE_KEY fehlt — kein History-Eintrag"
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CL=$(git log "$LAST_TAG"..HEAD --pretty=format:"• %s" --no-merges 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" | head -20 || true)
          else
            CL=$(git log --pretty=format:"• %s" --no-merges -10 2>/dev/null \
              | grep -v -E "^• (chore|ci|Merge)" || true)
          fi
          if [ -z "$CL" ]; then CL="• Bugfixes und Verbesserungen"; fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY=$(jq -n \
            --arg v "$VERSION" \
            --arg cl "$CL" \
            --arg url "$RUN_URL" \
            '{"type":"patch","version":$v,"changelog":$cl,"github_run_url":$url}')

          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/rest/v1/update_history" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY")
          [ "$HTTP_CODE" = "201" ] && echo "✅ update_history Eintrag gesetzt" \
            || echo "⚠️  update_history INSERT fehlgeschlagen (HTTP $HTTP_CODE)"

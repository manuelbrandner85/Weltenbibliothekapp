name: 🚀 Shorebird OTA Patch

# OTA-Updates (Dart-only Änderungen) ohne Store / ohne APK-Reinstall.
# Sendet den aktuellen Dart-Code als Patch an das laufende Shorebird-Release.
#
# Wann benutzen:
#   • Nach Dart-Code-Änderungen (lib/**) die KEINE neue native Lib brauchen
#   • Dependencies/Plugins dürfen NICHT geändert werden (= neuer Release nötig)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Ziel-Release INKL. Build-Nummer (z.B. 5.31.0+20260419). Standard: latest'
        required: false
        default: 'latest'
      source_branch:
        description: 'Branch mit dem zu patchenden Code'
        required: false
        default: 'main'
  # Auto-Patch bei reinen Dart-Änderungen auf main oder aktivem Feature-Branch.
  # Wichtig: KEIN Auto-Patch wenn pubspec.yaml / android/** / ios/** geändert werden
  # (= potenziell nativer Change → manueller Release-Flow nötig).
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'lib/**'
      - '.github/workflows/shorebird_patch.yml'

permissions:
  contents: read

jobs:
  patch:
    name: 📡 Shorebird Patch android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          # Bei workflow_dispatch: expliziter source_branch (oder 'main').
          # Bei push: der gepushte Commit (github.sha).
          ref: ${{ github.event.inputs.source_branch || github.sha }}

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: 📋 Version lesen
        id: version
        run: |
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION="${FULL%+*}"
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "pubspec full = $FULL"
          echo "pubspec version = $VERSION"

      - name: 🔎 Shorebird-Release-Version auflösen
        id: release
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          # Prio 1: User-Input via workflow_dispatch.
          INPUT_VERSION="${{ github.event.inputs.release_version }}"
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "latest" ]; then
            echo "target=$INPUT_VERSION" >> $GITHUB_OUTPUT
            echo "Verwende User-Input: $INPUT_VERSION"
            exit 0
          fi

          # Prio 2: 'shorebird releases list' parsen — Debug-Output ins Log,
          # damit wir bei Fehlern sehen was der CLI zurückgibt.
          echo "--- shorebird releases list (stdout+stderr) ---"
          RAW=$(shorebird releases list --platforms=android 2>&1 || true)
          echo "$RAW"
          echo "--- end list ---"

          PREFIX="${{ steps.version.outputs.version }}"
          MATCH=$(echo "$RAW" \
            | grep -oE "${PREFIX//./\\.}\+[0-9]+" \
            | sort -u -V \
            | tail -n 1 || true)

          # Prio 3: Known-good Fallback. Diese Release ist definitiv auf Shorebird
          # registriert (siehe v5.34.0 Release vom Apr 19 2026, commit c7f72b4).
          # Wichtig: pubspec wurde in e219145 auf +20260421 gebumpt wegen Android-
          # Downgrade-Schutz, aber Shorebird kennt nur +20260419. Patch muss
          # daher gegen +20260419 gehen.
          KNOWN_GOOD="5.34.0+20260419"

          if [ -z "$MATCH" ]; then
            MATCH="$KNOWN_GOOD"
            echo "⚠️  Kein passender Release aus CLI — Fallback: $MATCH"
          else
            echo "✅ Aus CLI aufgelöst: $MATCH"
          fi
          echo "target=$MATCH" >> $GITHUB_OUTPUT

      - name: 🔧 pubspec an Ziel-Release angleichen
        # Shorebird prüft, dass die lokale pubspec-version exakt zur Release-
        # Version passt, gegen die gepatcht wird. Da pubspec in e219145 auf
        # +20260421 gebumpt wurde (Android-Downgrade-Fix), müssen wir sie hier
        # für den Patch-Lauf auf den tatsächlich existierenden Shorebird-Release
        # (+20260419) zurückdrehen. Wird nicht committet — nur auf dem Runner.
        run: |
          TARGET="${{ steps.release.outputs.target }}"
          echo "pubspec-Version → $TARGET"
          sed -i "s/^version: .*/version: $TARGET/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: 📡 Patch veröffentlichen
        run: |
          echo "Patch-Ziel: ${{ steps.release.outputs.target }}"
          # --verbose hilft beim Debug; vollständiger stderr->stdout-merge,
          # damit auch im "exit 70" Fall der Stack im Log steht.
          # --allow-asset-diffs: Material-Icons-Font (.otf) ändert sich automatisch
          # bei neuen Icons im Code (Tree-Shaking). Font ist aber bereits im
          # Release-APK enthalten — wir senden nur Dart-Diff. Ohne dieses Flag
          # wirft Shorebird UnpatchableChangeException → Exit 70.
          # --allow-native-diffs: Erlaubt evtl. native lib-Hash-Mismatches die
          # ebenfalls als Asset-Diff gewertet werden.
          shorebird patch android \
            --verbose \
            --allow-asset-diffs \
            --allow-native-diffs \
            --release-version="${{ steps.release.outputs.target }}" \
            -- \
            --target-platform=android-arm64,android-arm \
            --dart-define=APP_VERSION=${{ steps.version.outputs.version }} \
            --dart-define=SUPABASE_URL=https://adtviduaftdquvfjpojb.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFub24iLCJpYXQiOjE3NzUxMzY3OTcsImV4cCI6MjA5MDcxMjc5N30.LPtmnjukb6o2CA16RDjoStqYb_1bipNULD4tgOfuD98 \
            --dart-define=CLOUDFLARE_WORKER_URL=https://weltenbibliothek-api.brandy13062.workers.dev \
            2>&1 | tee /tmp/shorebird-patch.log
          STATUS=${PIPESTATUS[0]}
          echo "--- shorebird patch exit: $STATUS ---"
          exit $STATUS
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

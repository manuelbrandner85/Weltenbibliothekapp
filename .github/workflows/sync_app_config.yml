name: 🔁 Sync Supabase app_config

# Setzt public.app_config in Supabase auf die aktuelle Version aus pubspec.yaml
# + Inhalte aus supabase/release/current.json (min_version, changelog).
#
# Läuft als eigener, schneller Job (kein APK-Rebuild). Ziel: Auch wenn der große
# Release-Workflow build_apk.yml Step 11 failt, zieht dieser Workflow den
# app_config-State automatisch nach sobald er auf main läuft.
#
# Trigger:
#   • Push auf main der pubspec.yaml ODER current.json ändert
#   • workflow_dispatch (manuell, z.B. nach Secret-Fix)
#
# Idempotent: PATCH auf dieselbe Version ist ein No-Op auf User-Seite
#   (dieselben Werte → kein neuer Update-Dialog).
#
# Voraussetzung: Repo-Secret SUPABASE_SERVICE_ROLE_KEY gesetzt.

on:
  push:
    branches: [main]
    paths:
      - 'pubspec.yaml'
      - 'supabase/release/current.json'
      - '.github/workflows/sync_app_config.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-app-config-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: 📢 PATCH app_config (android)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: 📋 Version + Manifest lesen
        id: read
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          MANIFEST=supabase/release/current.json
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ $MANIFEST fehlt"
            exit 1
          fi
          MIN_VERSION=$(jq -er '.min_version' "$MANIFEST")
          CHANGELOG=$(jq -er '.changelog' "$MANIFEST")
          {
            echo "version=$VERSION"
            echo "min_version=$MIN_VERSION"
            echo "changelog<<EOF_CL"
            echo "$CHANGELOG"
            echo "EOF_CL"
          } >> $GITHUB_OUTPUT
          echo "✅ version=$VERSION min_version=$MIN_VERSION"

      - name: 📢 PATCH Supabase app_config
        env:
          SUPABASE_URL: https://adtviduaftdquvfjpojb.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.read.outputs.version }}
          MIN_VERSION: ${{ steps.read.outputs.min_version }}
          CHANGELOG: ${{ steps.read.outputs.changelog }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "❌ SUPABASE_SERVICE_ROLE_KEY Repo-Secret fehlt — bitte einmalig einrichten"
            echo "   Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

          APK_URL="https://github.com/manuelbrandner85/Weltenbibliothekapp/releases/download/v${VERSION}/weltenbibliothek-v${VERSION}-universal.apk"
          NOTES_URL="https://github.com/manuelbrandner85/Weltenbibliothekapp/releases/tag/v${VERSION}"

          BODY=$(jq -n \
            --arg lv "$VERSION" \
            --arg mv "$MIN_VERSION" \
            --arg url "$APK_URL" \
            --arg cl "$CHANGELOG" \
            --arg notes "$NOTES_URL" \
            '{latest_version:$lv, min_version:$mv, apk_download_url:$url, changelog:$cl, release_notes_url:$notes}')

          echo "→ PATCH app_config: latest=$VERSION min=$MIN_VERSION"
          HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X PATCH "${SUPABASE_URL}/rest/v1/app_config?platform=eq.android" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "$BODY")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "❌ Supabase-Update fehlgeschlagen (HTTP $HTTP_CODE)"
            cat /tmp/resp.json
            exit 1
          fi
          echo "✅ app_config aktualisiert"
          cat /tmp/resp.json | jq '.'

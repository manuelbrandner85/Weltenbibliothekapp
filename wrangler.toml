# ============================================================
# Deploy Commands:
#   npm run cf:build    →  npx opennextjs-cloudflare
#   npm run cf:deploy   →  npx wrangler deploy
#   npm run cf:preview  →  npx wrangler dev
#
# Required Cloudflare Token Scopes:
#   Workers Scripts: Edit
#   Workers Routes:  Edit
#   Account Settings: Read
#
# Secrets to set via `npx wrangler secret put <NAME>`:
#   SUPABASE_SERVICE_ROLE_KEY   (never committed to git)
# ============================================================

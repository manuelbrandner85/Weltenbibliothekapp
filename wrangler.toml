# ============================================================
# Weltenbibliothek – Wrangler Configuration
# Cloudflare Workers / Pages Deployment
# ============================================================
#
# SECURITY NOTE:
#   - CLOUDFLARE_API_TOKEN must NEVER appear here.
#     Set it as CLOUDFLARE_API_TOKEN env var in your shell
#     or as a secret in your CI/CD pipeline.
#   - SUPABASE_SERVICE_ROLE_KEY must NEVER appear here.
#     Inject it via Cloudflare Dashboard > Workers > Settings > Variables
#     (as encrypted secret, not plain text var).
#   - The NEXT_PUBLIC_SUPABASE_ANON_KEY below is intentionally
#     public (Supabase anon keys are designed for frontend use
#     and are protected via Row Level Security policies).
# ============================================================

name            = "weltenbibliothek"
account_id      = "3472f5994537c3a30c5caeaff4de21fb"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main            = ".open-next/worker.js"

# ---- Assets ----
[assets]
directory = ".open-next/assets"
binding   = "ASSETS"

# ---- Production Environment Variables ----
# Only NEXT_PUBLIC_* values here – all public by design.
# Secrets (SERVICE_ROLE_KEY etc.) must be added via:
#   npx wrangler secret put <NAME>
#   or Cloudflare Dashboard > Workers & Pages > Settings > Variables
[vars]
NEXT_PUBLIC_APP_NAME        = "Weltenbibliothek"
NEXT_PUBLIC_APP_URL         = "https://weltenbibliothek.brandy13062.workers.dev"
NEXT_PUBLIC_SUPABASE_URL    = "https://adtviduaftdquvfjpojb.supabase.co"

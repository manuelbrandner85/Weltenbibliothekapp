name: weltenbibliothek
description: "Weltenbibliothek - Digitale Wissensplattform mit interaktiven Event-Karten, Dokumentenverwaltung und Multimedia-Integration"
publish_to: 'none'

version: 3.9.963+963

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: 1.0.8

  # Map Integration - FIXED VERSION
  flutter_map: 7.0.2
  latlong2: 0.9.1
  flutter_map_marker_cluster: 1.4.0
  
  # HTTP Client für Cloudflare API
  http: 1.5.0
  http_parser: 4.0.2  # Für Multipart-Upload (Profilbilder)
  
  # Local Storage (Hive) - FIXED VERSIONS
  hive: 2.2.3
  hive_flutter: 1.1.0
  
  # Shared Preferences für einfache Settings
  shared_preferences: 2.5.3
  
  # PDF Viewer
  flutter_pdfview: 1.3.2
  
  # Video/YouTube Integration
  youtube_player_flutter: 9.1.1
  webview_flutter: 4.13.0
  
  # State Management
  provider: 6.1.5+1
  
  # Audio Playback - FIXED VERSION
  just_audio: 0.9.40
  
  # WebSocket for Music Sync
  web_socket_channel: 3.0.1
  
  # JSON Serialization
  json_annotation: 4.9.0
  
  # URL Launcher (für externe Links)
  url_launcher: 6.3.1
  
  # Intl für Datumsformatierung
  intl: 0.19.0
  
  # Path Provider für lokale Dateien
  path_provider: 2.1.5
  
  # Image Picker für Profilbilder
  image_picker: 1.1.2
  
  # GPS & Location Services - FIXED VERSIONS
  geolocator: 11.0.0
  permission_handler: 11.3.1
  
  # Video Player für Streams (Web-kompatibel)
  video_player: 2.9.2
  video_player_web: 2.3.4
  
  # 🎥 WebRTC für Livestream (Telegram-Style)  
  flutter_webrtc: 1.2.0  # Latest stable version (updated from 0.11.7)
  
  # 🎵 MUSIK-FEATURES - yt-dlp Integration
  audio_service: 0.18.15
  cached_network_image: 3.4.1
  flutter_spinkit: 5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
  build_runner: 2.4.13
  json_serializable: 6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/chat_backgrounds/
    - assets/images/energy_symbols/
    - assets/icons/
    - assets/audio/

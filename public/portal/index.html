<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weltenbibliothek · Cinematic Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;background:#08070d;font-family:'Inter',system-ui,sans-serif;color:#e6e6f0;-webkit-font-smoothing:antialiased}
  body{overflow:hidden}
  #root{width:100%;height:100%}
  iframe.portal-frame{display:block;width:100%;height:100%;border:0;background:#000;border-radius:inherit}
  .phone-shell{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a1428 0%,#080611 70%)}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useRef } = React;

    // Each iframe gets a unique URL hash so they share no localStorage / cache
    function PortalIframe({ variant, kind = 'desktop' }) {
      const ref = useRef(null);
      useEffect(() => {
        const f = ref.current;
        if (!f) return;
        const onLoad = () => {
          try {
            setTimeout(() => {
              try { f.contentWindow.PortalEngine?.setVariant(variant); } catch(e){}
            }, 800);
          } catch (e) {}
        };
        f.addEventListener('load', onLoad);
        return () => f.removeEventListener('load', onLoad);
      }, [variant]);
      return (
        <iframe
          ref={ref}
          className="portal-frame"
          src={`portal.html?v=${variant}&kind=${kind}#${kind}`}
          title={`portal-${variant}-${kind}`}
        />
      );
    }

    function PhoneArtboard({ variant }) {
      return (
        <div className="phone-shell">
          <AndroidDevice width={412} height={892} dark={true}>
            <PortalIframe variant={variant} kind="phone" />
          </AndroidDevice>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas
          title="Weltenbibliothek · Cinematic Portal"
          subtitle="Drei Varianten · Phone + Fullscreen · Tweaks im Portal"
          background="#06050b"
        >
          <DCSection id="cosmic" title="01 · COSMIC DRIFT" subtitle="Tiefes Blau-Lila Nebel · Interstellar-Vibe · Default">
            <DCArtboard id="cosmic-phone" label="Android · Pixel 8 Pro" width={440} height={920}>
              <PhoneArtboard variant="cosmic" />
            </DCArtboard>
            <DCArtboard id="cosmic-full" label="Fullscreen · 1440 × 900" width={1440} height={900}>
              <PortalIframe variant="cosmic" kind="desktop-cosmic" />
            </DCArtboard>
          </DCSection>

          <DCSection id="geometry" title="02 · SACRED GEOMETRY" subtitle="Goldlicht · runische Ringe · Doctor-Strange-Geist">
            <DCArtboard id="geo-phone" label="Android" width={440} height={920}>
              <PhoneArtboard variant="geometry" />
            </DCArtboard>
            <DCArtboard id="geo-full" label="Fullscreen" width={1440} height={900}>
              <PortalIframe variant="geometry" kind="desktop-geometry" />
            </DCArtboard>
          </DCSection>

          <DCSection id="aurora" title="03 · AURORA RIFT" subtitle="Prismatisches Schimmern · Annihilation-Riss · lebendig">
            <DCArtboard id="aurora-phone" label="Android" width={440} height={920}>
              <PhoneArtboard variant="aurora" />
            </DCArtboard>
            <DCArtboard id="aurora-full" label="Fullscreen" width={1440} height={900}>
              <PortalIframe variant="aurora" kind="desktop-aurora" />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# Strenger als Standard-flutter_lints — fängt Memory-Leaks und vergessene
# awaits frühzeitig ab, ohne den Build hart zu blockieren (alles als info/warning).

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Bekannte Lint-Klassen, die in der bestehenden Codebasis breit auftreten,
    # bleiben auf info-Level — sonst hätten wir sofort 100+ "Errors".
    use_build_context_synchronously: info
    deprecated_member_use: info
    avoid_print: warning
    unawaited_futures: warning
    close_sinks: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "build/**"

linter:
  rules:
    # Memory-Leak-Vermeidung
    - close_sinks            # StreamController muss geclosed werden
    - cancel_subscriptions   # StreamSubscription muss gecancelt werden

    # Async-Sicherheit
    - unawaited_futures      # Vergessenes await flaggen
    - avoid_void_async       # async-Funktionen sollten Future zurückgeben

    # Code-Qualität (lokale Inferenz)
    - prefer_final_locals
    - prefer_final_in_for_each

    # Print-Statements vermeiden — debugPrint nutzen
    - avoid_print

    # Sicherheit
    - no_logic_in_create_state
    - avoid_dynamic_calls

    # Const-Optimierungen (Performance)
    - prefer_const_declarations

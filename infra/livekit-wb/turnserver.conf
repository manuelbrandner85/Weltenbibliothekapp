# coturn TURN/STUN-Server-Konfiguration — Weltenbibliothek
#
# ZWECK: Media-Relay für User hinter symmetrischem NAT (Firmen-VPN,
# manche Mobil-Carrier mit aggressivem CGNAT, Hotel-WLAN).
#
# 🔐 SECRET-HANDLING:
# Static long-term credentials (vom Flutter-Client zur Verbindung verwendet).
# Der user/password wird via envsubst zur Deploy-Zeit aus den GitHub-Secrets
# TURN_USER und TURN_PASSWORD gesetzt. Hier nur Platzhalter.
#
# MENSAENA-SCHUTZ:
# - Port 3478 (Standard-STUN/TURN-UDP) — Mensaena nutzt 3479, kein Konflikt
# - Port 5349 (TURN-TLS) — Mensaena nutzt 5350, kein Konflikt
# - Relay-Range 61001-62000 — disjunkt von LiveKit-Media (60001-61000) und
#   Mensaena (50000-60000)
# - Eigener Container `livekit-wb-coturn`, eigenes Volume

# ── Listening ─────────────────────────────────────────────────────────
listening-port=3478
listening-ip=0.0.0.0

# ── Relay-Range (Media-Pakete) ────────────────────────────────────────
# 1000 Ports — ausreichend für ~250 gleichzeitige Relay-Sessions
# (4 Ports pro Audio+Video-Stream, RTCP inkl.)
min-port=61001
max-port=62000

# ── Public IP (wird in ICE-Kandidaten beworben) ────────────────────────
external-ip=72.62.154.95

# ── Auth: Long-Term-Credentials ────────────────────────────────────────
# Static creds — werden vom Client (LiveKit ice_servers) übergeben.
#
# ⚠️ HINWEIS: Diese Creds sind öffentlich (im Client + Repo). Das
# Abuse-Risiko ist begrenzt durch:
#   - Rate-Limits unten (max 200 Sessions, 20 pro User, 2 Mbps)
#   - denied-peer-ip verhindert Relay zu privaten IPs (kein SSRF)
# Für Produktion v2: REST-API-Auth mit ephemeral creds umstellen.
#
# Bei Verdacht auf Abuse: hier user= ändern + im Client (api_config.dart) +
# Container neu starten. Alle aktiven TURN-Sessions werden dabei beendet.
fingerprint
lt-cred-mech
user=wb-turn-2026:WbCoturnRelay_a9b26485d407e7dc
realm=livekit-wb.srv1438024.hstgr.cloud

# ── Security ───────────────────────────────────────────────────────────
# Kein TLS (kein Cert verfügbar, würde Setup unnötig komplex machen).
# Plain TURN/UDP + TURN/TCP genügt für den Großteil der NAT-Probleme.
no-tls
no-dtls

# Kein CLI/Telnet-Server (Sicherheit)
no-cli

# Multicast-Loopback verhindern (Sicherheits-Best-Practice)
no-multicast-peers

# Verhindere Relay zu privaten IPs — sonst könnte man via TURN auf
# interne Netze zugreifen (Server-Side Request Forgery)
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# ── Anti-Abuse-Limits ──────────────────────────────────────────────────
# Maximal 200 gleichzeitige Sessions, 20 pro User
total-quota=200
user-quota=20
# 2 Mbps pro Session — genug für Audio+Video, verhindert Bandbreiten-Klau
max-bps=2000000

# ── Logging ────────────────────────────────────────────────────────────
log-file=stdout
no-stdout-log=false
verbose

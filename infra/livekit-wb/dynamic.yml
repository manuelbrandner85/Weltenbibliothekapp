# Traefik dynamische Konfiguration — Weltenbibliothek LiveKit
#
# Routet Requests auf https://livekit-wb.srv1438024.hstgr.cloud:7892
# zum internen LiveKit-Container auf Port 7880.
#
# TLS-Cert wird vom VPS gemountet (Hostinger-Wildcard *.srv1438024.hstgr.cloud).

http:
  routers:
    livekit-wb-router:
      rule: "Host(`livekit-wb.srv1438024.hstgr.cloud`)"
      service: livekit-wb-service
      entryPoints:
        - websecure
      tls:
        # Nutzt den Default-Cert aus tls.certificates (Hostinger-Wildcard)
        # Kein ACME — der Cert wird vom Host gemountet
        passthrough: false

    # Optional: HTTP → HTTPS Redirect
    livekit-wb-router-http:
      rule: "Host(`livekit-wb.srv1438024.hstgr.cloud`)"
      service: livekit-wb-service
      entryPoints:
        - web
      middlewares:
        - https-redirect

  services:
    livekit-wb-service:
      loadBalancer:
        servers:
          - url: "http://livekit:7980"
        passHostHeader: true

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        port: "7892"
        permanent: true

# TLS-Konfiguration — Hostinger-Wildcard-Cert vom Host gemountet
tls:
  certificates:
    - certFile: /certs/fullchain.pem
      keyFile: /certs/privkey.pem
      stores:
        - default
  stores:
    default:
      defaultCertificate:
        certFile: /certs/fullchain.pem
        keyFile: /certs/privkey.pem

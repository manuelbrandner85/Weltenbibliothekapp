name: livekit-weltenbibliothek

# Weltenbibliothek LiveKit-Server mit eingebautem TURN-Relay.
# Ansatz identisch zu Mensaena (livekit-final-fix.sh): built-in TURN,
# domain: '', external_tls: false — kein separater coturn nötig.
#
# MENSAENA-SAFETY-LISTE (vor jedem manuellen Eingriff lesen!):
#   ✓ Eigener Container-Name `livekit-weltenbibliothek` (Mensaena: livekit-livekit-1)
#   ✓ Eigenes Docker-Network `livekit-wb-net` (kein Cross-Talk)
#   ✓ Signal-Port 7980 (Mensaena: 7880), TCP 7981 (Mensaena: 7881)
#   ✓ Media-UDP 60001-61000 (Mensaena: 50000-60000) — KEIN Overlap
#   ✓ TURN-Port 3479 UDP/TCP (Mensaena: 3478) — KEIN Overlap
#   ✓ Verzeichnis /docker/livekit-wb/ (Mensaena: andere Lokation)
#
# Starten:  docker compose -f /docker/livekit-wb/docker-compose.yml up -d
# Stoppen:  docker compose -f /docker/livekit-wb/docker-compose.yml down
# Logs:     docker compose -f /docker/livekit-wb/docker-compose.yml logs -f

services:

  livekit:
    image: livekit/livekit-server:v1.7
    container_name: livekit-weltenbibliothek
    restart: unless-stopped
    ports:
      # HTTP/WS-Signal — Mensaena's Caddy terminiert TLS und proxied hier hin.
      # Bind auf 0.0.0.0 (statt 127.0.0.1) damit Caddy aus seinem Docker-Netzwerk
      # via Bridge-Gateway (172.17.0.1) erreichen kann. Externer Zugriff auf 7980
      # ist durch Hostinger-Firewall geblockt (keine 7980-Regel → kein Risiko).
      - "7980:7980/tcp"
      # RTC TCP-Fallback (Clients hinter strikter Firewall)
      - "7981:7981/tcp"
      # WebRTC Media UDP-Range (1000 Ports, disjunkt von Mensaena 50000-60000)
      - "60001-61000:60001-61000/udp"
      # Built-in TURN: Port 3479 UDP+TCP (Mensaena belegt 3478 — kein Konflikt)
      # Relay für Mobilfunk-CGNAT / symmetrisches NAT
      - "3479:3479/udp"
      - "3479:3479/tcp"
      # TURNS (TURN-over-TLS) auf 5349 UDP+TCP für restriktive Corp-/Sat-Firewalls
      # die nur HTTPS-Ports erlauben. LiveKit terminiert hier TLS selbst (cert s. volume mount).
      - "5349:5349/udp"
      - "5349:5349/tcp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
      # Caddy-managed Let's-Encrypt-Cert für TURNS, vom Deploy-Workflow hierhin
      # gespiegelt (./cert/turn-cert.pem + turn-key.pem). Read-only.
      # Renewal: VPS-Cron alle 14 Tage kopiert frisch + restartet Container.
      - ./cert:/etc/livekit-cert:ro
    command: --config /etc/livekit.yaml
    networks:
      - livekit-wb-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7980"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  livekit-wb-net:
    name: livekit-wb-net
    driver: bridge

name: livekit-weltenbibliothek

# Weltenbibliothek LiveKit-Server.
# TLS-Termination + Routing macht der bestehende Traefik-Container
# (traefik-jfee-traefik-1) auf dem VPS via Docker-Provider-Labels.
# Traefik auf host-network → erreicht den Container über die bridge-IP.
#
# MENSAENA-SAFETY-LISTE:
#   ✓ Eigener Container-Name `livekit-weltenbibliothek` (Mensaena: livekit-livekit-1)
#   ✓ Eigenes Docker-Network `livekit-wb-net` (kein Cross-Talk)
#   ✓ Signal-Port 7980 (Mensaena: 7884), TCP 7981 (Mensaena: 7885)
#   ✓ Media-UDP 60001-61000 (Mensaena: 50000-60000) — KEIN Overlap
#   ✓ TURN-Port 3479 UDP/TCP (Mensaena: 3478) — KEIN Overlap
#   ✓ Eigener Traefik-Router-Name `livekit-wb` (Mensaena: `livekit`)
#
# Starten:  docker compose -f /docker/livekit-wb/docker-compose.yml up -d
# Logs:     docker compose -f /docker/livekit-wb/docker-compose.yml logs -f

services:

  livekit:
    image: livekit/livekit-server:v1.7
    container_name: livekit-weltenbibliothek
    restart: unless-stopped
    ports:
      # HTTP/WS-Signal — Traefik (host network) erreicht via Container-IP auf
      # livekit-wb-net. Bind auf 127.0.0.1 hier nur als Diagnose-Loopback.
      - "127.0.0.1:7980:7980/tcp"
      # RTC TCP-Fallback (Clients hinter strikter Firewall)
      - "7981:7981/tcp"
      # WebRTC Media UDP-Range (1000 Ports, disjunkt von Mensaena 50000-60000)
      - "60001-61000:60001-61000/udp"
      # Built-in TURN: Port 3479 UDP+TCP (Mensaena belegt 3478 — kein Konflikt)
      # Relay für Mobilfunk-CGNAT / symmetrisches NAT
      - "3479:3479/udp"
      - "3479:3479/tcp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    networks:
      - livekit-wb-net
    labels:
      # ─── Traefik-Routing (Pattern von Mensaena's livekit-livekit-1) ───
      # Subdomain → diesem Container's Port 7980. TLS via Let's-Encrypt-Resolver
      # `letsencrypt` (von Mensaena's Traefik-Static-Config bereitgestellt).
      - "traefik.enable=true"
      - "traefik.http.routers.livekit-wb.entrypoints=websecure"
      - "traefik.http.routers.livekit-wb.rule=Host(`livekit-wb.srv1438024.hstgr.cloud`)"
      - "traefik.http.routers.livekit-wb.tls.certresolver=letsencrypt"
      - "traefik.http.services.livekit-wb.loadbalancer.server.port=7980"
      # Traefik soll WSS/Long-Polling nicht abbrechen — lange Timeouts
      - "traefik.http.services.livekit-wb.loadbalancer.responseforwarding.flushinterval=100ms"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7980"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  livekit-wb-net:
    name: livekit-wb-net
    driver: bridge

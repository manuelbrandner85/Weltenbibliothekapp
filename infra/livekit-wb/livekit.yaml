# LiveKit-Server-Konfiguration — Weltenbibliothek
#
# Eigene Instanz, getrennt von Mensaena (kein gemeinsamer Container/Key/Port).
# Container hört intern auf Port 7980 (HTTP). Mensaena's Caddy terminiert TLS.
#
# 🔐 SECRET-HANDLING:
#   - Dieser File enthält KEIN Secret mehr. Der API-Schlüssel-Wert wird
#     per `${LIVEKIT_API_SECRET}` zur Deploy-Zeit von der `deploy_livekit_wb.yml`-
#     Pipeline (envsubst) eingesetzt; die echte yaml mit Secret liegt
#     ausschließlich auf /docker/livekit-wb/livekit.yaml (chmod 600).
#
# MENSAENA-SCHUTZ:
#   - Port 7980 statt LiveKit-Default 7880 → keine Kollision
#   - tcp_port 7981 statt 7881 → gleicher Grund
#   - Media-UDP-Range 60001–61000 → kein Overlap mit Mensaena (50000–60000)
#   - TURN udp_port 3479 statt 3478 → Mensaena belegt 3478

port: 7980

keys:
  wb-a9b26485d407e7dc2043: ${LIVEKIT_API_SECRET}

rtc:
  tcp_port: 7981
  port_range_start: 60001
  port_range_end: 61000
  use_external_ip: true
  node_ip: 72.62.154.95  # Explizite externe IP → verhindert dass LiveKit interne Docker-IPs als ICE-Kandidaten bewirbt

# LiveKit-interner TURN-Relay (identisch zu Mensaena-Ansatz der zuverlässig funktioniert).
# UDP 3479: Standard TURN für symmetrisches NAT (Mobilfunk-CGNAT, Firmen-VPN, Hotel-WLAN).
# TCP/UDP 5349: TURNS (TURN-over-TLS) für restriktive Corp-/Sat-Firewalls die nur 443/5349 erlauben.
# Cert wird vom Deploy-Workflow aus Caddy's data-dir gespiegelt (./cert Mount).
# Renewal alle ~60 Tage durch Caddy → VPS-Cron stupst LiveKit-Container an
# (Cron-Setup ebenfalls im Deploy-Workflow).
# Mensaena-Schutz: Ports 3479+5349 statt 3478+5348 (Mensaena-Defaults).
turn:
  enabled: true
  udp_port: 3479
  tls_port: 5349
  domain: livekit-wb.srv1438024.hstgr.cloud
  external_tls: true
  cert_file: /etc/livekit-cert/turn-cert.pem
  key_file: /etc/livekit-cert/turn-key.pem

room:
  auto_create: true
  empty_timeout: 300
  max_participants: 50

logging:
  level: info
  json: false

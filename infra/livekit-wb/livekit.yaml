# LiveKit-Server-Konfiguration — Weltenbibliothek
#
# Eigene Instanz, getrennt von Mensaena (kein gemeinsamer Container/Key/Port).
# Container hört intern auf Port 7980 (HTTP). Mensaena's Caddy terminiert TLS.
#
# 🔐 SECRET-HANDLING:
#   - Dieser File enthält KEIN Secret mehr. Der API-Schlüssel-Wert wird
#     per `${LIVEKIT_API_SECRET}` zur Deploy-Zeit von der `deploy_livekit_wb.yml`-
#     Pipeline (envsubst) eingesetzt; die echte yaml mit Secret liegt
#     ausschließlich auf /docker/livekit-wb/livekit.yaml (chmod 600).
#   - Falls dieser File jemals ein Klartext-Secret enthielt: SOFORT rotieren!
#     1. Neues Secret generieren: `openssl rand -hex 32`
#     2. GitHub-Secret `LIVEKIT_API_SECRET` aktualisieren
#     3. Supabase Edge-Function-Secret `LIVEKIT_API_SECRET` aktualisieren
#     4. `deploy_livekit_wb.yml` neu triggern → Container restart
#   - Secret-Lecks im Git: alte Werte mit `git log -p infra/livekit-wb/livekit.yaml`
#     prüfen; wenn produktiv: rotieren + alten Wert dokumentiert als kompromittiert.
#
# MENSAENA-SCHUTZ:
#   - Port 7980 statt LiveKit-Default 7880 → keine Kollision falls Mensaena auf 7880 publiziert
#   - tcp_port 7981 statt 7881 → gleicher Grund
#   - Media-UDP-Range 60001–65000 → kein Overlap mit Mensaena (50000–60000)
#   - KEIN TURN-Server in WB → keine UDP-5350/3479-Kollision

port: 7980

# API-Keys: Wert wird beim Deploy via envsubst aus dem GitHub-Secret
# `LIVEKIT_API_SECRET` injiziert. Repo enthält ausschließlich den Platzhalter.
keys:
  wb-a9b26485d407e7dc2043: ${LIVEKIT_API_SECRET}

# WebRTC Media-Konfiguration
# Range 60001–61000 (1000 Ports) — disjunkt von Mensaena (50000–60000).
# Bei 50 max_participants × ~4 Tracks (Audio+Video+Screen+RTCP) braucht es
# mind. 200 Ports. 100 Ports (alter Wert) waren chronisch zu wenig → Audio/
# Video-Drops. 1000 Ports lassen Spielraum, bleiben aber RAM-verträglich
# (docker-proxy-Memory ~1-1.5 MiB pro Port = ~1-1.5 GiB für 1000 Ports).
rtc:
  tcp_port: 7981
  port_range_start: 60001
  port_range_end: 61000
  use_external_ip: true
  # Explizite externe IP — verhindert dass LiveKit interne Docker-IPs
  # in ICE-Kandidaten bewirbt (was bei auto-detect manchmal scheitert).
  node_ip: 72.62.154.95

# TURN-Server — KRITISCH für User hinter symmetrischem NAT
# (Firmen-VPN, Mobilfunk-CGNAT, Hotel-WiFi). Ohne TURN können diese Clients
# zwar ICE-Kandidaten austauschen, aber Media-Pakete kommen nicht durch
# weil ihr NAT für jeden Ziel-Endpoint einen anderen Quell-Port nimmt.
# TURN umgeht das indem alle Pakete über den Server gerelayed werden.
#
# Mensaena-Schutz: Mensaena nutzt 5350/3479 für TURN.
# Wir nehmen 3480/5351 — disjunkt, kein Konflikt.
#
# external_tls: false — wir lassen Caddy NICHT TURN-TLS terminieren.
# Stattdessen: TURN über UDP/TCP ohne TLS auf disjunkten Ports.
# Das deckt 95% der User ab (TLS-only Firewalls sind selten).
turn:
  enabled: true
  domain: livekit-wb.srv1438024.hstgr.cloud
  tls_port: 5352          # ungenutzt ohne cert_file, aber LiveKit verlangt es
  udp_port: 3480          # disjunkt von Mensaena's 3479
  external_tls: false     # kein TLS-Terminator vorhanden → TURN-UDP only

# Räume werden automatisch angelegt wenn der erste User joint.
# empty_timeout: 0 → Raum wird SOFORT gelöscht sobald der letzte
# Teilnehmer geht (kein Idle-Bestand, keine versehentlich offenen Räume).
room:
  auto_create: true
  empty_timeout: 1
  max_participants: 50

logging:
  level: info
  json: false

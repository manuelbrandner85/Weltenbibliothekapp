# Traefik statische Konfiguration — Weltenbibliothek LiveKit
#
# Läuft auf Ports 7891 (HTTP) / 7892 (HTTPS) — kein Konflikt mit Mensaena auf 80/443.
# TLS-Cert wird vom Host gemountet (Hostinger-Wildcard) — kein ACME nötig.

api:
  insecure: false

# Eigene Ports statt 80/443 — kein Konflikt mit bestehendem Webserver
entryPoints:
  web:
    address: ":7891"
  websecure:
    address: ":7892"

# Provider: dynamische Konfig aus dynamic.yml laden
providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO

accessLog: {}

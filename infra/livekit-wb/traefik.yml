# Traefik statische Konfiguration — Weltenbibliothek LiveKit
# Läuft auf Ports 7891 (HTTP) / 7892 (HTTPS) um Mensaena auf 80/443 nicht zu stören.
# ACME DNS-01 via Cloudflare → kein Port 80 nötig.

api:
  insecure: false

# Eigene Ports statt 80/443 — kein Konflikt mit bestehendem Webserver
entryPoints:
  web:
    address: ":7891"
  websecure:
    address: ":7892"

# TLS via Cloudflare DNS-01 — automatische Zertifikate ohne Port-80-Challenge
certificatesResolvers:
  cf:
    acme:
      email: livekit-wb@weltenbibliothek.app
      storage: /acme/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
        delayBeforeCheck: 10

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO

accessLog: {}

# Workers AI binding (kostenlos im Free-Tier: 10k Requests/Tag)
[ai]
binding = "AI"

# R2 Bucket binding (für Media-Uploads)
[[r2_buckets]]
binding    = "R2_BUCKET"
bucket_name = "weltenbibliothek-media"

# ⏰ Cron Trigger — Dispatcher drained notification_queue minütlich an FCM.
# Ohne FCM_SERVICE_ACCOUNT fällt das auf "mark as sent" zurück
# (In-App-Polling übernimmt die Zustellung).
[triggers]
crons = ["* * * * *"]

# Secrets (via `npx wrangler secret put <NAME>` setzen):
#   SUPABASE_SERVICE_ROLE_KEY  – für Admin-Operationen + Queue-Dispatch
#   FCM_SERVICE_ACCOUNT        – Firebase Service Account JSON (Push-Versand)
#
# FCM Service Account generieren:
#   1. Firebase Console → Project Settings → Service Accounts
#   2. "Generate new private key" → JSON downloaden
#   3. Inhalt der JSON-Datei (ohne Formatierung) an wrangler übergeben:
#      cat service-account.json | npx wrangler secret put FCM_SERVICE_ACCOUNT
# ============================================================

# ============================================================
# OPTIONAL: KV-Namespace fuer Mentor-Antwort-Cache (7d TTL).
# Schont Worker-Quota dramatisch — identische /api/mentor/chat-Anfragen
# (gleiche personality + message + world, ohne conversationHistory)
# kommen aus dem Cache statt AI-Backend.
#
# Aktivieren:
#   1. npx wrangler kv:namespace create MENTOR_CACHE
#      → liefert "id = abc123..."
#   2. Hier eintragen, dann re-deployen:
#
# [[kv_namespaces]]
# binding = "MENTOR_CACHE"
# id      = "DEINE_NAMESPACE_ID_HIER"
#
# Code fragt env.MENTOR_CACHE defensiv ab — wenn nicht gebunden,
# laeuft alles ohne Cache weiter (kein Crash).
# ============================================================

# R2 Bucket binding (für Media-Uploads)
[[r2_buckets]]
binding    = "R2_BUCKET"
bucket_name = "weltenbibliothek-media"

# ⏰ Cron Trigger — Dispatcher drained notification_queue alle 5 Min an FCM.
# Frequenz: */5 statt jede Minute → 288/Tag statt 1440/Tag, schont Workers
# Free-Plan-Quota (100k/Tag). Notification-Latenz: Worst Case 5 Min,
# das App-Polling holt zeitkritische Items schneller ein.
# Ohne FCM_SERVICE_ACCOUNT fällt das auf "mark as sent" zurück
# (In-App-Polling übernimmt die Zustellung).
[triggers]
crons = ["*/5 * * * *"]

# Secrets (via `npx wrangler secret put <NAME>` setzen):
#   SUPABASE_SERVICE_ROLE_KEY  – für Admin-Operationen + Queue-Dispatch
#   FCM_SERVICE_ACCOUNT        – Firebase Service Account JSON (Push-Versand)
#
# FCM Service Account generieren:
#   1. Firebase Console → Project Settings → Service Accounts
#   2. "Generate new private key" → JSON downloaden
#   3. Inhalt der JSON-Datei (ohne Formatierung) an wrangler übergeben:
#      cat service-account.json | npx wrangler secret put FCM_SERVICE_ACCOUNT
# ============================================================
